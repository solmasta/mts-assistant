// ----- AI Call with API key from storage -----
async function callAgent(systemPrompt, userPrompt, apiKey) {
  if (!apiKey) return "🔑 No API key set. Please go to Settings (gear icon on home) and enter your Gemini API key.";
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: systemPrompt }] },
        contents: [{ role: "user", parts: [{ text: userPrompt }] }],
        generationConfig: { maxOutputTokens: 2000 }
      })
    });
    const data = await res.json();
    if (data.error) return `⚠️ API Error: ${data.error.message || JSON.stringify(data.error)}`;
    return data.candidates?.[0]?.content?.parts?.map(p => p.text).join("") || "No response.";
  } catch { return "⚠️ Connection error. Check network."; }
}

// ----- PT Chart Screen (no API) -----
function PTChartScreen() {
  const [ref, setRef] = useState("R-410A");
  const [mode, setMode] = useState("P→T");
  const [inputVal, setInputVal] = useState("");
  const [result, setResult] = useState(null);
  function interpolate(data, x, col) {
    const src = col===0?0:1, tgt = col===0?1:0;
    const sorted = [...data].sort((a,b)=>a[src]-b[src]);
    if(x <= sorted[0][src]) return sorted[0][tgt];
    if(x >= sorted[sorted.length-1][src]) return sorted[sorted.length-1][tgt];
    for(let i=0;i<sorted.length-1;i++) if(x>=sorted[i][src]&&x<=sorted[i+1][src]) { const t=(x-sorted[i][src])/(sorted[i+1][src]-sorted[i][src]); return sorted[i][tgt]+t*(sorted[i+1][tgt]-sorted[i][tgt]); }
    return null;
  }
  function calc(){ const v=parseFloat(inputVal); if(isNaN(v)){ setResult("Invalid"); return; } const data=PT_DATA[ref]; const res = mode==="P→T" ? interpolate(data,v,0) : interpolate(data,v,1); setResult(res!==null ? (mode==="P→T"?`Saturation Temp: ${res.toFixed(1)} °F`:`Saturation Pressure: ${res.toFixed(1)} psig`) : "Out of range"); }
  return (
    <div style={{ flex:1 }}>
      <Header title="PT CHART" subtitle="PRESSURE-TEMPERATURE" />
      <div style={{ padding:16 }}>
        <select value={ref} onChange={e=>setRef(e.target.value)} style={{ width:"100%", background:"#2a2a2a", border:`1px solid ${BORDER}`, borderRadius:12, padding:"12px", color:"#fff", marginBottom:12, fontSize:14 }}>{REFRIGERANTS.map(r=><option key={r}>{r}</option>)}</select>
        <div style={{ display:"flex", gap:8, marginBottom:12 }}>{["P→T","T→P"].map(m=><button key={m} onClick={()=>{setMode(m);setResult(null);}} style={{ flex:1, background:mode===m?JLL_RED:"#2a2a2a", border:`1px solid ${mode===m?JLL_RED:BORDER}`, borderRadius:12, padding:"10px", color:"#fff", fontWeight:700 }}>{m==="P→T"?"Pressure → Temp":"Temp → Pressure"}</button>)}</div>
        <Input label={mode==="P→T"?"PRESSURE (psig)":"TEMPERATURE (°F)"} value={inputVal} onChange={v=>{setInputVal(v);setResult(null);}} placeholder={mode==="P→T"?"Enter psig…":"Enter °F…"} type="number"/>
        <RedBtn onClick={calc} style={{ width:"100%" }}>Calculate</RedBtn>
        {result && <div style={{ marginTop: 14, background: JLL_RED, borderRadius: 14, padding: 14, textAlign: "center", fontWeight: 700, fontSize: 16, color: "#fff" }}>{result}</div>}
      </div>
    </div>
  );
}

      </div>
    </div>
  );
}

// ----- Service History Screen (no API) -----
function ServiceHistoryScreen({ storage }) {
  const [logs, setLogs] = useState([]);
  const [unit, setUnit] = useState("");
  const [work, setWork] = useState("");
  const [saving, setSaving] = useState(false);
  useEffect(()=>{ load(); },[]);
  async function load(){ try{ const r=await storage.get("service_history"); if(r?.value) setLogs(JSON.parse(r.value)); }catch{} }
  async function save(){ if(!work.trim()) return; setSaving(true); const log={id:genId(), unit, work, loggedAt:Date.now()}; const updated=[log,...logs]; setLogs(updated); await storage.set("service_history",JSON.stringify(updated)); setUnit(""); setWork(""); setSaving(false); }
  async function del(id){ const updated=logs.filter(l=>l.id!==id); setLogs(updated); await storage.set("service_history",JSON.stringify(updated)); }
  return (
    <div style={{ flex:1 }}>
      <Header title="SERVICE HISTORY" subtitle="MAINTENANCE LOG" />
      <div style={{ padding:16 }}>
        <div style={{ background: CARD, borderRadius: 16, padding: 16, marginBottom: 16, border: `1px solid ${BORDER}` }}>
          <Input label="UNIT / ASSET" value={unit} onChange={setUnit} placeholder="Unit ID" />
          <Textarea label="WORK PERFORMED" value={work} onChange={setWork} placeholder="Describe work done..." rows={3} />
          <RedBtn onClick={save} disabled={saving||!work.trim()} style={{ width:"100%" }}>{saving?"Saving…":"Log Visit"}</RedBtn>
        </div>
        {logs.map(l=>(
          <div key={l.id} style={{ background: CARD, borderRadius: 14, padding: 14, marginBottom: 12, border: `1px solid ${BORDER}` }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}><div><span style={{ fontWeight:700, color:"#fff" }}>{l.unit || "No unit"}</span></div><button onClick={()=>del(l.id)} style={{ background:"rgba(227,6,19,0.2)", border:"none", borderRadius:8, padding:"4px 10px", color:JLL_RED, cursor:"pointer", fontSize:12 }}>Delete</button></div>
            <div style={{ fontSize: 13, color: "#ccc", marginTop: 8, whiteSpace: "pre-wrap" }}>{l.work}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ----- Chat List & Chat Screen (with API key) -----
function ChatListScreen({ chats, onOpen, onCreate, onDelete, deletingId }) {
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column" }}>
      <Header title="MTS ASSISTANT" subtitle="FIELD AI CHAT" right={<OnlineBadge/>} />
      <div style={{ flex:1, overflowY:"auto", padding:16 }}>
        {chats.length===0 && <div style={{ textAlign:"center", padding:"50px", color:"#aaa" }}>No jobs yet. Tap + NEW JOB</div>}
        {chats.map(c=>{

              <div style={{ fontSize: 12, color: "#aaa", marginTop: 4 }}>{last ? last.content.slice(0,60)+"…" : "No messages"}</div>
              <div style={{ display:"flex", justifyContent:"space-between", marginTop: 8 }}><span style={{ fontSize: 10, color: "#777" }}>{timeAgo(c.updatedAt)}</span><button onClick={e=>{e.stopPropagation();onDelete(c.id);}} style={{ background:"rgba(227,6,19,0.2)", border:"none", borderRadius:6, padding:"4px 8px", color:JLL_RED, cursor:"pointer", fontSize:11 }}>Delete</button></div>
            </div>

}
function ChatScreen({ chat, onBack, onSend, loading }) {
  const [input, setInput] = useState("");
  const bottomRef = useRef();
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[chat?.messages,loading]);
  function send(){ const t=input.trim(); if(!t||loading) return; onSend(t); setInput(""); }
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column" }}>
      <Header title={chat?.title||"New Job"} subtitle="AI CHAT" onBack={onBack} right={<OnlineBadge/>} />
      <div style={{ flex:1, overflowY:"auto", padding:16 }}>
        {chat?.messages.map((msg,i)=>(
          <div key={i} style={{ display:"flex", justifyContent:msg.role==="user"?"flex-end":"flex-start", marginBottom:12 }}>
            <div style={{ maxWidth:"80%", background:msg.role==="user"?JLL_RED:CARD, borderRadius:16, padding:"10px 14px", color:"#fff", border:msg.role==="user"?"none":`1px solid ${BORDER}` }}>{msg.content}</div>
          </div>
        ))}
        {loading && <div style={{ display:"flex", gap:5, padding:8 }}>{[0,1,2].map(i=><div key={i} style={{ width:7, height:7, borderRadius:"50%", background:JLL_RED, animation:"bounce 1.2s infinite", animationDelay:`${i*0.2}s` }} />)}</div>}
        <div ref={bottomRef} />
      </div>
      <div style={{ borderTop: `1px solid ${BORDER}`, padding: 12, display: "flex", gap: 10 }}>
        <textarea value={input} onChange={e=>setInput(e.target.value)} placeholder="Type your message..." rows={1} style={{ flex:1, background:"#2a2a2a", border:`1px solid ${BORDER}`, borderRadius:12, padding:"10px", color:"#fff", resize:"none" }} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} />
        <button onClick={send} disabled={loading} style={{ background:JLL_RED, border:"none", borderRadius:12, padding:"0 18px", color:"#fff", fontWeight:700, cursor:"pointer" }}>Send</button>
      </div>
    </div>
  );
}

// ----- Settings Screen (to set Gemini API key) -----
function SettingsScreen({ storage, onClose, onKeySaved }) {
  const [apiKey, setApiKey] = useState("");
  const [saving, setSaving] = useState(false);
  const [message, setMessage] = useState("");
  useEffect(()=>{ loadKey(); },[]);
  async function loadKey(){ try{ const k=await storage.get("apiKey"); if(k?.value) setApiKey(k.value); }catch{} }
  async function saveKey(){
    setSaving(true); setMessage("");
    try{ await storage.set("apiKey", apiKey.trim()); setMessage("✅ API key saved! AI features will now work."); if(onKeySaved) onKeySaved(); setTimeout(()=>setMessage(""),3000); }catch(e){ setMessage("❌ Failed to save key."); } finally{ setSaving(false); }
  }
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column" }}>
      <Header title="SETTINGS" subtitle="API KEY" onBack={onClose} />
      <div style={{ padding:20 }}>
        <div style={{ background: CARD, borderRadius: 16, padding: 16, border: `1px solid ${BORDER}`, marginBottom: 20 }}>
          <div style={{ fontWeight:700, marginBottom:8 }}>Google Gemini API Key</div>
          <div style={{ fontSize:12, color:"#aaa", marginBottom:12 }}>Get a free key from <a href="https://aistudio.google.com/apikey" target="_blank" style={{ color:JLL_RED }}>Google AI Studio</a>. Paste it below to enable AI chat and document Q&A.</div>
          <Input label="API Key" value={apiKey} onChange={setApiKey} placeholder="Paste your Gemini API key here" type="password" />
          <RedBtn onClick={saveKey} disabled={saving || !apiKey.trim()} style={{ marginTop:8 }}>{saving?"Saving…":"Save Key"}</RedBtn>
          {message && <div style={{ marginTop:12, fontSize:12, color: message.includes("✅")?"#27AE60":JLL_RED }}>{message}</div>}
        </div>
      </div>
    </div>
  );
}

        <SectionTitle>TOOLS</SectionTitle>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12 }}>
          {[{id:"docs",icon:"📚",label:"Docs"},{id:"pt",icon:"🌡️",label:"PT Chart"},{id:"notes",icon:"📝",label:"Notes"},{id:"equip",icon:"🏭",label:"Equipment"},{id:"parts",icon:"🔩",label:"Parts"},{id:"photos",icon:"📷",label:"Photos"},{id:"history",icon:"📋",label:"History"}].map(t=><button key={t.id} onClick={()=>onNav(t.id)} style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 14, padding: "14px 8px", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, cursor: "pointer" }}><span style={{ fontSize: 26 }}>{t.icon}</span><span style={{ fontSize: 11, color: "#fff", fontWeight: 500 }}>{t.label}</span></button>)}

// ----- Main App -----
function MTSAssistant() {
  const [profile, setProfile] = useState(null);
  const [tab, setTab] = useState("home");
  const [chatView, setChatView] = useState("list");
  const [toolView, setToolView] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [chats, setChats] = useState([]);
  const [activeChatId, setActiveChatId] = useState(null);
  const [loading, setLoading] = useState(false);
  const [deletingId, setDeletingId] = useState(null);
  const [stats, setStats] = useState({chats:0, parts:0, notes:0, history:0});
  const [apiKey, setApiKey] = useState(null);
  const storage = window.storage = {
    get: async (k) => { const v=localStorage.getItem('mts__'+k); if(v===null) throw new Error('Not found'); return {key:k,value:v}; },
    set: async (k,v) => { localStorage.setItem('mts__'+k,v); return {key:k,value:v}; },
    delete: async (k) => { localStorage.removeItem('mts__'+k); return {key:k,deleted:true}; },
    list: async (prefix) => { const keys=[], p='mts__'+(prefix||''); for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith(p)) keys.push(k.replace('mts__','')); } return {keys}; }
  };
  useEffect(()=>{ loadData(); loadApiKey(); },[]);
  async function loadApiKey(){ try{ const k=await storage.get("apiKey"); if(k?.value) setApiKey(k.value); }catch{} }
  async function loadData() {
    try{
      const p=await storage.get("profile"); if(p?.value) setProfile(JSON.parse(p.value));
      const r=await storage.list("chat:"); const loaded=[]; for(const k of r.keys){ const rv=await storage.get(k); if(rv?.value) loaded.push(JSON.parse(rv.value)); }
      loaded.sort((a,b)=>b.updatedAt-a.updatedAt); setChats(loaded);
      const [partsR,notesR,histR]=await Promise.allSettled([storage.get("parts_log"),storage.get("notes"),storage.get("service_history")]);
      setStats({ chats:loaded.length, parts:partsR.status==="fulfilled"&&partsR.value?.value?JSON.parse(partsR.value.value).length:0, notes:notesR.status==="fulfilled"&&notesR.value?.value?JSON.parse(notesR.value.value).length:0, history:histR.status==="fulfilled"&&histR.value?.value?JSON.parse(histR.value.value).length:0 });
    }catch(e){}
  }
  async function saveProfile(p){ setProfile(p); await storage.set("profile",JSON.stringify(p)); }
  async function saveChat(chat){ await storage.set("chat:"+chat.id,JSON.stringify(chat)); }
  async function createChat(){ const chat={id:genId(),title:"New Job",messages:[],updatedAt:Date.now()}; setChats(prev=>[chat,...prev]); setStats(s=>({...s,chats:s.chats+1})); setActiveChatId(chat.id); setChatView("chat"); setTab("chat"); await saveChat(chat); }
  async function deleteChat(id){ setDeletingId(id); await storage.delete("chat:"+id); setChats(prev=>prev.filter(c=>c.id!==id)); setStats(s=>({...s,chats:Math.max(0,s.chats-1)})); if(activeChatId===id){ setActiveChatId(null); setChatView("list"); } setDeletingId(null); }
  const activeChat = chats.find(c=>c.id===activeChatId);
  async function sendMessage(text){ if(!text||loading||!activeChatId) return; const newMsg={role:"user",content:text}; const msgs=[...(activeChat?.messages||[]),newMsg]; let title=activeChat?.title||"New Job"; if((activeChat?.messages||[]).length===0) title=text.length>40?text.slice(0,40)+"…":text; const updated={...activeChat,title,messages:msgs,updatedAt:Date.now()}; setChats(prev=>prev.map(c=>c.id===activeChatId?updated:c)); setLoading(true); await saveChat(updated); const sys=SYSTEM_PROMPT+(profile?`\nTechnician: ${profile.name}`:""); const reply=await callAgent(sys,text,apiKey); const withReply={...updated,messages:[...msgs,{role:"assistant",content:reply}],updatedAt:Date.now()}; setChats(prev=>prev.map(c=>c.id===activeChatId?withReply:c).sort((a,b)=>b.updatedAt-a.updatedAt)); await saveChat(withReply); setLoading(false); }
  function navTo(target, sub=null) { setTab(target); if(target==="chat") setChatView("list"); if(target==="tools") setToolView(sub); }
  if (!profile) return <OnboardingScreen onComplete={saveProfile} />;
  if (showSettings) return <SettingsScreen storage={storage} onClose={()=>{setShowSettings(false); loadApiKey();}} onKeySaved={loadApiKey} />;
  return (
    <div style={{ height:"100vh", background:BG, display:"flex", flexDirection:"column", maxWidth:480, margin:"0 auto" }}>
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
        {tab==="home" && <DashboardScreen profile={profile} stats={stats} recentChats={chats.slice(0,3)} onStartJob={createChat} onNav={navTo} onOpenChat={id=>{setActiveChatId(id);setChatView("chat");setTab("chat");}} onOpenSettings={()=>setShowSettings(true)} />}
        {tab==="chat" && chatView==="list" && <ChatListScreen chats={chats} onOpen={id=>{setActiveChatId(id);setChatView("chat");}} onCreate={createChat} onDelete={deleteChat} deletingId={deletingId} />}
        {tab==="chat" && chatView==="chat" && <ChatScreen chat={activeChat} onBack={()=>setChatView("list")} onSend={sendMessage} loading={loading} />}
        {tab==="docs" && <DocumentLibraryScreen storage={storage} />}
        {tab==="tools" && toolView==="pt" && <PTChartScreen />}
        {tab==="tools" && toolView==="notes" && <NotesScreen storage={storage} />}
        {tab==="tools" && toolView==="equip" && <EquipmentScreen storage={storage} />}
        {tab==="tools" && toolView==="parts" && <PartsLogScreen storage={storage} />}
        {tab==="tools" && toolView==="photos" && <PhotoScreen storage={storage} />}
        {tab==="tools" && toolView==="history" && <ServiceHistoryScreen storage={storage} />}
        {tab==="tools" && !toolView && <div style={{ flex:1, padding:20 }}><div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:12 }}><button onClick={()=>setToolView("pt")} className="card-hover" style={{ background:CARD, padding:20, borderRadius:14 }}>🌡️ PT Chart</button><button onClick={()=>setToolView("notes")} style={{ background:CARD, padding:20, borderRadius:14 }}>📝 Job Notes</button><button onClick={()=>setToolView("equip")} style={{ background:CARD, padding:20, borderRadius:14 }}>🏭 Equipment</button><button onClick={()=>setToolView("parts")} style={{ background:CARD, padding:20, borderRadius:14 }}>🔩 Parts Log</button><button onClick={()=>setToolView("photos")} style={{ background:CARD, padding:20, borderRadius:14 }}>📷 Photos</button><button onClick={()=>setToolView("history")} style={{ background:CARD, padding:20, borderRadius:14 }}>📋 History</button></div></div>}
      </div>
      <div style={{ background:BLACK, borderTop:`2px solid ${BORDER}`, display:"flex" }}>
        {[
          { id:"home", icon:"🏠", label:"Home" },
          { id:"chat", icon:"💬", label:"Chat" },
          { id:"docs", icon:"📚", label:"Docs" },
          { id:"tools", icon:"🛠️", label:"Tools" }
        ].map(t=>(
          <button key={t.id} onClick={()=>navTo(t.id)} style={{ flex:1, background:"transparent", border:"none", padding:"10px 2px 6px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:2, color:tab===t.id?JLL_RED:"rgba(255,255,255,0.5)" }}>
            <span style={{ fontSize:20 }}>{t.icon}</span>
            <span style={{ fontSize:9, fontWeight:700, letterSpacing:"0.03em" }}>{t.label}</span>
            {tab===t.id && <div style={{ width:20, height:2, background:JLL_RED, borderRadius:1, marginTop:2 }} />}
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(MTSAssistant));
</script>
</body>
