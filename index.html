function SectionTitle({ children }) {

}
function Input({ label, value, onChange, placeholder, type="text" }) {

}
function Textarea({ label, value, onChange, placeholder, rows=3 }) {

    <div style={{ marginBottom:12 }}>

}
function RedBtn({ children, onClick, disabled, style }) {

}
function OnlineBadge() {

// ----- Agent helpers --------------------------------------------------------
async function callAgent(systemPrompt, userPrompt, apiKey) {
  if (!apiKey) return "⚠️ API key not configured. Please set your Gemini API key in settings.";
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: systemPrompt }] },
        contents: [{ role: "user", parts: [{ text: userPrompt }] }],
        generationConfig: { maxOutputTokens: 2000 }
      })
    });
    const data = await res.json();
    if (data.error) return "⚠️ API Error: " + (data.error.message || JSON.stringify(data.error));
    return data.candidates?.[0]?.content?.parts?.map(p => p.text).join("") || "No response generated.";
  } catch (err) { return "⚠️ Connection error. Check network and try again."; }
}
function AgentCard({ icon, title, desc, color, onClick }) {
  return (
    <div className="card-hover" onClick={onClick} style={{ background:CARD, border:`1px solid rgba(227,6,19,0.2)`, borderRadius:14, padding:16, marginBottom:12, cursor:"pointer", transition:"all .2s", borderLeft:`4px solid ${color||JLL_RED}` }}>
      <div style={{ display:"flex", alignItems:"center", gap:12 }}>
        <div style={{ width:46, height:46, borderRadius:12, background:color||JLL_RED, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0 }}>{icon}</div>
        <div><div style={{ fontSize:14, fontWeight:700, color:"#fff", marginBottom:3 }}>{title}</div><div style={{ fontSize:11, color:"rgba(255,255,255,0.45)", lineHeight:1.5 }}>{desc}</div></div>
      </div>
    </div>
  );
}
function AgentResult({ result, onReset, resetLabel="Run Again" }) {
  return (
    <div style={{ animation:"fadeUp .3s ease" }}>
      <div style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:14, padding:16, marginBottom:14, whiteSpace:"pre-wrap", fontSize:13, color:"#fff", lineHeight:1.7 }}>{result}</div>
      <RedBtn onClick={onReset} style={{ width:"100%" }}>{resetLabel}</RedBtn>
    </div>
  );
}
function AgentLoading({ label }) {
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"50px 20px", gap:16 }}>
      <div style={{ display:"flex", gap:6 }}>{[0,1,2].map(i=><div key={i} style={{ width:10, height:10, borderRadius:"50%", background:JLL_RED, animation:"bounce 1.2s ease-in-out infinite", animationDelay:`${i*.2}s` }}/>)}</div>

    </div>
  );
}

// (1) Fault Diagnosis Agent
function FaultDiagnosisAgent({ workflowCtx, onWorkflowComplete, onChainTo, apiKey }) {
  const [step, setStep] = useState(0);
  const [brand, setBrand] = useState("");
  const [model, setModel] = useState("");
  const [equipType, setEquipType] = useState("");
  const [symptom, setSymptom] = useState("");
  const [faultCode, setFaultCode] = useState("");
  const [refrigerant, setRefrigerant] = useState("");
  const [age, setAge] = useState("");
  const [result, setResult] = useState("");
  const EQUIP_TYPES = ["RTU","Chiller","Split System","VRF/VRV","Air Handler","FCU","Boiler","Heat Pump","Mini-Split","Cooling Tower"];
  async function runDiagnosis() {
    setStep(1);
    const prompt = `Run a complete HVAC fault diagnosis:\nBrand: ${brand||"Unknown"}\nModel: ${model||"Unknown"}\nEquipment Type: ${equipType||"Unknown"}\nFault Code: ${faultCode||"None"}\nSymptoms: ${symptom}\nRefrigerant: ${refrigerant||"Unknown"}\nUnit Age: ${age||"Unknown"}\n\nProvide: 1. TOP 3 LIKELY CAUSES (ranked %). 2. IMMEDIATE CHECKS. 3. STEP-BY-STEP DIAGNOSIS. 4. SAFETY NOTES. 5. WHEN TO ESCALATE.`;
    const sys = "You are an expert HVAC fault diagnosis agent for JLL MTS. Be structured and field-ready.";
    const r = await callAgent(sys, prompt, apiKey);
    setResult(r); setStep(2);
  }
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <Header title="FAULT DIAGNOSIS" subtitle="AI DIAGNOSTIC AGENT" />
      <div style={{ flex:1, overflowY:"auto", padding:14 }}>
        {step===0 && (
          <div>
            <div style={{ background:"rgba(227,6,19,0.08)", border:`1px solid rgba(227,6,19,0.2)`, borderRadius:12, padding:12, marginBottom:16, fontSize:12, color:"rgba(255,255,255,0.6)" }}>🤖 This agent runs a structured diagnosis and ranks causes by probability.</div>
            <div style={{ marginBottom:12 }}><div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:4 }}>EQUIPMENT TYPE</div><select value={equipType} onChange={e=>setEquipType(e.target.value)} style={{ width:"100%", background:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px 12px", color:"#fff", fontSize:13 }}><option value="">Select type…</option>{EQUIP_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}><div><div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:4 }}>BRAND</div><select value={brand} onChange={e=>setBrand(e.target.value)} style={{ width:"100%", background:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px 12px", color:"#fff", fontSize:13 }}><option value="">Brand…</option>{BRANDS.map(b=><option key={b}>{b}</option>)}</select></div><Input label="MODEL #" value={model} onChange={setModel} placeholder="e.g. 48XC024" /></div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}><Input label="FAULT CODE" value={faultCode} onChange={setFaultCode} placeholder="e.g. E79"/><div><div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:4 }}>REFRIGERANT</div><select value={refrigerant} onChange={e=>setRefrigerant(e.target.value)} style={{ width:"100%", background:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px 12px", color:"#fff", fontSize:13 }}><option value="">Ref…</option>{REFRIGERANTS.map(r=><option key={r}>{r}</option>)}</select></div></div>
            <Input label="UNIT AGE (years)" value={age} onChange={setAge} placeholder="e.g. 7" type="number"/>
            <Textarea label="SYMPTOMS *" value={symptom} onChange={setSymptom} placeholder="Describe what the unit is doing..." rows={4}/>
            <RedBtn onClick={runDiagnosis} disabled={!symptom.trim()} style={{ width:"100%", padding:14, fontSize:14 }}>🔍 Run Diagnosis</RedBtn>
          </div>
        )}
        {step===1 && <AgentLoading label="RUNNING DIAGNOSIS…"/>}
        {step===2 && <AgentResult result={result} onReset={()=>{setStep(0);setResult("");}} resetLabel="New Diagnosis" />}
      </div>
    </div>
  );
}

// ----- Onboarding and Dashboard -----
function OnboardingScreen({ onComplete }) {
  const [name, setName] = useState("");

  const [specialty, setSpecialty] = useState([]);

    <div style={{ height:"100vh", background:BLACK, display:"flex", flexDirection:"column", fontFamily:"'Barlow',sans-serif", maxWidth:480, margin:"0 auto" }}>
      <div style={{ background:JLL_RED, padding:"40px 24px 28px", flexShrink:0, textAlign:"center" }}>
        <Logo size={56} variant="icon" />
        <div style={{ marginTop: 16 }}><Logo variant="full" /></div>

        <Input label="YOUR NAME *" value={name} onChange={setName} placeholder="e.g. Marcus Johnson"/>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:16 }}>{QUICK_AGENTS.map(a=>(<button key={a.id} onClick={()=>onNav("agents",a.id)} className="card-hover" style={{ background:CARD, border:`1px solid rgba(227,6,19,0.15)`, borderRadius:12, padding:"13px 12px", cursor:"pointer", display:"flex", alignItems:"center", gap:10, textAlign:"left" }}><div style={{ width:36, height:36, borderRadius:9, background:a.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>{a.icon}</div><div style={{ fontSize:12, fontWeight:700, color:"#fff", lineHeight:1.3 }}>{a.label}</div></button>))}</div>
        <div style={{ background:`linear-gradient(135deg,rgba(227,6,19,0.12),rgba(227,6,19,0.05))`, border:`1px solid rgba(227,6,19,0.3)`, borderRadius:14, padding:14, marginBottom:16 }}><div style={{ fontSize:11, color:JLL_RED, fontWeight:700, marginBottom:6 }}>⚡ CONNECTED WORKFLOW</div><div style={{ fontSize:12, color:"rgba(255,255,255,0.6)", marginBottom:10 }}>Run a Fault Diagnosis → it pre-fills your Safety Briefing → which pre-fills your Service Report. One job, three agents, zero re-entry.</div><button onClick={()=>onNav("agents","diag")} style={{ background:JLL_RED, border:"none", borderRadius:8, padding:"8px 14px", cursor:"pointer", fontSize:12, fontWeight:700, color:"#fff" }}>Start Workflow →</button></div>
        {recentChats.length>0&&(<><SectionTitle>RECENT JOBS</SectionTitle>{recentChats.slice(0,3).map(c=>{const last=c.messages[c.messages.length-1]; return (<div key={c.id} className="card-hover" onClick={()=>onOpenChat(c.id)} style={{ background:CARD, border:`1px solid rgba(227,6,19,0.12)`, borderRadius:12, padding:"11px 12px", marginBottom:8, cursor:"pointer", display:"flex", alignItems:"center", gap:10 }}><div style={{ width:34, height:34, background:JLL_RED, borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>🔧</div><div style={{ flex:1, minWidth:0 }}><div style={{ fontSize:12, fontWeight:700, color:"#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{c.title}</div><div style={{ fontSize:10, color:"rgba(255,255,255,0.3)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{last?(last.content.length>45?last.content.slice(0,45)+"…":last.content):"No messages"}</div></div><div style={{ fontSize:10, color:"rgba(255,255,255,0.2)" }}>{timeAgo(c.updatedAt)}</div></div>);})}</>)}
        <SectionTitle>ALL TOOLS</SectionTitle>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:6 }}>
          {[
            { id:"docs", icon:"📚", label:"Docs" }, { id:"model", icon:"🔍", label:"Models" }, { id:"pt", icon:"🌡️", label:"PT Chart" },
            { id:"notes", icon:"📝", label:"Notes" }, { id:"equip", icon:"🏭", label:"Equipment" }, { id:"parts", icon:"🔩", label:"Parts Log" },
            { id:"photos", icon:"📷", label:"Photos" }, { id:"history", icon:"📋", label:"History" }, { id:"agents", icon:"🤖", label:"All Agents" }
          ].map(t=>(<button key={t.id} onClick={()=>onNav(t.id==="docs"||t.id==="agents"?t.id:"tools", t.id)} className="card-hover" style={{ background:CARD, border:`1px solid rgba(227,6,19,0.12)`, borderRadius:10, padding:"11px 6px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}><span style={{ fontSize:20 }}>{t.icon}</span><span style={{ fontSize:10, fontWeight:600, color:"rgba(255,255,255,0.6)" }}>{t.label}</span></button>))}
        </div>
      </div>
    </div>
  );
}

// ----- Main App with 5-tab navigation and API key check -----
function MTSAssistant() {
  const [apiKey, setApiKey] = useState(null);
  const [profile, setProfile] = useState(null);
  const [tab, setTab] = useState("home");
  const [chatView, setChatView] = useState("list");
  const [agentView, setAgentView] = useState("hub");
  const [toolView, setToolView] = useState("hub");
  const [chats, setChats] = useState([]);
  const [activeChatId, setActiveChatId] = useState(null);
  const [loading, setLoading] = useState(false);
  const [deletingId, setDeletingId] = useState(null);
  const [stats, setStats] = useState({chats:0, parts:0, notes:0, history:0});
  const [workflowCtx, setWorkflowCtx] = useState({});
  const storage = window.storage = {
    get: async (k) => { const v=localStorage.getItem('mts__'+k); if(v===null) throw new Error('Not found'); return {key:k,value:v}; },
    set: async (k,v) => { localStorage.setItem('mts__'+k,v); return {key:k,value:v}; },
    delete: async (k) => { localStorage.removeItem('mts__'+k); return {key:k,deleted:true}; },
    list: async (prefix) => { const keys=[], p='mts__'+(prefix||''); for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith(p)) keys.push(k.replace('mts__','')); } return {keys}; }
  };
  useEffect(() => { loadData(); }, []);
  async function loadData() {
    try {
      const key = await storage.get("apiKey"); if (key?.value) setApiKey(key.value);
      const p = await storage.get("profile"); if (p?.value) setProfile(JSON.parse(p.value));
      const r = await storage.list("chat:"); const loaded = [];
      for (const k of r.keys) { try { const rv = await storage.get(k); if (rv?.value) loaded.push(JSON.parse(rv.value)); } catch {} }
      loaded.sort((a,b)=>b.updatedAt-a.updatedAt); setChats(loaded);
      const [partsR, notesR, histR] = await Promise.allSettled([storage.get("parts_log"), storage.get("notes"), storage.get("service_history")]);
      setStats({ chats: loaded.length, parts: partsR.status==="fulfilled"&&partsR.value?.value?JSON.parse(partsR.value.value).length:0, notes: notesR.status==="fulfilled"&&notesR.value?.value?JSON.parse(notesR.value.value).length:0, history: histR.status==="fulfilled"&&histR.value?.value?JSON.parse(histR.value.value).length:0 });
    } catch(e) {}
  }
  async function saveApiKey(key) { setApiKey(key); await storage.set("apiKey", key); }
  async function saveProfile(p) { setProfile(p); await storage.set("profile", JSON.stringify(p)); }
  async function saveChat(chat) { await storage.set("chat:"+chat.id, JSON.stringify(chat)); }
  async function createChat() { const chat={id:genId(), title:"New Job", messages:[], updatedAt:Date.now()}; setChats(prev=>[chat,...prev]); setStats(s=>({...s, chats:s.chats+1})); setActiveChatId(chat.id); setChatView("chat"); setTab("chat"); await saveChat(chat); }
  async function deleteChat(id) { setDeletingId(id); await storage.delete("chat:"+id); setChats(prev=>prev.filter(c=>c.id!==id)); setStats(s=>({...s, chats:Math.max(0,s.chats-1)})); if(activeChatId===id){ setActiveChatId(null); setChatView("list"); } setDeletingId(null); }
  const activeChat = chats.find(c=>c.id===activeChatId);
  async function sendMessage(text) { if(!text||loading||!activeChatId||!apiKey) return; const newMsg={role:"user",content:text}; const msgs=[...(activeChat?.messages||[]), newMsg]; let title=activeChat?.title||"New Job"; if((activeChat?.messages||[]).length===0) title=text.length>40?text.slice(0,40)+"…":text; const updated={...activeChat, title, messages:msgs, updatedAt:Date.now()}; setChats(prev=>prev.map(c=>c.id===activeChatId?updated:c)); setLoading(true); await saveChat(updated); const sys = SYSTEM_PROMPT + (profile?`\nTechnician: ${profile.name}${profile.techId?` (${profile.techId})`:""}`:""); const reply = await callAgent(sys, text, apiKey); const withReply = {...updated, messages:[...msgs, {role:"assistant", content:reply}], updatedAt:Date.now()}; setChats(prev=>prev.map(c=>c.id===activeChatId?withReply:c).sort((a,b)=>b.updatedAt-a.updatedAt)); await saveChat(withReply); setLoading(false); }
  function navTo(targetTab, subId=null) { setTab(targetTab); if(targetTab==="chat") setChatView("list"); if(targetTab==="agents") setAgentView(subId||"hub"); if(targetTab==="tools") setToolView(subId||"hub"); }
  if (!apiKey) return <ApiKeySetup onSave={saveApiKey} />;
  if (!profile) return <OnboardingScreen onComplete={saveProfile} />;
  return (
    <div style={{ height:"100vh", background:BG, display:"flex", flexDirection:"column", fontFamily:"'Barlow',sans-serif", maxWidth:480, margin:"0 auto" }}>
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
        {tab==="home" && <DashboardScreen profile={profile} stats={stats} recentChats={chats.slice(0,3)} onStartJob={createChat} onNav={navTo} onOpenChat={id=>{ setActiveChatId(id); setChatView("chat"); setTab("chat"); }} />}
        {tab==="chat" && chatView==="list" && <ChatListScreen chats={chats} onOpen={id=>{ setActiveChatId(id); setChatView("chat"); }} onCreate={createChat} onDelete={deleteChat} deletingId={deletingId} />}
        {tab==="chat" && chatView==="chat" && <ChatScreen chat={activeChat} onBack={()=>setChatView("list")} onSend={sendMessage} loading={loading} apiKey={apiKey} />}
        {tab==="agents" && agentView==="hub" && <AgentsHubScreen onSelect={id=>setAgentView(id)} />}
        {agentView !== "hub" && tab==="agents" && (<div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}><button onClick={()=>setAgentView("hub")} style={{ background:BLACK, border:"none", borderBottom:`1px solid ${BORDER}`, padding:"11px 16px", cursor:"pointer", color:JLL_RED, fontSize:13, fontWeight:700, textAlign:"left", display:"flex", alignItems:"center", gap:6 }}>← All Agents</button>{agentView==="diag" && <FaultDiagnosisAgent workflowCtx={workflowCtx} onWorkflowComplete={ctx=>setWorkflowCtx(prev=>({...prev,...ctx}))} onChainTo={id=>setAgentView(id)} apiKey={apiKey} />}{agentView==="escalate" && <EscalationAgent apiKey={apiKey} />}{agentView==="predict" && <PredictiveMaintenanceAgent storage={storage} apiKey={apiKey} />}{agentView==="parts" && <PartsFinderAgent workflowCtx={workflowCtx} apiKey={apiKey} />}{agentView==="refcalc" && <RefrigerantCalcAgent apiKey={apiKey} />}{agentView==="commission" && <CommissioningAgent apiKey={apiKey} />}{agentView==="safety" && <SafetyBriefingAgent workflowCtx={workflowCtx} apiKey={apiKey} />}{agentView==="report" && <ServiceReportAgent storage={storage} profile={profile} workflowCtx={workflowCtx} apiKey={apiKey} />}</div>)}
        {tab==="docs" && <DocumentLibraryScreen storage={storage} apiKey={apiKey} />}
        {tab==="tools" && toolView==="hub" && <ToolsHubScreen onSelect={id=>setToolView(id)} />}
        {toolView !== "hub" && tab==="tools" && (<div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}><button onClick={()=>setToolView("hub")} style={{ background:BLACK, border:"none", borderBottom:`1px solid ${BORDER}`, padding:"11px 16px", cursor:"pointer", color:JLL_RED, fontSize:13, fontWeight:700, textAlign:"left", display:"flex", alignItems:"center", gap:6 }}>← All Tools</button>{toolView==="model" && <ModelLookupScreen storage={storage} />}{toolView==="pt" && <PTChartScreen />}{toolView==="notes" && <NotesScreen storage={storage} />}{toolView==="equip" && <EquipmentScreen storage={storage} />}{toolView==="parts" && <PartsLogScreen storage={storage} />}{toolView==="photos" && <PhotoScreen storage={storage} />}{toolView==="history" && <ServiceHistoryScreen storage={storage} />}</div>)}
      </div>
      <div style={{ background:BLACK, borderTop:`2px solid rgba(227,6,19,0.3)`, display:"flex", flexShrink:0 }}>
        {[
          { id:"home", icon:"🏠", label:"Home" },
          { id:"chat", icon:"💬", label:"Chat" },
          { id:"agents", icon:"🤖", label:"Agents" },
          { id:"docs", icon:"📚", label:"Docs" },
          { id:"tools", icon:"🛠️", label:"Tools" }
        ].map(t=>(
          <button key={t.id} onClick={()=>navTo(t.id)} style={{ flex:1, background:"transparent", border:"none", padding:"8px 2px 5px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:1, color:tab===t.id?JLL_RED:"rgba(255,255,255,0.4)" }}>
            <span style={{ fontSize:20 }}>{t.icon}</span>
            <span style={{ fontSize:9, fontWeight:700, letterSpacing:".03em", marginTop:1 }}>{t.label}</span>
            {tab===t.id && <div style={{ width:18, height:2, background:JLL_RED, borderRadius:1, marginTop:2 }} />}
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(MTSAssistant));
</script>
