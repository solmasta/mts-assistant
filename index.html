        const splash = document.getElementById('splash');
        if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 500); }
      }, 1800);
    });

    // Storage API using localStorage
    window.storage = {
      get: async (key) => {
        const val = localStorage.getItem('mts__' + key);
        if (val === null) throw new Error('Key not found: ' + key);
        return { key, value: val };
      },
      set: async (key, value) => {
        localStorage.setItem('mts__' + key, value);
        return { key, value };
      },
      delete: async (key) => {
        localStorage.removeItem('mts__' + key);
        return { key, deleted: true };
      },
      list: async (prefix) => {
        const keys = [];
        const p = 'mts__' + (prefix || '');
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(p)) keys.push(k.replace('mts__', ''));
        }
        return { keys };
      }
    };
  </script>

  <script type="text/babel" src="./app.jsx"></script>

  <script>
    // Mount after Babel compiles
    window.addEventListener('load', () => {
      setTimeout(() => {
        const container = document.getElementById('root');
        if (container && window.MTSAssistant) {
          const root = ReactDOM.createRoot(container);
          root.render(React.createElement(window.MTSAssistant));
        }
      }, 100);
    });
  </script>
</body>
</html>
