<div id="root"></div>
<script type="text/babel">

const {useState,useEffect,useRef}=React;
const RED="#E30613",BG="#0a0a0a",CARD="#161616",DARK="#111",BORDER="rgba(227,6,19,0.2)";
const PROXY="https://mts-proxy-omega.vercel.app/api/proxy";

// ── STORAGE ──────────────────────────────────────────────────────────────
const S={
  get:async k=>{const v=localStorage.getItem('m__'+k);if(v===null)throw 0;return{value:v};},
  set:async(k,v)=>{localStorage.setItem('m__'+k,v);return{value:v};},
  del:async k=>{localStorage.removeItem('m__'+k);},
  list:async p=>{const out=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('m__'+(p||'')))out.push(k.slice(3));}return out;}
};

// ── AI CALL ──────────────────────────────────────────────────────────────
async function ai(system,prompt){
  try{
    const r=await fetch(PROXY,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        systemInstruction:{parts:[{text:system}]},
        contents:[{role:"user",parts:[{text:prompt}]}],
        generationConfig:{maxOutputTokens:2000}
      })
    });
    const d=await r.json();
    if(d.error)return"⚠️ "+(d.error.message||JSON.stringify(d.error));
    return d.candidates?.[0]?.content?.parts?.map(p=>p.text).join("")||"No response.";
  }catch(e){return"⚠️ "+e.message;}
}

// ── HELPERS ──────────────────────────────────────────────────────────────
const gid=()=>"id"+Date.now()+Math.random().toString(36).slice(2,5);
const ago=t=>{const m=Math.floor((Date.now()-t)/60000);return m<1?"now":m<60?m+"m":Math.floor(m/60)+"h";};
const BRANDS=["Carrier","Trane","York","Lennox","Daikin","Mitsubishi","LG","Goodman","Rheem","Ruud","Bryant","Bosch","American Standard","Amana"];
const REFS=["R-410A","R-22","R-32","R-454B","R-407C","R-134a"];

// ── UI PRIMITIVES ────────────────────────────────────────────────────────
function Btn({c,onClick,disabled,red,style={}}){
  return <button onClick={onClick} disabled={disabled} style={{
    background:red?"linear-gradient(135deg,#E30613,#b00010)":CARD,
    border:red?"none":`1px solid ${BORDER}`,
    borderRadius:12,padding:"11px 18px",color:"#fff",fontWeight:700,
    fontSize:14,cursor:"pointer",opacity:disabled?.4:1,
    boxShadow:red?"0 4px 16px rgba(227,6,19,.3)":"none",...style
  }}>{c}</button>;
}

function Inp({label,val,set,ph,type="text",rows}){
  const s={width:"100%",background:"#1a1a1a",border:`1px solid ${BORDER}`,
    borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:14,outline:"none",fontFamily:"inherit"};
  return <div style={{marginBottom:12}}>
    {label&&<div style={{fontSize:11,color:"rgba(255,255,255,.5)",fontWeight:700,marginBottom:4,letterSpacing:".08em"}}>{label}</div>}
    {rows
      ?<textarea value={val} onChange={e=>set(e.target.value)} placeholder={ph} rows={rows} style={{...s,resize:"vertical"}}/>
      :<input type={type} value={val} onChange={e=>set(e.target.value)} placeholder={ph} style={s}/>
    }
  </div>;
}

function Sel({label,val,set,opts}){
  return <div style={{marginBottom:12}}>
    {label&&<div style={{fontSize:11,color:"rgba(255,255,255,.5)",fontWeight:700,marginBottom:4,letterSpacing:".08em"}}>{label}</div>}
    <select value={val} onChange={e=>set(e.target.value)} style={{
      width:"100%",background:"#1a1a1a",border:`1px solid ${BORDER}`,borderRadius:10,
      padding:"10px 12px",color:val?"#fff":"rgba(255,255,255,.35)",fontSize:14,outline:"none",fontFamily:"inherit"}}>
      <option value="">Select…</option>
      {opts.map(o=><option key={o}>{o}</option>)}
    </select>
  </div>;
}

function Spin({label}){
  return <div style={{padding:"60px 20px",textAlign:"center"}}>
    <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:14}}>
      {[0,1,2].map(i=><div key={i} style={{width:9,height:9,borderRadius:"50%",background:RED,
        animation:"bounce 1.2s infinite",animationDelay:i*.2+"s"}}/>)}
    </div>
    <div style={{color:"rgba(255,255,255,.4)",fontSize:12,letterSpacing:".1em"}}>{label}</div>
  </div>;
}

function Hdr({title,sub,onBack}){
  return <div style={{background:DARK,borderBottom:`3px solid ${RED}`,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
    {onBack&&<button onClick={onBack} style={{background:"rgba(255,255,255,.08)",border:"none",borderRadius:8,padding:"6px 12px",color:"#fff",fontSize:18,cursor:"pointer"}}>←</button>}
    <div>
      <div style={{fontSize:17,fontWeight:800,color:"#fff"}}>{title}</div>
      <div style={{fontSize:11,color:RED,fontWeight:600,marginTop:2}}>{sub}</div>
    </div>
  </div>;
}

function Card({c,style={},onClick}){
  return <div onClick={onClick} style={{background:CARD,border:`1px solid ${BORDER}`,
    borderRadius:14,padding:14,marginBottom:10,...style,cursor:onClick?"pointer":"default"}}>{c}</div>;
}

// ── AGENTS ───────────────────────────────────────────────────────────────
function AgentScreen({title,sub,intro,form,onRun,canRun,result,onReset,resetLabel,chainBtns}){
  const [step,setStep]=useState(0);
  const [res,setRes]=useState("");
  async function run(){
    setStep(1);
    const r=await onRun();
    setRes(r);
    setStep(2);
  }
  return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <Hdr title={title} sub={step===1?"WORKING…":step===2?"COMPLETE":sub}/>
    <div style={{flex:1,overflowY:"auto",padding:14}}>
      {step===0&&<>
        {intro&&<Card style={{background:"rgba(227,6,19,.06)",marginBottom:14}} c={<div style={{fontSize:12,color:"rgba(255,255,255,.6)",lineHeight:1.5}}>{intro}</div>}/>}
        {form}
        <Btn red c="▶ Run Agent" onClick={run} disabled={!canRun} style={{width:"100%",padding:13,marginTop:4}}/>
      </>}
      {step===1&&<Spin label="ANALYSING…"/>}
      {step===2&&<>
        <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:14,
          whiteSpace:"pre-wrap",fontSize:13,color:"#ddd",lineHeight:1.7,marginBottom:12}}>{res}</div>
        {chainBtns&&<div style={{background:"rgba(227,6,19,.07)",border:`1px solid rgba(227,6,19,.25)`,borderRadius:12,padding:12,marginBottom:12}}>
          <div style={{fontSize:11,color:RED,fontWeight:700,marginBottom:8}}>⚡ CONTINUE WORKFLOW</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{chainBtns}</div>
        </div>}
        <Btn red c={resetLabel||"Run Again"} onClick={()=>{setStep(0);setRes("");if(onReset)onReset();}} style={{width:"100%"}}/>
      </>}
    </div>
  </div>;
}

// 1. Fault Diagnosis
function DiagAgent({ctx,setCtx,onChain}){
  const [brand,setBrand]=useState(ctx?.diagBrand||"");
  const [model,setModel]=useState(ctx?.diagModel||"");
  const [equip,setEquip]=useState(ctx?.diagEquip||"");
  const [fault,setFault]=useState("");
  const [ref,setRef]=useState(ctx?.diagRef||"");
  const [age,setAge]=useState("");
  const [symp,setSymp]=useState(ctx?.diagSymp||"");
  return <AgentScreen
    title="FAULT DIAGNOSIS" sub="AI DIAGNOSTIC AGENT"
    intro="🤖 Describe the fault — the AI ranks causes by probability and gives a full diagnostic procedure."
    canRun={!!symp.trim()}
    onRun={async()=>{
      const r=await ai(
        "You are an expert HVAC fault diagnosis agent for JLL MTS. Give structured ranked diagnosis with probability percentages. Flag safety items with ⚠️. Be concise and field-ready.",
        `Diagnose this HVAC fault:\nEquipment: ${equip||"Unknown"} - ${brand||"Unknown"} ${model||""}\nFault code: ${fault||"None"}\nRefrigerant: ${ref||"Unknown"}\nAge: ${age||"Unknown"} years\nSymptoms: ${symp}\n\nProvide:\n1) TOP 3 CAUSES ranked by probability %\n2) IMMEDIATE on-site checks\n3) STEP-BY-STEP diagnostic procedure\n4) ⚠️ SAFETY notes\n5) When to escalate`
      );
      if(setCtx)setCtx({diagBrand:brand,diagModel:model,diagEquip:equip,diagRef:ref,diagSymp:symp});
      return r;
    }}
    chainBtns={onChain&&<>
      <button onClick={()=>onChain("safety")} style={{background:RED,border:"none",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:12,fontWeight:700,color:"#fff"}}>🦺 Safety →</button>
      <button onClick={()=>onChain("parts")} style={{background:"#222",border:`1px solid ${BORDER}`,borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:12,fontWeight:700,color:"#fff"}}>🔩 Parts →</button>
      <button onClick={()=>onChain("report")} style={{background:"#222",border:`1px solid ${BORDER}`,borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:12,fontWeight:700,color:"#fff"}}>📄 Report →</button>
    </>}
    form={<>
      <Sel label="EQUIPMENT TYPE" val={equip} set={setEquip} opts={["RTU","Chiller","Split System","VRF/VRV","Air Handler","Heat Pump","Mini-Split","FCU","Boiler"]}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel label="BRAND" val={brand} set={setBrand} opts={BRANDS}/>
        <Inp label="MODEL #" val={model} set={setModel} ph="e.g. 48XC024"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Inp label="FAULT CODE" val={fault} set={setFault} ph="e.g. E79"/>
        <Sel label="REFRIGERANT" val={ref} set={setRef} opts={REFS}/>
      </div>
      <Inp label="UNIT AGE (years)" val={age} set={setAge} ph="e.g. 7" type="number"/>
      <Inp label="SYMPTOMS *" val={symp} set={setSymp} ph="Describe what the unit is doing…" rows={4}/>
    </>}
  />;
}

// 2. Predictive Maintenance

  const [age,setAge]=useState("");
  const [hours,setHours]=useState("");
  const [obs,setObs]=useState([]);

  const OBS=["Unusual noise","High amps","Frequent cycling","Reduced airflow","Ice formation","Oil stains","Vibration","Longer run times","Refrigerant loss","Delayed startup"];
  const tog=o=>setObs(p=>p.includes(o)?p.filter(x=>x!==o):[...p,o]);
  return <AgentScreen
    title="PREDICTIVE MAINT." sub="FAILURE PREDICTION AGENT"
    intro="📈 Analyses equipment age, runtime, and observations to predict what will fail next."
    canRun={!!equip}
    onRun={()=>ai(
      "You are an expert HVAC predictive maintenance agent. Predict component failures by risk level. Be specific about which components and timeframes.",
      `Predictive maintenance analysis:\nEquipment: ${equip} - ${brand||"Unknown"}\nAge: ${age||"Unknown"} years\nRun hours: ${hours||"Unknown"}\nObservations: ${obs.join(", ")||"None"}\nKnown issues: ${issues||"None"}\n\nProvide:\n1) 🔴 IMMEDIATE failures (within 30 days)\n2) 🟡 SHORT-TERM risks (3 months)\n3) 🟢 SCHEDULE soon (6 months)\n4) Component health ratings\n5) Recommended PM actions\n6) 12-month PM schedule`

    form={<>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel label="EQUIPMENT" val={equip} set={setEquip} opts={["RTU","Chiller","Split System","VRF/VRV","Air Handler","Heat Pump","FCU","Cooling Tower"]}/>
        <Sel label="BRAND" val={brand} set={setBrand} opts={BRANDS}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Inp label="AGE (years)" val={age} set={setAge} ph="e.g. 12" type="number"/>
        <Inp label="RUN HOURS" val={hours} set={setHours} ph="e.g. 35000" type="number"/>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,.5)",fontWeight:700,marginBottom:8,letterSpacing:".08em"}}>OBSERVATIONS</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {OBS.map(o=><button key={o} onClick={()=>tog(o)} style={{
            background:obs.includes(o)?RED:"#1a1a1a",border:`1px solid ${obs.includes(o)?RED:BORDER}`,
            borderRadius:20,padding:"5px 11px",cursor:"pointer",fontSize:11,color:"#fff",
            fontWeight:obs.includes(o)?700:400}}>{o}</button>)}
        </div>
      </div>
      <Inp label="KNOWN ISSUES" val={issues} set={setIssues} ph="Recurring problems…" rows={2}/>
    </>}
  />;
}

// 5. Safety Briefing
function SafetyAgent({ctx}){
  const [job,setJob]=useState("");
  const [equip,setEquip]=useState(ctx?.diagEquip||"");
  const [ref,setRef]=useState(ctx?.diagRef||"");
  const [loc,setLoc]=useState("");
  const [haz,setHaz]=useState([]);
  const JOBS=["Fault Diagnosis","Electrical Work","Refrigerant Handling","Compressor Replacement","Coil Cleaning","Control Board Replacement","Gas Heat Repair","Rooftop Access","Preventive Maintenance"];
  const LOCS=["Rooftop","Basement / Plant Room","Electrical Room","Confined Space","Outdoors","Indoor – Occupied"];
  const HAZS=["Electrical >50V","Refrigerant present","Gas / flame","Height >6ft","Confined space","Occupied building","Working alone","Extreme heat"];
  const tog=h=>setHaz(p=>p.includes(h)?p.filter(x=>x!==h):[...p,h]);
  return <AgentScreen
    title="SAFETY BRIEFING" sub="PRE-JOB SAFETY AGENT"
    intro="🦺 Generates task-specific PPE, LOTO procedure, and hazard checklist before you start."
    canRun={!!job}
    onRun={()=>ai(
      "You are an expert HVAC safety officer for JLL MTS. Generate thorough task-specific safety briefings covering OSHA and EPA 608 requirements.",
      `Pre-job safety briefing:\nJob: ${job}\nEquipment: ${equip||"Not specified"}\nLocation: ${loc||"Not specified"}\nRefrigerant: ${ref||"Not specified"}\nAdditional hazards: ${haz.join(", ")||"None"}\n\nGenerate:\n1) ⚠️ CRITICAL safety warnings\n2) 🦺 Required PPE (specific to this job)\n3) 🔐 LOTO procedure (step-by-step)\n4) ☢️ Refrigerant safety (if applicable)\n5) ⚡ Electrical safety\n6) ✅ Pre-job checklist (8-10 items)\n7) 📞 Emergency response`
    )}
    onReset={()=>setHaz([])}
    form={<>
      {(ctx?.diagEquip||ctx?.diagRef)&&<Card style={{background:"rgba(39,174,96,.08)",border:"1px solid rgba(39,174,96,.25)",marginBottom:12}} c={<div style={{fontSize:11,color:"#27AE60"}}>⚡ Pre-filled from Diagnosis: {[ctx?.diagEquip,ctx?.diagRef].filter(Boolean).join(" · ")}</div>}/>}
      <Sel label="JOB TYPE *" val={job} set={setJob} opts={JOBS}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel label="EQUIPMENT" val={equip} set={setEquip} opts={["RTU","Chiller","Split System","VRF/VRV","Air Handler","Heat Pump","FCU","Boiler"]}/>
        <Sel label="LOCATION" val={loc} set={setLoc} opts={LOCS}/>
      </div>
      <Sel label="REFRIGERANT" val={ref} set={setRef} opts={REFS}/>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,.5)",fontWeight:700,marginBottom:8}}>HAZARDS</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {HAZS.map(h=><button key={h} onClick={()=>tog(h)} style={{
            background:haz.includes(h)?RED:"#1a1a1a",border:`1px solid ${haz.includes(h)?RED:BORDER}`,
            borderRadius:20,padding:"5px 11px",cursor:"pointer",fontSize:11,color:"#fff",
            fontWeight:haz.includes(h)?700:400}}>{h}</button>)}
        </div>
      </div>
    </>}
  />;
}

const PT={
  "R-410A":[[40,83],[50,102],[60,123],[70,147],[80,174],[90,205],[100,238],[110,275],[120,315]],
  "R-22":[[20,37],[30,47],[40,59],[50,72],[60,87],[70,103],[80,121],[90,141],[100,163]],
  "R-32":[[40,90],[50,111],[60,134],[70,160],[80,189],[90,221],[100,256],[110,294],[120,335]],
  "R-454B":[[40,83],[50,102],[60,124],[70,148],[80,175],[90,205],[100,238],[110,274],[120,314]],
  "R-407C":[[40,72],[50,89],[60,108],[70,129],[80,152],[90,178],[100,207],[110,238],[120,272]],
  "R-134a":[[20,26],[30,35],[40,46],[50,59],[60,73],[70,90],[80,110],[90,132],[100,157]],
};
function PTChart(){
  const [ref,setRef]=useState("R-410A");
  const [temp,setTemp]=useState("");const [press,setPress]=useState("");
  const [result,setResult]=useState(null);
  function calc(){
    const d=PT[ref];
    if(temp){
      const t=parseFloat(temp);
      for(let i=0;i<d.length-1;i++){
        if(t>=d[i][0]&&t<=d[i+1][0]){
          const r=d[i][1]+(d[i+1][1]-d[i][1])*(t-d[i][0])/(d[i+1][0]-d[i][0]);
          setResult({type:"Temp→Press",input:t+"°F",output:r.toFixed(1)+" psig"});return;
        }
      }
    }
    if(press){
      const p=parseFloat(press);
      for(let i=0;i<d.length-1;i++){
        if(p>=d[i][1]&&p<=d[i+1][1]){
          const r=d[i][0]+(d[i+1][0]-d[i][0])*(p-d[i][1])/(d[i+1][1]-d[i][1]);
          setResult({type:"Press→Temp",input:p+" psig",output:r.toFixed(1)+"°F"});return;
        }
      }
    }
    setResult({type:"Error",output:"Out of range"});
  }
  return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <Hdr title="PT CHART" sub="PRESSURE-TEMPERATURE"/>
    <div style={{flex:1,overflowY:"auto",padding:14}}>
      <Sel label="REFRIGERANT" val={ref} set={r=>{setRef(r);setResult(null);}} opts={Object.keys(PT)}/>
      <Card style={{marginBottom:14}} c={<>
        <div style={{fontSize:11,color:RED,fontWeight:700,marginBottom:12}}>ENTER ONE VALUE</div>
        <Inp label="TEMPERATURE (°F)" val={temp} set={v=>{setTemp(v);setPress("");}} ph="e.g. 45" type="number"/>
        <div style={{textAlign:"center",color:"rgba(255,255,255,.3)",fontSize:12,margin:"4px 0 12px"}}>— or —</div>
        <Inp label="PRESSURE (psig)" val={press} set={v=>{setPress(v);setTemp("");}} ph="e.g. 130" type="number"/>
        <Btn red c="Calculate" onClick={calc} disabled={!temp&&!press} style={{width:"100%",marginTop:4}}/>
      </>}/>
      {result&&<Card style={{background:result.type==="Error"?"rgba(227,6,19,.12)":"rgba(39,174,96,.12)",border:`1px solid ${result.type==="Error"?"rgba(227,6,19,.4)":"rgba(39,174,96,.4)"}`}} c={<>
        <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginBottom:4}}>{ref} · {result.type}</div>
        {result.input&&<div style={{fontSize:13,color:"rgba(255,255,255,.7)",marginBottom:4}}>Input: <strong style={{color:"#fff"}}>{result.input}</strong></div>}
        <div style={{fontSize:22,fontWeight:900,color:result.type==="Error"?RED:"#27AE60"}}>{result.output}</div>
      </>}/>}
    </div>
  </div>;
}

        <Inp label="LOCATION" val={loc} set={setLoc} ph="e.g. Rooftop"/>
        <Btn red c="+ Save Equipment" onClick={save} disabled={!model.trim()} style={{width:"100%"}}/>
      </>}/>
      {saved.length===0&&<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,.3)"}}>No equipment yet</div>}
      {saved.map(e=><Card key={e.id} c={<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{e.brand} {e.model}</div>
          {e.serial&&<div style={{fontSize:11,color:"rgba(255,255,255,.4)",marginTop:2}}>S/N: {e.serial}</div>}
          {e.loc&&<div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>{e.loc}</div>}
        </div>
        <button onClick={()=>del(e.id)} style={{background:"none",border:"none",color:"rgba(255,255,255,.25)",cursor:"pointer",fontSize:16}}>×</button>
      </div>}/>)}
    </div>
  </div>;
}

// ── MAIN APP ─────────────────────────────────────────────────────────────
function App(){
  const [profile,setProfile]=useState(null);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("home");
  const [chatView,setChatView]=useState("list");
  const [agentView,setAgentView]=useState("hub");
  const [toolView,setToolView]=useState("hub");
  const [chats,setChats]=useState([]);
  const [activeId,setActiveId]=useState(null);
  const [busy,setBusy]=useState(false);
  const [wCtx,setWCtx]=useState({});

  useEffect(()=>{init();},[]);
  async function init(){
    try{const p=await S.get("profile");if(p?.value)setProfile(JSON.parse(p.value));}catch{}
    try{const keys=await S.list("chat:");const loaded=[];
      for(const k of keys){try{const r=await S.get(k);if(r?.value)loaded.push(JSON.parse(r.value));}catch{}}
      loaded.sort((a,b)=>b.updatedAt-a.updatedAt);setChats(loaded);
    }catch{}
    setLoading(false);
    setTimeout(()=>{const s=document.getElementById("splash");if(s){s.style.opacity="0";setTimeout(()=>s.remove(),500);}},2200);
  }

  async function doOnboard(p){setProfile(p);await S.set("profile",JSON.stringify(p));}

  async function newChat(){
    const c={id:gid(),title:"New Job",messages:[],updatedAt:Date.now()};
    setChats(prev=>[c,...prev]);
    setActiveId(c.id);setChatView("chat");setTab("chat");
    await S.set("chat:"+c.id,JSON.stringify(c));
  }
  async function delChat(id){
    const u=chats.filter(c=>c.id!==id);setChats(u);
    if(activeId===id){setActiveId(null);setChatView("list");}
    await S.del("chat:"+id);
  }
  const activeChat=chats.find(c=>c.id===activeId);
  async function sendMsg(text){
    if(!text||busy||!activeId)return;
    const msg={role:"user",content:text};
    const msgs=[...(activeChat?.messages||[]),msg];
    const title=(activeChat?.messages||[]).length===0?(text.length>40?text.slice(0,40)+"…":text):activeChat.title;
    const updated={...activeChat,title,messages:msgs,updatedAt:Date.now()};
    setChats(prev=>prev.map(c=>c.id===activeId?updated:c));
    setBusy(true);
    await S.set("chat:"+activeId,JSON.stringify(updated));
    const sys="You are MTS Assistant, an expert AI for JLL MTS mobile HVAC engineers. Help diagnose faults, install parts, provide safety guidance. Be concise and use numbered steps. Flag safety items with ⚠️."+(profile?"\nTechnician: "+profile.name+(profile.region?", "+profile.region:""):"");
    const reply=await ai(sys,text);
    const withReply={...updated,messages:[...msgs,{role:"assistant",content:reply}],updatedAt:Date.now()};
    setChats(prev=>prev.map(c=>c.id===activeId?withReply:c).sort((a,b)=>b.updatedAt-a.updatedAt));
    await S.set("chat:"+activeId,JSON.stringify(withReply));
    setBusy(false);
  }

  function nav(t,sub){
    setTab(t);
    if(t==="chat")setChatView("list");
    if(t==="agents")setAgentView(sub||"hub");
    if(t==="tools")setToolView(sub||"hub");
  }

  if(loading)return null;
  if(!profile)return <Onboarding onDone={doOnboard}/>;

  const TABS=[{id:"home",i:"🏠",l:"Home"},{id:"chat",i:"💬",l:"Chat"},{id:"agents",i:"🤖",l:"Agents"},{id:"docs",i:"📚",l:"Docs"},{id:"tools",i:"🛠️",l:"Tools"}];

  return <div style={{height:"100vh",background:BG,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {tab==="home"&&<Dashboard profile={profile} jobs={chats.length} onNewJob={newChat} onNav={nav}/>}
      {tab==="chat"&&chatView==="list"&&<ChatList chats={chats} onOpen={id=>{setActiveId(id);setChatView("chat");}} onCreate={newChat} onDel={delChat}/>}
      {tab==="chat"&&chatView==="chat"&&<ChatConvo chat={activeChat} onBack={()=>setChatView("list")} onSend={sendMsg} busy={busy}/>}
      {tab==="agents"&&agentView==="hub"&&<AgentsHub onSel={v=>setAgentView(v)}/>}
      {tab==="agents"&&agentView!=="hub"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <button onClick={()=>setAgentView("hub")} style={{background:DARK,border:"none",borderBottom:`1px solid ${BORDER}`,padding:"10px 16px",color:RED,fontWeight:700,fontSize:13,cursor:"pointer",width:"100%",textAlign:"left",flexShrink:0}}>← All Agents</button>
        {agentView==="diag"&&<DiagAgent ctx={wCtx} setCtx={c=>setWCtx(p=>({...p,...c}))} onChain={id=>setAgentView(id)}/>}
        {agentView==="predict"&&<PredAgent/>}
        {agentView==="parts"&&<PartsAgent ctx={wCtx}/>}
        {agentView==="refcalc"&&<RefAgent/>}
        {agentView==="safety"&&<SafetyAgent ctx={wCtx}/>}
        {agentView==="report"&&<ReportAgent ctx={wCtx} profile={profile}/>}
      </div>}
      {tab==="docs"&&<Docs/>}
      {tab==="tools"&&toolView==="hub"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <Hdr title="TOOLS" sub="FIELD TOOLS"/>
        <div style={{flex:1,padding:14,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,alignContent:"start"}}>
          {[{id:"pt",i:"🌡️",l:"PT Chart",d:"Pressure-temp calculator"},{id:"model",i:"🔍",l:"Model Lookup",d:"Equipment register"},{id:"notes",i:"📝",l:"Job Notes",d:"Field notes"}]
            .map(t=><button key={t.id} onClick={()=>setToolView(t.id)} style={{
              background:CARD,border:`1px solid ${BORDER}`,borderRadius:14,padding:16,
              cursor:"pointer",textAlign:"left",display:"flex",flexDirection:"column",gap:6}}>
              <span style={{fontSize:28}}>{t.i}</span>
              <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{t.l}</span>
              <span style={{fontSize:11,color:"rgba(255,255,255,.4)",lineHeight:1.4}}>{t.d}</span>
            </button>)}
        </div>
      </div>}
      {tab==="tools"&&toolView!=="hub"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <button onClick={()=>setToolView("hub")} style={{background:DARK,border:"none",borderBottom:`1px solid ${BORDER}`,padding:"10px 16px",color:RED,fontWeight:700,fontSize:13,cursor:"pointer",width:"100%",textAlign:"left",flexShrink:0}}>← All Tools</button>
        {toolView==="pt"&&<PTChart/>}
        {toolView==="model"&&<Models/>}
        {toolView==="notes"&&<Notes/>}
      </div>}
    </div>
    <div style={{background:"#000",borderTop:`2px solid rgba(227,6,19,.3)`,display:"flex",flexShrink:0,boxShadow:"0 -4px 20px rgba(0,0,0,.5)"}}>
      {TABS.map(t=><button key={t.id} onClick={()=>nav(t.id)} style={{
        flex:1,background:"transparent",border:"none",padding:"8px 2px 6px",cursor:"pointer",
        display:"flex",flexDirection:"column",alignItems:"center",gap:1,
        color:tab===t.id?RED:"rgba(255,255,255,.4)"}}>
        <span style={{fontSize:20}}>{t.i}</span>
        <span style={{fontSize:9,fontWeight:700,letterSpacing:".03em"}}>{t.l}</span>
        {tab===t.id&&<div style={{width:18,height:2,background:RED,borderRadius:1,marginTop:1}}/>}
      </button>)}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
</html>
