<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ----- CONSTANTS ------------------------------------------------------------

const GEMINI_API_KEY = "AIzaSyA03el2fK6mtlxpdxfk_XaB91VqPPV6zS4"; // From your README

const SYSTEM_PROMPT = `You are MTS Assistant – Field Assistant, an expert AI tool for JLL MTS mobile HVAC engineers. Help diagnose faults, install parts, provide safety guidance, and find OEM documentation. Be concise, use numbered steps, and flag safety items with ⚠️.`;

  "R-22":   [[-60,-56],[-40,-38],[-20,-16],[0,5],[20,28],[40,51],[60,78],[80,107],[100,140],[120,175],[150,226],[200,302],[250,388]],
  "R-32":   [[-60,-47],[-40,-31],[-20,-13],[0,7],[20,29],[40,53],[60,81],[80,113],[100,148],[120,188],[150,247],[200,338]],
  "R-454B": [[-60,-44],[-40,-29],[-20,-11],[0,9],[20,30],[40,53],[60,80],[80,110],[100,144],[120,182],[150,238],[200,325]],
  "R-407C": [[-60,-52],[-40,-35],[-20,-15],[0,6],[20,28],[40,52],[60,79],[80,109],[100,143],[120,180],[150,233],[200,312]],

const REFRIGERANTS = Object.keys(PT_DATA);

function genId() { return "id_" + Date.now() + "_" + Math.random().toString(36).slice(2,6); }
function timeAgo(ts) {
  const d = Date.now()-ts, m = Math.floor(d/60000), h = Math.floor(d/3600000), days = Math.floor(d/86400000);
  if(m<1) return "Just now";
  if(m<60) return `${m}m ago`;
  if(h<24) return `${h}h ago`;
  return `${days}d ago`;
}

// ----- Shared UI Components -----

// ----- AI Call (Gemini) -----
async function callAgent(systemPrompt, userPrompt) {
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: systemPrompt }] },
        contents: [{ role: "user", parts: [{ text: userPrompt }] }],
        generationConfig: { maxOutputTokens: 2000 }
      })
    });
    const data = await res.json();
    if (data.error) return "⚠️ API Error: " + (data.error.message || JSON.stringify(data.error));
    return data.candidates?.[0]?.content?.parts?.map(p => p.text).join("") || "No response.";
  } catch (err) { return "⚠️ Connection error. Check network."; }
}

// ----- Document Library with Model/Serial Lookup -----
const DOC_DB = [
  { id:"carrier1", keywords: ["carrier","48xc","50xc","38","25vna"], brand:"Carrier", name:"Carrier 48/50XC Service Manual", type:"Service Manual", content:"Carrier 48/50XC Commercial Packaged Units. R-410A. Fault codes: E79 high pressure, E31 low pressure. Subcooling 10-15°F." },
  { id:"trane1", keywords: ["trane","ycd","ych","xv18"], brand:"Trane", name:"Trane YCD/YCH Fault Codes", type:"Fault Code Library", content:"Trane YCD/YCH Codes: 1=High pressure, 2=Low pressure, 3=Compressor over-temp." },
  { id:"york1", keywords: ["york","ykep","yhap"], brand:"York", name:"York Sunline Fault Codes", type:"Fault Code Library", content:"York Sunline: 1=High pressure, 2=Low pressure, 3=Compressor overload." },
  { id:"lennox1", keywords: ["lennox","xg","xpg"], brand:"Lennox", name:"Lennox XG/XPG Fault Codes", type:"Fault Code Library", content:"Lennox E1=High pressure lockout, E2=Low pressure lockout." },
  { id:"daikin1", keywords: ["daikin","vrv","vrv iv"], brand:"Daikin", name:"Daikin VRV IV Commissioning", type:"Commissioning", content:"Daikin VRV IV: pre-startup checks, test run via BRC1H52, pressures 100-180 suction, 350-450 discharge." }
];
function DocumentLibraryScreen({ storage }) {
  const [docs, setDocs] = useState([]);
  const [view, setView] = useState("library");
  const [selectedDoc, setSelectedDoc] = useState(null);
  const [question, setQuestion] = useState("");
  const [answer, setAnswer] = useState("");
  const [asking, setAsking] = useState(false);
  const [search, setSearch] = useState("");
  const [modelSerial, setModelSerial] = useState("");
  const [lookupResult, setLookupResult] = useState(null);
  useEffect(()=>{ setDocs(DOC_DB); },[]);
  function handleLookup() {
    const input = modelSerial.toLowerCase();
    const matched = DOC_DB.filter(d => d.keywords.some(kw => input.includes(kw)) || (d.brand && input.includes(d.brand.toLowerCase())));
    setLookupResult(matched.length ? matched : null);
  }
  async function askDoc(doc, q) {
    if(!q.trim()) return; setAsking(true); setAnswer("");
    const sys = "Answer from the document precisely.";
    const prompt = `Document: ${doc.name}\nContent: ${doc.content}\nQuestion: ${q}`;
    const r = await callAgent(sys, prompt);
    setAnswer(r); setAsking(false);
  }
  const filtered = docs.filter(d => !search || [d.name,d.brand,d.type].join(" ").toLowerCase().includes(search.toLowerCase()));
  if(view==="read" && selectedDoc) {
    return (
      <div style={{ flex:1, display:"flex", flexDirection:"column" }}>
        <Header title="DOCUMENT" subtitle={selectedDoc.brand} onBack={()=>{setView("library");setAnswer("");}} />
        <div style={{ flex:1, overflowY:"auto", padding:14 }}>
          <div style={{ background:CARD, borderRadius:12, padding:14, marginBottom:14, whiteSpace:"pre-wrap", fontSize:12, color:"#ddd" }}>{selectedDoc.content}</div>
          <div style={{ background:CARD, borderRadius:12, padding:14 }}>
            <div style={{ marginBottom:10, fontWeight:700 }}>Ask AI about this document</div>
            <div style={{ display:"flex", gap:8 }}>
              <input value={question} onChange={e=>setQuestion(e.target.value)} placeholder="e.g. What are the fault codes?" style={{ flex:1, background:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px", color:"#fff" }} />
              <button onClick={()=>askDoc(selectedDoc,question)} disabled={asking} style={{ background:JLL_RED, border:"none", borderRadius:10, padding:"10px 16px", color:"#fff" }}>{asking?"…":"Ask"}</button>
            </div>
            {answer && <div style={{ marginTop:12, background:"rgba(0,0,0,0.3)", borderRadius:8, padding:12 }}>{answer}</div>}
          </div>
        </div>
      </div>
    );
  }
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column" }}>
      <Header title="DOCUMENT LIBRARY" subtitle="MANUALS & CODES" />
      <div style={{ flex:1, overflowY:"auto", padding:14 }}>
        <div style={{ background:JLL_RED, borderRadius:12, padding:14, marginBottom:16 }}>
          <div style={{ fontWeight:700, marginBottom:6 }}>🔍 Model / Serial Lookup</div>
          <div style={{ display:"flex", gap:8 }}>
            <input value={modelSerial} onChange={e=>setModelSerial(e.target.value)} placeholder="e.g. 48XC024, Trane YCD" style={{ flex:1, background:"#fff", border:"none", borderRadius:10, padding:"10px", color:"#000" }} />
            <button onClick={handleLookup} style={{ background:BLACK, border:"none", borderRadius:10, padding:"10px 16px", color:"#fff", fontWeight:700 }}>Search</button>
          </div>
          {lookupResult && <div style={{ marginTop:10 }}>{lookupResult.map(d=> <button key={d.id} onClick={()=>{setSelectedDoc(d);setView("read");}} style={{ display:"block", width:"100%", textAlign:"left", background:"rgba(0,0,0,0.2)", border:"none", borderRadius:8, padding:"8px", marginTop:6, color:"#fff" }}>{d.name} ({d.brand})</button>)}</div>}
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search manuals..." style={{ width:"100%", background:CARD, border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px", color:"#fff", marginBottom:12 }} />
        {filtered.map(doc=>(
          <div key={doc.id} className="card-hover" onClick={()=>{setSelectedDoc(doc);setView("read");}} style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:12, padding:12, marginBottom:10 }}>
            <div style={{ fontWeight:700 }}>{doc.name}</div>
            <div style={{ fontSize:11, color:JLL_RED }}>{doc.brand} · {doc.type}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ----- PT Chart Screen -----
function PTChartScreen() {
  const [ref, setRef] = useState("R-410A");
  const [mode, setMode] = useState("P→T");
  const [inputVal, setInputVal] = useState("");
  const [result, setResult] = useState(null);
  function interpolate(data, x, col) {
    const src = col===0?0:1, tgt = col===0?1:0;
    const sorted = [...data].sort((a,b)=>a[src]-b[src]);
    if(x <= sorted[0][src]) return sorted[0][tgt];
    if(x >= sorted[sorted.length-1][src]) return sorted[sorted.length-1][tgt];
    for(let i=0;i<sorted.length-1;i++) if(x>=sorted[i][src]&&x<=sorted[i+1][src]) { const t=(x-sorted[i][src])/(sorted[i+1][src]-sorted[i][src]); return sorted[i][tgt]+t*(sorted[i+1][tgt]-sorted[i][tgt]); }
    return null;
  }
  function calc(){ const v=parseFloat(inputVal); if(isNaN(v)){ setResult("Invalid"); return; } const data=PT_DATA[ref]; const res = mode==="P→T" ? interpolate(data,v,0) : interpolate(data,v,1); setResult(res!==null ? (mode==="P→T"?`Saturation Temp: ${res.toFixed(1)} °F`:`Saturation Pressure: ${res.toFixed(1)} psig`) : "Out of range"); }
  return (
    <div style={{ flex:1 }}>
      <Header title="PT CHART" subtitle="PRESSURE-TEMPERATURE" />
      <div style={{ padding:14 }}>
        <select value={ref} onChange={e=>setRef(e.target.value)} style={{ width:"100%", background:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px", color:"#fff", marginBottom:12 }}>{REFRIGERANTS.map(r=><option key={r}>{r}</option>)}</select>
        <div style={{ display:"flex", gap:8, marginBottom:12 }}>{["P→T","T→P"].map(m=><button key={m} onClick={()=>{setMode(m);setResult(null);}} style={{ flex:1, background:mode===m?JLL_RED:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"9px", color:"#fff", fontWeight:700 }}>{m==="P→T"?"Pressure → Temp":"Temp → Pressure"}</button>)}</div>
        <Input label={mode==="P→T"?"PRESSURE (psig)":"TEMPERATURE (°F)"} value={inputVal} onChange={v=>{setInputVal(v);setResult(null);}} placeholder={mode==="P→T"?"Enter psig…":"Enter °F…"} type="number"/>
        <RedBtn onClick={calc} style={{ width:"100%" }}>Calculate</RedBtn>
        {result && <div style={{ marginTop:12, background:JLL_RED, borderRadius:10, padding:12, textAlign:"center", fontWeight:700 }}>{result}</div>}
      </div>
    </div>
  );
}

// ----- Job Notes Screen -----
function NotesScreen({ storage }) {
  const [notes, setNotes] = useState([]);
  const [title, setTitle] = useState("");
  const [body, setBody] = useState("");
  const [saving, setSaving] = useState(false);
  useEffect(()=>{ load(); },[]);
  async function load(){ try{ const r=await storage.get("notes"); if(r?.value) setNotes(JSON.parse(r.value)); }catch{} }
  async function save(){ if(!body.trim()) return; setSaving(true); const note={id:genId(), title:title||"Untitled", body, createdAt:Date.now()}; const updated=[note,...notes]; setNotes(updated); await storage.set("notes",JSON.stringify(updated)); setTitle(""); setBody(""); setSaving(false); }
  async function del(id){ const updated=notes.filter(n=>n.id!==id); setNotes(updated); await storage.set("notes",JSON.stringify(updated)); }
  return (
    <div style={{ flex:1 }}>
      <Header title="JOB NOTES" subtitle="FIELD NOTES" />
      <div style={{ flex:1, overflowY:"auto", padding:14 }}>
        <div style={{ background:CARD, borderRadius:14, padding:14, marginBottom:16 }}>
          <Input label="TITLE" value={title} onChange={setTitle} placeholder="e.g. Rooftop Unit 3" />
          <Textarea label="NOTE" value={body} onChange={setBody} placeholder="Write job notes..." rows={3} />
          <RedBtn onClick={save} disabled={saving||!body.trim()} style={{ width:"100%" }}>{saving?"Saving…":"Save Note"}</RedBtn>
        </div>
        {notes.map(n=>(
          <div key={n.id} style={{ background:CARD, borderRadius:12, padding:12, marginBottom:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between" }}><div style={{ fontWeight:700 }}>{n.title}</div><button onClick={()=>del(n.id)} style={{ background:"rgba(227,6,19,0.2)", border:"none", borderRadius:6, padding:"3px 8px", color:JLL_RED, cursor:"pointer" }}>Delete</button></div>
            <div style={{ fontSize:12, color:"#aaa", marginTop:4 }}>{n.body}</div>
            <div style={{ fontSize:10, color:"#555", marginTop:4 }}>{timeAgo(n.createdAt)}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function PartsLogScreen({ storage }) {
  const [parts, setParts] = useState([]);

  const [qty, setQty] = useState("1");
  const [cost, setCost] = useState("");
  const [saving, setSaving] = useState(false);
  useEffect(()=>{ load(); },[]);
  async function load(){ try{ const r=await storage.get("parts_log"); if(r?.value) setParts(JSON.parse(r.value)); }catch{} }
  async function save(){ if(!name.trim()) return; setSaving(true); const p={id:genId(), name, partNum, qty, cost, loggedAt:Date.now()}; const updated=[p,...parts]; setParts(updated); await storage.set("parts_log",JSON.stringify(updated)); setName(""); setPartNum(""); setQty("1"); setCost(""); setSaving(false); }
  async function del(id){ const updated=parts.filter(p=>p.id!==id); setParts(updated); await storage.set("parts_log",JSON.stringify(updated)); }
  const total = parts.reduce((sum,p)=>sum + (parseFloat(p.cost)||0)*(parseInt(p.qty)||1),0);
  return (
    <div style={{ flex:1 }}>
      <Header title="PARTS LOG" subtitle="PARTS USED" />
      <div style={{ padding:14 }}>
        <div style={{ background:CARD, borderRadius:14, padding:14, marginBottom:16 }}>
          <Input label="PART NAME" value={name} onChange={setName} placeholder="e.g. Run Capacitor" />
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}><Input label="PART #" value={partNum} onChange={setPartNum} /><Input label="QTY" value={qty} onChange={setQty} type="number" /></div>
          <Input label="COST ($)" value={cost} onChange={setCost} placeholder="0.00" type="number" />
          <RedBtn onClick={save} disabled={saving||!name.trim()} style={{ width:"100%" }}>{saving?"Saving…":"Log Part"}</RedBtn>
        </div>
        {parts.length>0 && <div style={{ textAlign:"right", marginBottom:8, color:JLL_RED, fontWeight:700 }}>Total: ${total.toFixed(2)}</div>}
        {parts.map(p=>(
          <div key={p.id} style={{ background:CARD, borderRadius:12, padding:12, marginBottom:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between" }}><div><span style={{ fontWeight:700 }}>{p.name}</span> {p.partNum && <span style={{ color:"#aaa", marginLeft:6 }}>#{p.partNum}</span>} <span style={{ marginLeft:6 }}>x{p.qty}</span></div><button onClick={()=>del(p.id)} style={{ background:"rgba(227,6,19,0.2)", border:"none", borderRadius:6, padding:"3px 8px", color:JLL_RED, cursor:"pointer" }}>Delete</button></div>
            {p.cost && <div style={{ fontSize:12, color:JLL_RED }}>${(parseFloat(p.cost)*(parseInt(p.qty)||1)).toFixed(2)}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ----- Photo Screen -----
function PhotoScreen({ storage }) {
  const [photos, setPhotos] = useState([]);
  const [preview, setPreview] = useState(null);
  const [caption, setCaption] = useState("");
  const fileRef = useRef(null);
  useEffect(()=>{ load(); },[]);
  async function load(){ try{ const r=await storage.get("photos"); if(r?.value) setPhotos(JSON.parse(r.value)); }catch{} }
  function onFile(e){ const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=ev=>setPreview(ev.target.result); reader.readAsDataURL(file); }
  async function savePhoto(){ if(!preview) return; const photo={id:genId(), data:preview, caption, takenAt:Date.now()}; const updated=[photo,...photos]; setPhotos(updated); await storage.set("photos",JSON.stringify(updated)); setPreview(null); setCaption(""); if(fileRef.current) fileRef.current.value=""; }
  async function del(id){ const updated=photos.filter(p=>p.id!==id); setPhotos(updated); await storage.set("photos",JSON.stringify(updated)); }
  return (
    <div style={{ flex:1 }}>
      <Header title="PHOTOS" subtitle="SITE PHOTOS" />
      <div style={{ padding:14 }}>
        <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={onFile} style={{ display:"none" }} id="photoInput" />
        {!preview ? (
          <label htmlFor="photoInput" style={{ display:"block", background:CARD, border:`2px dashed ${BORDER}`, borderRadius:14, padding:"40px", textAlign:"center", cursor:"pointer" }}>📷 Tap to take photo</label>
        ) : (
          <div style={{ marginBottom:16 }}>
            <img src={preview} alt="preview" style={{ width:"100%", borderRadius:12, marginBottom:8 }} />
            <Input label="CAPTION" value={caption} onChange={setCaption} placeholder="Describe..." />
            <div style={{ display:"flex", gap:8 }}><button onClick={()=>{setPreview(null);setCaption("");}} style={{ flex:1, background:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"8px", color:"#fff" }}>Retake</button><RedBtn onClick={savePhoto} style={{ flex:1 }}>Save</RedBtn></div>
          </div>
        )}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginTop:16 }}>
          {photos.map(p=>(
            <div key={p.id} style={{ background:CARD, borderRadius:12, overflow:"hidden" }}>
              <img src={p.data} alt={p.caption} style={{ width:"100%", height:120, objectFit:"cover" }} />
              {p.caption && <div style={{ padding:"4px 8px", fontSize:10, color:"#aaa" }}>{p.caption}</div>}
              <button onClick={()=>del(p.id)} style={{ width:"100%", background:"rgba(227,6,19,0.2)", border:"none", padding:"5px", color:JLL_RED, cursor:"pointer" }}>Delete</button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ----- Service History Screen -----
function ServiceHistoryScreen({ storage }) {
  const [logs, setLogs] = useState([]);
  const [unit, setUnit] = useState("");
  const [work, setWork] = useState("");
  const [saving, setSaving] = useState(false);
  useEffect(()=>{ load(); },[]);
  async function load(){ try{ const r=await storage.get("service_history"); if(r?.value) setLogs(JSON.parse(r.value)); }catch{} }
  async function save(){ if(!work.trim()) return; setSaving(true); const log={id:genId(), unit, work, loggedAt:Date.now()}; const updated=[log,...logs]; setLogs(updated); await storage.set("service_history",JSON.stringify(updated)); setUnit(""); setWork(""); setSaving(false); }
  async function del(id){ const updated=logs.filter(l=>l.id!==id); setLogs(updated); await storage.set("service_history",JSON.stringify(updated)); }
  return (
    <div style={{ flex:1 }}>
      <Header title="SERVICE HISTORY" subtitle="MAINTENANCE LOG" />
      <div style={{ padding:14 }}>
        <div style={{ background:CARD, borderRadius:14, padding:14, marginBottom:16 }}>
          <Input label="UNIT / ASSET" value={unit} onChange={setUnit} placeholder="Unit ID" />
          <Textarea label="WORK PERFORMED" value={work} onChange={setWork} placeholder="Describe work done..." rows={3} />
          <RedBtn onClick={save} disabled={saving||!work.trim()} style={{ width:"100%" }}>{saving?"Saving…":"Log Visit"}</RedBtn>
        </div>
        {logs.map(l=>(
          <div key={l.id} style={{ background:CARD, borderRadius:12, padding:12, marginBottom:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between" }}><div><span style={{ fontWeight:700 }}>{l.unit||"No unit"}</span></div><button onClick={()=>del(l.id)} style={{ background:"rgba(227,6,19,0.2)", border:"none", borderRadius:6, padding:"3px 8px", color:JLL_RED, cursor:"pointer" }}>Delete</button></div>
            <div style={{ fontSize:12, color:"#aaa", marginTop:4 }}>{l.work}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ----- Chat List & Chat Screen -----
function ChatListScreen({ chats, onOpen, onCreate, onDelete, deletingId }) {
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column" }}>
      <Header title="MTS ASSISTANT" subtitle="FIELD AI CHAT" right={<OnlineBadge/>} />
      <div style={{ flex:1, overflowY:"auto", padding:14 }}>
        {chats.length===0 && <div style={{ textAlign:"center", padding:"50px" }}>No jobs yet. Tap + NEW JOB</div>}
        {chats.map(c=>{
          const last = c.messages[c.messages.length-1];
          return (
            <div key={c.id} className="card-hover" onClick={()=>onOpen(c.id)} style={{ background:CARD, borderRadius:14, padding:12, marginBottom:10 }}>
              <div style={{ fontWeight:700 }}>{c.title}</div>
              <div style={{ fontSize:11, color:"#aaa" }}>{last ? last.content.slice(0,60)+"…" : "No messages"}</div>
              <div style={{ display:"flex", justifyContent:"space-between", marginTop:6 }}><span style={{ fontSize:10, color:"#555" }}>{timeAgo(c.updatedAt)}</span><button onClick={e=>{e.stopPropagation();onDelete(c.id);}} style={{ background:"rgba(227,6,19,0.2)", border:"none", borderRadius:6, padding:"3px 8px", color:JLL_RED }}>Delete</button></div>
            </div>
          );
        })}
      </div>
      <div style={{ padding:12, borderTop:`1px solid ${BORDER}` }}><RedBtn onClick={onCreate} style={{ width:"100%" }}>+ NEW JOB</RedBtn></div>
    </div>
  );
}
function ChatScreen({ chat, onBack, onSend, loading }) {
  const [input, setInput] = useState("");
  const bottomRef = useRef();
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[chat?.messages,loading]);
  function send(){ const t=input.trim(); if(!t||loading) return; onSend(t); setInput(""); }
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column" }}>
      <Header title={chat?.title||"New Job"} subtitle="AI CHAT" onBack={onBack} right={<OnlineBadge/>} />
      <div style={{ flex:1, overflowY:"auto", padding:14 }}>
        {chat?.messages.map((msg,i)=>(
          <div key={i} style={{ display:"flex", justifyContent:msg.role==="user"?"flex-end":"flex-start", marginBottom:12 }}>
            <div style={{ maxWidth:"80%", background:msg.role==="user"?JLL_RED:CARD, borderRadius:16, padding:"10px 14px", color:"#fff" }}>{msg.content}</div>
          </div>
        ))}
        {loading && <div style={{ display:"flex", gap:5, padding:8 }}>{[0,1,2].map(i=><div key={i} style={{ width:7, height:7, borderRadius:"50%", background:JLL_RED, animation:"bounce 1.2s infinite", animationDelay:`${i*0.2}s` }} />)}</div>}
        <div ref={bottomRef} />
      </div>
      <div style={{ borderTop:`1px solid ${BORDER}`, padding:10, display:"flex", gap:8 }}>
        <textarea value={input} onChange={e=>setInput(e.target.value)} placeholder="Type your message..." rows={1} style={{ flex:1, background:CARD, border:"none", borderRadius:12, padding:"10px", color:"#fff", resize:"none" }} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} />
        <button onClick={send} disabled={loading} style={{ background:JLL_RED, border:"none", borderRadius:12, padding:"10px 16px", color:"#fff", fontWeight:700 }}>Send</button>
      </div>
    </div>
  );
}

// ----- Dashboard -----
function DashboardScreen({ profile, stats, onNav, onStartJob, recentChats, onOpenChat }) {
  const hour = new Date().getHours();
  const greeting = hour<12?"Good morning":hour<17?"Good afternoon":"Good evening";
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column" }}>
      <div style={{ background:BLACK, borderBottom:`3px solid ${JLL_RED}`, padding:"16px" }}>
        <div style={{ display:"flex", justifyContent:"space-between" }}><div><div style={{ fontSize:12, color:"#aaa" }}>{greeting},</div><div style={{ fontSize:22, fontWeight:800 }}>{profile.name.toUpperCase()}</div></div><Logo size="small" variant="icon" /></div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, marginTop:16 }}>
          {[{label:"Jobs",value:stats.chats},{label:"Parts",value:stats.parts},{label:"Notes",value:stats.notes},{label:"History",value:stats.history}].map(s=><div key={s.label} style={{ background:"rgba(255,255,255,0.05)", borderRadius:8, padding:"8px", textAlign:"center" }}><div style={{ fontSize:20, fontWeight:800 }}>{s.value}</div><div style={{ fontSize:10, color:"#aaa" }}>{s.label}</div></div>)}
        </div>
      </div>
      <div style={{ flex:1, overflowY:"auto", padding:14 }}>
        <button onClick={onStartJob} className="red-btn" style={{ width:"100%", background:JLL_RED, border:"none", borderRadius:14, padding:"14px", marginBottom:16, display:"flex", justifyContent:"space-between" }}><span>+ START NEW JOB</span><span>💬</span></button>
        <SectionTitle>RECENT JOBS</SectionTitle>
        {recentChats.slice(0,3).map(c=><div key={c.id} className="card-hover" onClick={()=>onOpenChat(c.id)} style={{ background:CARD, borderRadius:12, padding:12, marginBottom:8 }}><div style={{ fontWeight:700 }}>{c.title}</div><div style={{ fontSize:11, color:"#aaa" }}>{c.messages[c.messages.length-1]?.content.slice(0,50)}</div></div>)}
        <SectionTitle>TOOLS</SectionTitle>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8 }}>
          {[{id:"docs",icon:"📚",label:"Docs"},{id:"pt",icon:"🌡️",label:"PT Chart"},{id:"notes",icon:"📝",label:"Notes"},{id:"equip",icon:"🏭",label:"Equipment"},{id:"parts",icon:"🔩",label:"Parts"},{id:"photos",icon:"📷",label:"Photos"},{id:"history",icon:"📋",label:"History"}].map(t=><button key={t.id} onClick={()=>onNav(t.id)} style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:10, padding:"12px", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}><span style={{ fontSize:24 }}>{t.icon}</span><span style={{ fontSize:10 }}>{t.label}</span></button>)}
        </div>
      </div>
    </div>
  );
}

// ----- Onboarding -----
function OnboardingScreen({ onComplete }) {
  const [name, setName] = useState("");
  const [techId, setTechId] = useState("");
  const submit = () => { if(name.trim()) onComplete({ name: name.trim(), techId, joinedAt:Date.now() }); };
  return (
    <div style={{ height:"100vh", background:BLACK, display:"flex", flexDirection:"column", textAlign:"center", padding:40 }}>
      <div><Logo size="large" variant="icon" /></div>
      <div style={{ marginTop:20 }}><Logo size="large" variant="full" /></div>
      <div style={{ marginTop:40 }}><Input label="YOUR NAME *" value={name} onChange={setName} placeholder="e.g. Marcus Johnson" /></div>
      <Input label="TECH ID (optional)" value={techId} onChange={setTechId} placeholder="e.g. MTS-4421" />

}

// ----- Main App -----
function MTSAssistant() {
  const [profile, setProfile] = useState(null);
  const [tab, setTab] = useState("home");
  const [chatView, setChatView] = useState("list");
  const [toolView, setToolView] = useState(null);
  const [chats, setChats] = useState([]);
  const [activeChatId, setActiveChatId] = useState(null);
  const [loading, setLoading] = useState(false);
  const [deletingId, setDeletingId] = useState(null);
  const [stats, setStats] = useState({chats:0, parts:0, notes:0, history:0});
  const storage = window.storage = {
    get: async (k) => { const v=localStorage.getItem('mts__'+k); if(v===null) throw new Error('Not found'); return {key:k,value:v}; },
    set: async (k,v) => { localStorage.setItem('mts__'+k,v); return {key:k,value:v}; },
    delete: async (k) => { localStorage.removeItem('mts__'+k); return {key:k,deleted:true}; },
    list: async (prefix) => { const keys=[], p='mts__'+(prefix||''); for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith(p)) keys.push(k.replace('mts__','')); } return {keys}; }
  };
  useEffect(()=>{ loadData(); },[]);
  async function loadData() {
    try{
      const p=await storage.get("profile"); if(p?.value) setProfile(JSON.parse(p.value));
      const r=await storage.list("chat:"); const loaded=[]; for(const k of r.keys){ const rv=await storage.get(k); if(rv?.value) loaded.push(JSON.parse(rv.value)); }
      loaded.sort((a,b)=>b.updatedAt-a.updatedAt); setChats(loaded);
      const [partsR,notesR,histR]=await Promise.allSettled([storage.get("parts_log"),storage.get("notes"),storage.get("service_history")]);
      setStats({ chats:loaded.length, parts:partsR.status==="fulfilled"&&partsR.value?.value?JSON.parse(partsR.value.value).length:0, notes:notesR.status==="fulfilled"&&notesR.value?.value?JSON.parse(notesR.value.value).length:0, history:histR.status==="fulfilled"&&histR.value?.value?JSON.parse(histR.value.value).length:0 });
    }catch(e){}
  }
  async function saveProfile(p){ setProfile(p); await storage.set("profile",JSON.stringify(p)); }
  async function saveChat(chat){ await storage.set("chat:"+chat.id,JSON.stringify(chat)); }
  async function createChat(){ const chat={id:genId(),title:"New Job",messages:[],updatedAt:Date.now()}; setChats(prev=>[chat,...prev]); setStats(s=>({...s,chats:s.chats+1})); setActiveChatId(chat.id); setChatView("chat"); setTab("chat"); await saveChat(chat); }
  async function deleteChat(id){ setDeletingId(id); await storage.delete("chat:"+id); setChats(prev=>prev.filter(c=>c.id!==id)); setStats(s=>({...s,chats:Math.max(0,s.chats-1)})); if(activeChatId===id){ setActiveChatId(null); setChatView("list"); } setDeletingId(null); }
  const activeChat = chats.find(c=>c.id===activeChatId);
  async function sendMessage(text){ if(!text||loading||!activeChatId) return; const newMsg={role:"user",content:text}; const msgs=[...(activeChat?.messages||[]),newMsg]; let title=activeChat?.title||"New Job"; if((activeChat?.messages||[]).length===0) title=text.length>40?text.slice(0,40)+"…":text; const updated={...activeChat,title,messages:msgs,updatedAt:Date.now()}; setChats(prev=>prev.map(c=>c.id===activeChatId?updated:c)); setLoading(true); await saveChat(updated); const sys=SYSTEM_PROMPT+(profile?`\nTechnician: ${profile.name}`:""); const reply=await callAgent(sys,text); const withReply={...updated,messages:[...msgs,{role:"assistant",content:reply}],updatedAt:Date.now()}; setChats(prev=>prev.map(c=>c.id===activeChatId?withReply:c).sort((a,b)=>b.updatedAt-a.updatedAt)); await saveChat(withReply); setLoading(false); }
  function navTo(target, sub=null) { setTab(target); if(target==="chat") setChatView("list"); if(target==="tools") setToolView(sub); }
  if (!profile) return <OnboardingScreen onComplete={saveProfile} />;
  return (
    <div style={{ height:"100vh", background:BG, display:"flex", flexDirection:"column", maxWidth:480, margin:"0 auto" }}>
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
        {tab==="home" && <DashboardScreen profile={profile} stats={stats} recentChats={chats.slice(0,3)} onStartJob={createChat} onNav={navTo} onOpenChat={id=>{setActiveChatId(id);setChatView("chat");setTab("chat");}} />}
        {tab==="chat" && chatView==="list" && <ChatListScreen chats={chats} onOpen={id=>{setActiveChatId(id);setChatView("chat");}} onCreate={createChat} onDelete={deleteChat} deletingId={deletingId} />}
        {tab==="chat" && chatView==="chat" && <ChatScreen chat={activeChat} onBack={()=>setChatView("list")} onSend={sendMessage} loading={loading} />}
        {tab==="docs" && <DocumentLibraryScreen storage={storage} />}
        {tab==="tools" && toolView==="pt" && <PTChartScreen />}
        {tab==="tools" && toolView==="notes" && <NotesScreen storage={storage} />}
        {tab==="tools" && toolView==="equip" && <EquipmentScreen storage={storage} />}
        {tab==="tools" && toolView==="parts" && <PartsLogScreen storage={storage} />}
        {tab==="tools" && toolView==="photos" && <PhotoScreen storage={storage} />}
        {tab==="tools" && toolView==="history" && <ServiceHistoryScreen storage={storage} />}
        {tab==="tools" && !toolView && <div style={{ flex:1, padding:20 }}><button onClick={()=>setToolView("pt")} className="card-hover" style={{ background:CARD, padding:20, margin:8, borderRadius:12 }}>🌡️ PT Chart</button><button onClick={()=>setToolView("notes")} style={{ background:CARD, padding:20, margin:8, borderRadius:12 }}>📝 Job Notes</button><button onClick={()=>setToolView("equip")} style={{ background:CARD, padding:20, margin:8, borderRadius:12 }}>🏭 Equipment</button><button onClick={()=>setToolView("parts")} style={{ background:CARD, padding:20, margin:8, borderRadius:12 }}>🔩 Parts Log</button><button onClick={()=>setToolView("photos")} style={{ background:CARD, padding:20, margin:8, borderRadius:12 }}>📷 Photos</button><button onClick={()=>setToolView("history")} style={{ background:CARD, padding:20, margin:8, borderRadius:12 }}>📋 History</button></div>}
      </div>
      <div style={{ background:BLACK, borderTop:`2px solid rgba(227,6,19,0.3)`, display:"flex" }}>
        {[
          { id:"home", icon:"🏠", label:"Home" },
          { id:"chat", icon:"💬", label:"Chat" },
          { id:"docs", icon:"📚", label:"Docs" },
          { id:"tools", icon:"🛠️", label:"Tools" }
        ].map(t=>(
          <button key={t.id} onClick={()=>navTo(t.id)} style={{ flex:1, background:"transparent", border:"none", padding:"8px 2px 5px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:1, color:tab===t.id?JLL_RED:"rgba(255,255,255,0.4)" }}>
            <span style={{ fontSize:20 }}>{t.icon}</span>
            <span style={{ fontSize:9, fontWeight:700 }}>{t.label}</span>
            {tab===t.id && <div style={{ width:18, height:2, background:JLL_RED, marginTop:2 }} />}
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(MTSAssistant));
</script>
</body>
