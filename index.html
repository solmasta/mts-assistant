<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#E30613">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>MTS Assistant – JLL Field AI</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a0a; font-family:'Barlow',sans-serif; }
    @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap');
    .card-hover { transition: all 0.2s ease; cursor: pointer; }
    .card-hover:hover { background: rgba(227,6,19,0.08) !important; border-color: rgba(227,6,19,0.35) !important; transform: translateY(-1px); }
    .red-btn { transition: all 0.2s ease; cursor: pointer; }
    .red-btn:hover { background: #c00010 !important; transform: translateY(-1px); }
    .red-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    @keyframes fadeUp { from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
    @keyframes bounce { 0%,80%,100%{ transform:translateY(0); opacity:0.5; } 40%{ transform:translateY(-6px); opacity:1; } }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #E30613; border-radius: 2px; }
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: repeating-linear-gradient(45deg, rgba(227,6,19,0.03) 0px, rgba(227,6,19,0.03) 2px, transparent 2px, transparent 8px);
      pointer-events: none;
      z-index: 0;
    }
    #root { position: relative; z-index: 1; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ----- CONSTANTS ------------------------------------------------------------
const JLL_RED = "#E30613";
const BLACK = "#000000";
const BG = "#0a0a0a";
const CARD = "#1a1a1a";
const BORDER = "rgba(227,6,19,0.2)";
const GEMINI_API_KEY = "AIzaSyA03el2fK6mtlxpdxfk_XaB91VqPPV6zS4";

const SYSTEM_PROMPT = `You are MTS Assistant – Field Assistant, an expert AI tool for JLL MTS mobile HVAC engineers. Help diagnose faults, install parts, provide safety guidance, and find OEM documentation. Be concise, use numbered steps, and flag safety items with ⚠️.`;

const QUICK_PROMPTS = [
  { icon:"🔧", label:"Diagnose a fault", text:"I have an HVAC unit with a fault. Help me diagnose it step by step." },
  { icon:"🔩", label:"Install a part", text:"I need step-by-step instructions to install a replacement part. Guide me." },
  { icon:"⚡", label:"Capacitor swap", text:"I need to replace a capacitor. Walk me through the full procedure including safety." },
  { icon:"🌡️", label:"TXV / EEV install", text:"I need to replace a TXV or EEV expansion valve. What are the full installation steps?" },
  { icon:"🖥️", label:"Control board swap", text:"How do I install a control board safely?" },
  { icon:"📋", label:"PPE requirements", text:"What PPE do I need for this task?" },
  { icon:"📖", label:"Error code lookup", text:"Help me decode an error/fault code." },
  { icon:"🏭", label:"OEM documentation", text:"Find documentation or specs for a specific brand/model." }
];

const PT_DATA = {
  "R-410A": [[-60,-43],[-40,-29],[-20,-12],[0,8],[20,28],[40,50],[60,76],[80,104],[100,136],[120,172],[150,228],[200,314],[250,416]],
  "R-22":   [[-60,-56],[-40,-38],[-20,-16],[0,5],[20,28],[40,51],[60,78],[80,107],[100,140],[120,175],[150,226],[200,302],[250,388]],
  "R-32":   [[-60,-47],[-40,-31],[-20,-13],[0,7],[20,29],[40,53],[60,81],[80,113],[100,148],[120,188],[150,247],[200,338]],
  "R-454B": [[-60,-44],[-40,-29],[-20,-11],[0,9],[20,30],[40,53],[60,80],[80,110],[100,144],[120,182],[150,238],[200,325]],
  "R-407C": [[-60,-52],[-40,-35],[-20,-15],[0,6],[20,28],[40,52],[60,79],[80,109],[100,143],[120,180],[150,233],[200,312]],
  "R-134a": [[-60,-50],[-40,-31],[-20,-9],[0,14],[20,38],[40,64],[60,93],[80,126],[100,163],[120,203],[150,259],[200,340]]
};
const REFRIGERANTS = Object.keys(PT_DATA);
const BRANDS = ["Carrier","Trane","York","Lennox","Daikin","Mitsubishi","LG","Bosch","Goodman","Rheem","Ruud","American Standard","Bryant","Payne","Coleman","Heil","Armstrong","Amana","Frigidaire","Nordyne"];

function genId() { return "id_" + Date.now() + "_" + Math.random().toString(36).slice(2,6); }
function timeAgo(ts) {
  const d = Date.now()-ts, m = Math.floor(d/60000), h = Math.floor(d/3600000), days = Math.floor(d/86400000);
  if(m<1) return "Just now";
  if(m<60) return `${m}m ago`;
  if(h<24) return `${h}h ago`;
  return `${days}d ago`;
}

// ----- Logo Component -----
const Logo = ({ size = "default", variant = "full" }) => {
  const isLarge = size === "large";
  const mainFontSize = isLarge ? 42 : 28;
  const subFontSize = isLarge ? 12 : 9;
  const assistantFontSize = isLarge ? 16 : 11;
  if (variant === "icon") {
    return (
      <div style={{ width: isLarge ? 56 : 40, height: isLarge ? 56 : 40, background: JLL_RED, borderRadius: isLarge ? 14 : 10, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: `0 0 0 2px ${JLL_RED}20` }}>
        <span style={{ fontSize: isLarge ? 26 : 18, fontWeight: 800, color: "#fff", fontFamily: "'Barlow Condensed',sans-serif", lineHeight: 1 }}>MTS</span>

  }
  return (
    <div style={{ textAlign: "center" }}>
      <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 800, fontSize: mainFontSize, color: "#fff", letterSpacing: "-0.5px", lineHeight: 1.1 }}>MTS</div>
      <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700, fontSize: assistantFontSize, color: JLL_RED, letterSpacing: "0.08em", marginTop: 4 }}>MTS ASSISTANT</div>
      <div style={{ fontFamily: "'Barlow',sans-serif", fontWeight: 500, fontSize: subFontSize, color: "rgba(255,255,255,0.5)", letterSpacing: "0.12em", marginTop: 2 }}>FIELD ASSISTANT</div>

};

// ----- Shared Components ----------------------------------------------------
function Header({ title, subtitle, onBack, right }) {
  return (
    <div style={{ background:BLACK, borderBottom:`3px solid ${JLL_RED}`, padding:"11px 14px", display:"flex", alignItems:"center", gap:10, flexShrink:0 }}>
      {onBack && <button onClick={onBack} style={{ background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8, padding:"5px 10px", cursor:"pointer", color:"#fff", fontSize:15, flexShrink:0 }}>←</button>}
      <Logo size="small" variant="icon" />
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:17, color:"#fff", letterSpacing:".04em", lineHeight:1 }}>{title}</div>
        <div style={{ fontSize:10, color:JLL_RED, fontWeight:600, letterSpacing:".12em", textTransform:"uppercase", marginTop:2 }}>{subtitle}</div>
      </div>
      {right}
    </div>
  );
}
function SectionTitle({ children }) {
  return <div style={{ fontSize:10, color:"rgba(255,255,255,0.3)", letterSpacing:".12em", fontWeight:700, textTransform:"uppercase", marginBottom:10 }}>{children}</div>;
}
function Input({ label, value, onChange, placeholder, type="text" }) {
  return (
    <div style={{ marginBottom:12 }}>
      {label && <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", fontWeight:600, marginBottom:4 }}>{label}</div>}
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{ width:"100%", background:CARD, border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px 12px", color:"#fff", fontSize:13, outline:"none" }} />
    </div>
  );
}
function Textarea({ label, value, onChange, placeholder, rows=3 }) {
  return (
    <div style={{ marginBottom:12 }}>
      {label && <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", fontWeight:600, marginBottom:4 }}>{label}</div>}
      <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
        style={{ width:"100%", background:CARD, border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px 12px", color:"#fff", fontSize:13, outline:"none", resize:"vertical" }} />
    </div>
  );
}
function RedBtn({ children, onClick, disabled, style }) {
  return (
    <button className="red-btn" onClick={onClick} disabled={disabled}
      style={{ background:JLL_RED, border:"none", borderRadius:12, padding:"11px 18px", cursor:"pointer", color:"#fff", fontWeight:700, fontSize:13, fontFamily:"'Barlow',sans-serif", transition:"all .2s", boxShadow:"0 4px 12px rgba(227,6,19,0.35)", ...style }}>
      {children}
    </button>
  );
}
function OnlineBadge() {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:5, background:"rgba(39,174,96,0.1)", border:"1px solid rgba(39,174,96,0.4)", borderRadius:20, padding:"3px 9px", flexShrink:0 }}>
      <div style={{ width:6, height:6, borderRadius:"50%", background:"#27AE60", animation:"pulse 2s infinite" }} />
      <span style={{ fontSize:10, color:"#27AE60", fontWeight:600 }}>ONLINE</span>
    </div>
  );
}

// ----- Agent helpers --------------------------------------------------------
async function callAgent(systemPrompt, userPrompt) {
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: systemPrompt }] },
        contents: [{ role: "user", parts: [{ text: userPrompt }] }],
        generationConfig: { maxOutputTokens: 2000 }
      })
    });
    const data = await res.json();
    if (data.error) return "⚠️ API Error: " + (data.error.message || JSON.stringify(data.error));
    return data.candidates?.[0]?.content?.parts?.map(p => p.text).join("") || "No response generated.";
  } catch (err) { return "⚠️ Connection error. Check network and try again."; }
}
function AgentCard({ icon, title, desc, color, onClick }) {
  return (
    <div className="card-hover" onClick={onClick} style={{ background:CARD, border:`1px solid rgba(227,6,19,0.2)`, borderRadius:14, padding:16, marginBottom:12, cursor:"pointer", transition:"all .2s", borderLeft:`4px solid ${color||JLL_RED}` }}>
      <div style={{ display:"flex", alignItems:"center", gap:12 }}>
        <div style={{ width:46, height:46, borderRadius:12, background:color||JLL_RED, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0 }}>{icon}</div>
        <div><div style={{ fontSize:14, fontWeight:700, color:"#fff", marginBottom:3 }}>{title}</div><div style={{ fontSize:11, color:"rgba(255,255,255,0.45)", lineHeight:1.5 }}>{desc}</div></div>
      </div>
    </div>
  );
}
function AgentResult({ result, onReset, resetLabel="Run Again" }) {
  return (
    <div style={{ animation:"fadeUp .3s ease" }}>
      <div style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:14, padding:16, marginBottom:14, whiteSpace:"pre-wrap", fontSize:13, color:"#fff", lineHeight:1.7 }}>{result}</div>
      <RedBtn onClick={onReset} style={{ width:"100%" }}>{resetLabel}</RedBtn>
    </div>
  );
}
function AgentLoading({ label }) {
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"50px 20px", gap:16 }}>
      <div style={{ display:"flex", gap:6 }}>{[0,1,2].map(i=><div key={i} style={{ width:10, height:10, borderRadius:"50%", background:JLL_RED, animation:"bounce 1.2s ease-in-out infinite", animationDelay:`${i*.2}s` }}/>)}</div>
      <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", fontWeight:600, letterSpacing:".06em" }}>{label}</div>
    </div>
  );
}

// ----- AGENT 1: Fault Diagnosis (full) -----
function FaultDiagnosisAgent({ workflowCtx, onWorkflowComplete, onChainTo }) {
  const [step, setStep] = useState(0);
  const [brand, setBrand] = useState("");
  const [model, setModel] = useState("");
  const [equipType, setEquipType] = useState("");
  const [symptom, setSymptom] = useState("");
  const [faultCode, setFaultCode] = useState("");
  const [refrigerant, setRefrigerant] = useState("");
  const [age, setAge] = useState("");
  const [result, setResult] = useState("");
  const EQUIP_TYPES = ["RTU","Chiller","Split System","VRF/VRV","Air Handler","FCU","Boiler","Heat Pump","Mini-Split","Cooling Tower"];
  async function runDiagnosis() {
    setStep(1);
    const prompt = `Run a complete HVAC fault diagnosis:\nBrand: ${brand||"Unknown"}\nModel: ${model||"Unknown"}\nEquipment Type: ${equipType||"Unknown"}\nFault Code: ${faultCode||"None"}\nSymptoms: ${symptom}\nRefrigerant: ${refrigerant||"Unknown"}\nUnit Age: ${age||"Unknown"}\n\nProvide: 1. TOP 3 LIKELY CAUSES (ranked %). 2. IMMEDIATE CHECKS. 3. STEP-BY-STEP DIAGNOSIS. 4. SAFETY NOTES. 5. WHEN TO ESCALATE.`;
    const sys = "You are an expert HVAC fault diagnosis agent for JLL MTS. Be structured and field-ready.";
    const r = await callAgent(sys, prompt);
    setResult(r); setStep(2);
    if (onWorkflowComplete) onWorkflowComplete({ diagBrand: brand, diagModel: model, diagEquipType: equipType, diagRefrigerant: refrigerant, diagSymptom: symptom });
  }
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <Header title="FAULT DIAGNOSIS" subtitle="AI DIAGNOSTIC AGENT" />
      <div style={{ flex:1, overflowY:"auto", padding:14 }}>
        {step===0 && (
          <div>
            <div style={{ background:"rgba(227,6,19,0.08)", border:`1px solid rgba(227,6,19,0.2)`, borderRadius:12, padding:12, marginBottom:16, fontSize:12, color:"rgba(255,255,255,0.6)" }}>🤖 This agent runs a structured diagnosis and ranks causes by probability.</div>
            <div style={{ marginBottom:12 }}><div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:4 }}>EQUIPMENT TYPE</div><select value={equipType} onChange={e=>setEquipType(e.target.value)} style={{ width:"100%", background:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px 12px", color:"#fff", fontSize:13 }}><option value="">Select type…</option>{EQUIP_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}><div><div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:4 }}>BRAND</div><select value={brand} onChange={e=>setBrand(e.target.value)} style={{ width:"100%", background:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px 12px", color:"#fff", fontSize:13 }}><option value="">Brand…</option>{BRANDS.map(b=><option key={b}>{b}</option>)}</select></div><Input label="MODEL #" value={model} onChange={setModel} placeholder="e.g. 48XC024" /></div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}><Input label="FAULT CODE" value={faultCode} onChange={setFaultCode} placeholder="e.g. E79"/><div><div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:4 }}>REFRIGERANT</div><select value={refrigerant} onChange={e=>setRefrigerant(e.target.value)} style={{ width:"100%", background:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px 12px", color:"#fff", fontSize:13 }}><option value="">Ref…</option>{REFRIGERANTS.map(r=><option key={r}>{r}</option>)}</select></div></div>
            <Input label="UNIT AGE (years)" value={age} onChange={setAge} placeholder="e.g. 7" type="number"/>
            <Textarea label="SYMPTOMS *" value={symptom} onChange={setSymptom} placeholder="Describe what the unit is doing..." rows={4}/>
            <RedBtn onClick={runDiagnosis} disabled={!symptom.trim()} style={{ width:"100%", padding:14, fontSize:14 }}>🔍 Run Diagnosis</RedBtn>
          </div>
        )}
        {step===1 && <AgentLoading label="RUNNING DIAGNOSIS…"/>}
        {step===2 && (
          <div>
            <AgentResult result={result} onReset={()=>{setStep(0);setResult("");}} resetLabel="New Diagnosis" />
            {onChainTo && (
              <div style={{ background:"rgba(227,6,19,0.07)", border:`1px solid rgba(227,6,19,0.25)`, borderRadius:12, padding:12, marginTop:10 }}>
                <div style={{ fontSize:11, color:JLL_RED, fontWeight:700, marginBottom:8 }}>⚡ CONTINUE WORKFLOW</div>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                  <button onClick={()=>onChainTo("safety")} style={{ background:JLL_RED, border:"none", borderRadius:8, padding:"8px 12px", cursor:"pointer", fontSize:11, fontWeight:700, color:"#fff" }}>🦺 Safety Briefing →</button>
                  <button onClick={()=>onChainTo("parts")} style={{ background:"#222", border:`1px solid ${BORDER}`, borderRadius:8, padding:"8px 12px", cursor:"pointer", fontSize:11, fontWeight:700, color:"#fff" }}>🔩 Find Parts →</button>
                  <button onClick={()=>onChainTo("report")} style={{ background:"#222", border:`1px solid ${BORDER}`, borderRadius:8, padding:"8px 12px", cursor:"pointer", fontSize:11, fontWeight:700, color:"#fff" }}>📄 Service Report →</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ----- AGENT 2: Escalation (full) -----
function EscalationAgent() {
  const [step, setStep] = useState(0);
  const [equipType, setEquipType] = useState("");
  const [brand, setBrand] = useState("");
  const [faultCode, setFaultCode] = useState("");
  const [situation, setSituation] = useState("");
  const [alreadyTried, setAlreadyTried] = useState("");
  const [techExp, setTechExp] = useState("");
  const [urgency, setUrgency] = useState("");
  const [result, setResult] = useState("");
  const URGENCY = ["Critical — building uninhabitable","High — essential systems down","Medium — partial loss of service","Low — minor issue, building functional"];
  const EXPERIENCE = ["Less than 2 years","2-5 years","5-10 years","10+ years"];
  async function assess() {
    setStep(1);
    const prompt = `Escalation assessment:\nEquipment: ${equipType||"Not specified"} ${brand?`(${brand})`:""}\nFault Code: ${faultCode||"None"}\nSituation: ${situation}\nTried: ${alreadyTried||"Nothing"}\nTech Experience: ${techExp||"Unknown"}\nUrgency: ${urgency||"Unknown"}\n\nProvide: 1. Should escalate? (Yes/No/Conditional). 2. Reasoning. 3. Who to call. 4. Urgency. 5. What to do while waiting. 6. Info for specialist.`;
    const sys = "You are an HVAC escalation agent for JLL MTS. Give clear decisive answers.";
    const r = await callAgent(sys, prompt);
    setResult(r); setStep(2);
  }
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <Header title="ESCALATION" subtitle="AI ESCALATION AGENT" />
      <div style={{ flex:1, overflowY:"auto", padding:14 }}>
        {step===0 && (
          <div>
            <div style={{ background:"rgba(227,6,19,0.08)", border:`1px solid rgba(227,6,19,0.2)`, borderRadius:12, padding:12, marginBottom:16, fontSize:12, color:"rgba(255,255,255,0.6)" }}>⚠️ Get a clear decision: escalate or not, who to call, and what to do now.</div>
            <div style={{ marginBottom:12 }}><div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:4 }}>URGENCY *</div><select value={urgency} onChange={e=>setUrgency(e.target.value)} style={{ width:"100%", background:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px 12px", color:"#fff", fontSize:13 }}><option value="">Select urgency…</option>{URGENCY.map(u=><option key={u}>{u}</option>)}</select></div>
            <d
