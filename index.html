function timeAgo(ts) {
  const d = Date.now()-ts, m = Math.floor(d/60000), h = Math.floor(d/3600000), days = Math.floor(d/86400000);
  if(m<1) return "Just now";
  if(m<60) return `${m}m ago`;

// ----- Agent helpers --------------------------------------------------------
async function callAgent(systemPrompt, userPrompt) {
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: systemPrompt }] },
        contents: [{ role: "user", parts: [{ text: userPrompt }] }],
        generationConfig: { maxOutputTokens: 2000 }
      })
    });
    const data = await res.json();
    if (data.error) return "⚠️ API Error: " + (data.error.message || JSON.stringify(data.error));
    return data.candidates?.[0]?.content?.parts?.map(p => p.text).join("") || "No response generated.";
  } catch (err) { return "⚠️ Connection error. Check network and try again."; }
}

// (3) Predictive Maintenance Agent
function PredictiveMaintenanceAgent({ storage }) {
  const [step, setStep] = useState(0);
  const [equipType, setEquipType] = useState("");
  const [brand, setBrand] = useState("");
  const [model, setModel] = useState("");
  const [age, setAge] = useState("");
  const [ref, setRef] = useState("");
  const [lastService, setLastService] = useState("");
  const [runHours, setRunHours] = useState("");
  const [knownIssues, setKnownIssues] = useState("");
  const [observations, setObservations] = useState([]);
  const [result, setResult] = useState("");
  const [serviceHistory, setServiceHistory] = useState([]);
  const OBSERVATIONS = ["Unusual noise","Higher than normal running amps","Frequent cycling","Reduced airflow","Ice formation","Oil stains","Vibration","Increased energy use","Longer run times","Delayed startup","Refrigerant loss history","Water leaks"];
  useEffect(()=>{ loadHistory(); },[]);
  async function loadHistory(){ try{ const r=await storage.get("service_history"); if(r?.value) setServiceHistory(JSON.parse(r.value)); }catch{} }
  function toggleObs(o){ setObservations(prev=>prev.includes(o)?prev.filter(x=>x!==o):[...prev,o]); }
  async function predict() {
    setStep(1);
    const historyText = serviceHistory.slice(0,5).map(h=>`- ${h.date||"Unknown date"}: ${h.work} (${h.outcome})`).join("\n");
    const prompt = `Predictive maintenance analysis:\nEquipment: ${equipType||"Unknown"} ${brand||""} ${model||""}\nAge: ${age||"Unknown"} years\nRefrigerant: ${ref||"Unknown"}\nLast Service: ${lastService||"Unknown"}\nRun Hours: ${runHours||"Unknown"}\nObservations: ${observations.length>0?observations.join(", "):"None"}\nKnown Issues: ${knownIssues||"None"}\nService History:\n${historyText||"None"}\n\nProvide: 1. Immediate risks (30 days). 2. Short-term risks (3 months). 3. Schedule soon (6 months). 4. Component health assessment. 5. Predicted failure modes. 6. Recommended actions by priority. 7. Risk to margin. 8. Recommended PM schedule.`;
    const sys = "You are a predictive maintenance expert for HVAC systems. Prioritize risks and be specific.";
    const r = await callAgent(sys, prompt);
    setResult(r); setStep(2);
  }
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <Header title="PREDICTIVE MAINT." subtitle="FAILURE PREDICTION" />
      <div style={{ flex:1, overflowY:"auto", padding:14 }}>

function PTChartScreen() {
  const [ref, setRef] = useState("R-410A");
  const [mode, setMode] = useState("P→T");
  const [inputVal, setInputVal] = useState("");
  const [result, setResult] = useState(null);
  function interpolate(data, x, col) {
    const srcCol = col===0?0:1, tgtCol = col===0?1:0;
    const sorted = [...data].sort((a,b)=>a[srcCol]-b[srcCol]);
    if(x <= sorted[0][srcCol]) return sorted[0][tgtCol];
    if(x >= sorted[sorted.length-1][srcCol]) return sorted[sorted.length-1][tgtCol];
    for(let i=0;i<sorted.length-1;i++) if(x>=sorted[i][srcCol]&&x<=sorted[i+1][srcCol]){ const t=(x-sorted[i][srcCol])/(sorted[i+1][srcCol]-sorted[i][srcCol]); return sorted[i][tgtCol]+t*(sorted[i+1][tgtCol]-sorted[i][tgtCol]); }
    return null;
  }
  function calculate(){ const v=parseFloat(inputVal); if(isNaN(v)){ setResult("Invalid input"); return; } const data=PT_DATA[ref]; if(mode==="P→T"){ const t=interpolate(data,v,0); setResult(t!==null?`Saturation Temp: ${t.toFixed(1)} °F`:"Out of range"); } else { const p=interpolate(data,v,1); setResult(p!==null?`Saturation Pressure: ${p.toFixed(1)} psig`:"Out of range"); } }
  const data=PT_DATA[ref];
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <Header title="PT CHART" subtitle="PRESSURE-TEMPERATURE" />
      <div style={{ flex:1, overflowY:"auto", padding:14 }}>
        <div style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:14, padding:14, marginBottom:14 }}><SectionTitle>REFRIGERANT CALCULATOR</SectionTitle><div><div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:4 }}>REFRIGERANT</div><select value={ref} onChange={e=>{setRef(e.target.value);setResult(null);}} style={{ width:"100%", background:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px 12px", color:"#fff", fontSize:13 }}>{REFRIGERANTS.map(r=><option key={r}>{r}</option>)}</select></div><div style={{ display:"flex", gap:8, marginBottom:12 }}>{["P→T","T→P"].map(m=>(<button key={m} onClick={()=>{setMode(m);setResult(null);}} style={{ flex:1, background:mode===m?JLL_RED:"#222", border:`1px solid ${mode===m?JLL_RED:BORDER}`, borderRadius:10, padding:"9px", cursor:"pointer", color:"#fff", fontSize:12, fontWeight:700 }}>{m==="P→T"?"Pressure → Temp":"Temp → Pressure"}</button>))}</div><Input label={mode==="P→T"?"PRESSURE (psig)":"TEMPERATURE (°F)"} value={inputVal} onChange={v=>{setInputVal(v);setResult(null);}} placeholder={mode==="P→T"?"Enter psig…":"Enter °F…"} type="number"/><RedBtn onClick={calculate} style={{ width:"100%" }}>Calculate</RedBtn>{result&&(<div style={{ marginTop:12, background:"rgba(227,6,19,0.1)", border:`1px solid rgba(227,6,19,0.3)`, borderRadius:10, padding:"12px 14px", textAlign:"center", fontSize:16, fontWeight:700, color:"#fff" }}>{result}</div>)}</div>
        <div style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:14, padding:14 }}><SectionTitle>FULL TABLE — {ref}</SectionTitle><div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:0, borderRadius:8, overflow:"hidden", border:`1px solid ${BORDER}` }}><div style={{ background:JLL_RED, padding:"8px 12px", fontSize:11, fontWeight:700, color:"#fff" }}>PRESSURE (psig)</div><div style={{ background:JLL_RED, padding:"8px 12px", fontSize:11, fontWeight:700, color:"#fff", borderLeft:"1px solid rgba(255,255,255,0.2)" }}>TEMP (°F)</div>{data.map(([p,t],i)=>[<div key={`p${i}`} style={{ padding:"7px 12px", fontSize:12, color:"#fff", background:i%2===0?"#1f1f1f":CARD, borderTop:`1px solid ${BORDER}` }}>{p}</div>,<div key={`t${i}`} style={{ padding:"7px 12px", fontSize:12, color:"rgba(255,255,255,0.7)", background:i%2===0?"#1f1f1f":CARD, borderTop:`1px solid ${BORDER}`, borderLeft:`1px solid ${BORDER}` }}>{t}</div>])}</div></div>
      </div>
    </div>
  );
}

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <div style={{ background:`linear-gradient(135deg, ${BLACK} 0%, #1a0000 100%)`, borderBottom:`3px solid ${JLL_RED}`, padding:"16px 16px 14px", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
          <div><div style={{ fontSize:11, color:"rgba(255,255,255,0.4)", fontWeight:600 }}>{greeting},</div><div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:22, color:"#fff", lineHeight:1.1 }}>{profile.name.toUpperCase()}</div>{(profile.techId||profile.region)&&<div style={{ fontSize:10, color:JLL_RED, fontWeight:600, marginTop:2 }}>{[profile.techId,profile.region].filter(Boolean).join(" · ")}</div>}</div>
          <Logo size="small" variant="icon" />
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:6 }}>
          {[
            { label:"Jobs", value:stats.chats },
            { label:"Parts", value:stats.parts },
            { label:"Notes", value:stats.notes },
            { label:"History", value:stats.history },
          ].map(s=>(<div key={s.label} style={{ background:"rgba(255,255,255,0.05)", borderRadius:8, padding:"7px 6px", textAlign:"center", border:`1px solid rgba(227,6,19,0.15)` }}><div style={{ fontSize:18, fontWeight:800, color:"#fff", fontFamily:"'Barlow Condensed',sans-serif" }}>{s.value}</div><div style={{ fontSize:9, color:"rgba(255,255,255,0.35)", fontWeight:600, letterSpacing:".06em" }}>{s.label.toUpperCase()}</div></div>))}
        </div>
      </div>
      <div style={{ flex:1, overflowY:"auto", padding:14 }}>
        <button onClick={onStartJob} className="red-btn" style={{ width:"100%", background:JLL_RED, border:"none", borderRadius:14, padding:"14px 16px", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16, boxShadow:"0 4px 20px rgba(227,6,19,0.35)" }}><div><div style={{ fontSize:15, fontWeight:800, color:"#fff", fontFamily:"'Barlow Condensed',sans-serif" }}>+ START NEW JOB</div><div style={{ fontSize:11, color:"rgba(255,255,255,0.7)" }}>Open AI chat for a new job</div></div><span style={{ fontSize:24 }}>💬</span></button>
        <SectionTitle>QUICK LAUNCH AGENTS</SectionTitle>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:16 }}>{QUICK_AGENTS.map(a=>(<button key={a.id} onClick={()=>onNav("agents",a.id)} className="card-hover" style={{ background:CARD, border:`1px solid rgba(227,6,19,0.15)`, borderRadius:12, padding:"13px 12px", cursor:"pointer", display:"flex", alignItems:"center", gap:10, textAlign:"left" }}><div style={{ width:36, height:36, borderRadius:9, background:a.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>{a.icon}</div><div style={{ fontSize:12, fontWeight:700, color:"#fff", lineHeight:1.3 }}>{a.label}</div></button>))}</div>
        <div style={{ background:`linear-gradient(135deg,rgba(227,6,19,0.12),rgba(227,6,19,0.05))`, border:`1px solid rgba(227,6,19,0.3)`, borderRadius:14, padding:14, marginBottom:16 }}><div style={{ fontSize:11, color:JLL_RED, fontWeight:700, marginBottom:6 }}>⚡ CONNECTED WORKFLOW</div><div style={{ fontSize:12, color:"rgba(255,255,255,0.6)", marginBottom:10 }}>Run a Fault Diagnosis → it pre-fills your Safety Briefing → which pre-fills your Service Report. One job, three agents, zero re-entry.</div><button onClick={()=>onNav("agents","diag")} style={{ background:JLL_RED, border:"none", borderRadius:8, padding:"8px 14px", cursor:"pointer", fontSize:12, fontWeight:700, color:"#fff" }}>Start Workflow →</button></div>
        {recentChats.length>0&&(<><SectionTitle>RECENT JOBS</SectionTitle>{recentChats.slice(0,3).map(c=>{const last=c.messages[c.messages.length-1]; return (<div key={c.id} className="card-hover" onClick={()=>onOpenChat(c.id)} style={{ background:CARD, border:`1px solid rgba(227,6,19,0.12)`, borderRadius:12, padding:"11px 12px", marginBottom:8, cursor:"pointer", display:"flex", alignItems:"center", gap:10 }}><div style={{ width:34, height:34, background:JLL_RED, borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>🔧</div><div style={{ flex:1, minWidth:0 }}><div style={{ fontSize:12, fontWeight:700, color:"#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{c.title}</div><div style={{ fontSize:10, color:"rgba(255,255,255,0.3)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{last?(last.content.length>45?last.content.slice(0,45)+"…":last.content):"No messages"}</div></div><div style={{ fontSize:10, color:"rgba(255,255,255,0.2)" }}>{timeAgo(c.updatedAt)}</div></div>);})}</>)}
        <SectionTitle>ALL TOOLS</SectionTitle>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:6 }}>
          {[
            { id:"docs", icon:"📚", label:"Docs" }, { id:"model", icon:"🔍", label:"Models" }, { id:"pt", icon:"🌡️", label:"PT Chart" },
            { id:"notes", icon:"📝", label:"Notes" }, { id:"equip", icon:"🏭", label:"Equipment" }, { id:"parts", icon:"🔩", label:"Parts Log" },
            { id:"photos", icon:"📷", label:"Photos" }, { id:"history", icon:"📋", label:"History" }, { id:"agents", icon:"🤖", label:"All Agents" }
          ].map(t=>(<button key={t.id} onClick={()=>onNav(t.id==="docs"||t.id==="agents"?t.id:"tools", t.id)} className="card-hover" style={{ background:CARD, border:`1px solid rgba(227,6,19,0.12)`, borderRadius:10, padding:"11px 6px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}><span style={{ fontSize:20 }}>{t.icon}</span><span style={{ fontSize:10, fontWeight:600, color:"rgba(255,255,255,0.6)" }}>{t.label}</span></button>))}
        </div>
      </div>
    </div>
  );
}

// ----- Chat List and Chat Screen (simplified but functional) -----
function ChatListScreen({ chats, onOpen, onCreate, onDelete, deletingId }) {
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <Header title="MTS ASSISTANT" subtitle="FIELD ASSISTANT · HVAC AI" right={<OnlineBadge/>}/>
      <div style={{ flex:1, overflowY:"auto", padding:14 }}>
        {chats.length===0 ? (
          <div style={{ textAlign:"center", padding:"50px 20px", animation:"fadeUp .4s ease" }}><div style={{ fontSize:52, marginBottom:14 }}>🛠️</div><div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:800, color:"#fff", marginBottom:8 }}>NO JOBS YET</div><div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", lineHeight:1.6 }}>Tap + NEW JOB to start. Chats save automatically.</div></div>
        ) : (
          <><SectionTitle>YOUR JOBS ({chats.length})</SectionTitle>{chats.map((c,i)=>{const last=c.messages[c.messages.length-1]; return (<div key={c.id} className="card-hover" onClick={()=>onOpen(c.id)} style={{ display:"flex", alignItems:"center", gap:12, background:CARD, border:`1px solid ${BORDER}`, borderRadius:14, padding:"13px", marginBottom:10, cursor:"pointer", transition:"all .2s", animation:`fadeUp .3s ease ${i*.04}s both` }}><div style={{ width:42, height:42, borderRadius:10, background:JLL_RED, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>🔧</div><div style={{ flex:1, minWidth:0 }}><div style={{ fontWeight:700, fontSize:13, color:"#fff", marginBottom:3, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{c.title}</div><div style={{ fontSize:11, color:"rgba(255,255,255,0.3)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{last?(last.content.length>55?last.content.slice(0,55)+"…":last.content):"No messages yet"}</div></div><div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6, flexShrink:0 }}><div style={{ fontSize:10, color:"rgba(255,255,255,0.2)" }}>{timeAgo(c.updatedAt)}</div><button className="del-btn" onClick={e=>{e.stopPropagation();onDelete(c.id);}} style={{ background:"rgba(227,6,19,0.1)", border:"none", borderRadius:6, padding:"3px 8px", cursor:"pointer", fontSize:11, color:JLL_RED, fontWeight:600 }}>{deletingId===c.id?"…":"Delete"}</button></div></div>);})}</>
        )}
      </div>
      <div style={{ padding:"12px 14px", borderTop:`1px solid ${BORDER}`, background:BLACK, flexShrink:0 }}><RedBtn onClick={onCreate} style={{ width:"100%", padding:14, fontSize:15 }}>+ NEW JOB</RedBtn></div>
    </div>
  );
}
function ChatScreen({ chat, onBack, onSend, loading }) {
  const bottomRef = useRef(null);
  const [input, setInput] = useState("");
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[chat?.messages,loading]);
  function send(text){ const t=text||input.trim(); if(!t||loading) return; onSend(t); setInput(""); }
  function handleKey(e){ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} }
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <Header title={chat?.title||"New Job"} subtitle="JLL MTS ASSISTANT" onBack={onBack} right={<OnlineBadge/>}/>
      <div style={{ flex:1, overflowY:"auto", padding:"16px 14px", display:"flex", flexDirection:"column" }}>
        {(!chat||chat.messages.length===0)&&(
          <div style={{ animation:"fadeUp .5s ease" }}><div style={{ textAlign:"center", padding:"24px 16px 18px" }}><div style={{ width:68, height:68, background:JLL_RED, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:30, margin:"0 auto 12px", boxShadow:"0 0 40px rgba(227,6,19,0.4)" }}>🛠️</div><div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:22, color:"#fff", marginBottom:6 }}>READY TO ASSIST</div><div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", lineHeight:1.6, maxWidth:280, margin:"0 auto" }}>Diagnose faults, get install steps, safety guidance & OEM docs — instantly.</div></div><SectionTitle style={{ textAlign:"center", marginBottom:10 }}>QUICK START</SectionTitle><div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>{QUICK_PROMPTS.map((p,i)=>(<button key={i} className="quick-btn" onClick={()=>send(p.text)} style={{ background:"rgba(227,6,19,0.07)", border:`1px solid ${BORDER}`, borderRadius:12, padding:"11px 12px", cursor:"pointer", textAlign:"left", transition:"all .2s", color:"#fff" }}><div style={{ fontSize:19, marginBottom:4 }}>{p.icon}</div><div style={{ fontSize:11, fontWeight:600, color:"rgba(255,255,255,0.85)" }}>{p.label}</div></button>))}</div></div>
        )}
        {chat?.messages.map((msg,i)=>{const isUser=msg.role==="user"; return (<div key={i} className="msg-anim" style={{ display:"flex", flexDirection:isUser?"row-reverse":"row", alignItems:"flex-start", gap:8, marginBottom:14, padding:"0 2px" }}>{!isUser&&<div style={{ width:34, height:34, borderRadius:"50%", flexShrink:0, background:JLL_RED, display:"flex", alignItems:"center", justifyContent:"center", fontSize:15 }}>🔧</div>}<div style={{ maxWidth:"80%", background:isUser?JLL_RED:CARD, color:"#fff", borderRadius:isUser?"16px 16px 4px 16px":"16px 16px 16px 4px", padding:"11px 14px", fontSize:13, lineHeight:1.65, boxShadow:isUser?"0 4px 14px rgba(227,6,19,0.3)":"0 4px 14px rgba(0,0,0,0.4)", whiteSpace:"pre-wrap", border:isUser?"none":`1px solid ${BORDER}` }}>{msg.content}</div></div>);})}
        {loading&&(<div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}><div style={{ width:34, height:34, borderRadius:"50%", flexShrink:0, background:JLL_RED, display:"flex", alignItems:"center", justifyContent:"center", fontSize:15 }}>🔧</div><div style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:"16px 16px 16px 4px", padding:"11px 15px", display:"flex", gap:5, alignItems:"center" }}>{[0,1,2].map(i=><div key={i} style={{ width:7, height:7, borderRadius:"50%", background:JLL_RED, animation:"bounce 1.2s ease-in-out infinite", animationDelay:`${i*.2}s` }}/>)}</div></div>)}
        <div ref={bottomRef}/>
      </div>
      <div style={{ borderTop:`1px solid ${BORDER}`, background:BLACK, padding:"10px 14px", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"flex-end", gap:8, background:CARD, border:`1px solid ${BORDER}`, borderRadius:14, padding:"9px 12px" }}><textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey} placeholder="Describe your HVAC issue, ask about PPE, or request documentation..." rows={1} style={{ flex:1, background:"transparent", border:"none", outline:"none", color:"#fff", fontSize:13, resize:"none", lineHeight:1.5, maxHeight:110, overflowY:"auto" }} onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,110)+"px";}}/><button className="red-btn" onClick={()=>send()} disabled={!input.trim()||loading} style={{ width:36, height:36, borderRadius:"50%", background:JLL_RED, border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, transition:"all .2s", flexShrink:0, boxShadow:"0 4px 12px rgba(227,6,19,0.45)" }}>➤</button></div>
        <div style={{ textAlign:"center", fontSize:9, color:"rgba(255,255,255,0.12)", marginTop:6, letterSpacing:".08em" }}>JLL MTS ASSISTANT · AUTHORIZED TECHNICIANS ONLY</div>
      </div>
    </div>
  );
}

// ----- Main App with 5-tab navigation (no API key screen) -----
function MTSAssistant() {
  const [profile, setProfile] = useState(null);
  const [tab, setTab] = useState("home");
  const [chatView, setChatView] = useState("list");
  const [agentView, setAgentView] = useState("hub");
  const [toolView, setToolView] = useState("hub");
  const [chats, setChats] = useState([]);
  const [activeChatId, setActiveChatId] = useState(null);
  const [loading, setLoading] = useState(false);
  const [deletingId, setDeletingId] = useState(null);
  const [stats, setStats] = useState({chats:0, parts:0, notes:0, history:0});
  const [workflowCtx, setWorkflowCtx] = useState({});
  const storage = window.storage = {
    get: async (k) => { const v=localStorage.getItem('mts__'+k); if(v===null) throw new Error('Not found'); return {key:k,value:v}; },
    set: async (k,v) => { localStorage.setItem('mts__'+k,v); return {key:k,value:v}; },
    delete: async (k) => { localStorage.removeItem('mts__'+k); return {key:k,deleted:true}; },
    list: async (prefix) => { const keys=[], p='mts__'+(prefix||''); for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith(p)) keys.push(k.replace('mts__','')); } return {keys}; }
  };
  useEffect(() => { loadData(); }, []);
  async function loadData() {
    try {
      const p = await storage.get("profile"); if (p?.value) setProfile(JSON.parse(p.value));
      const r = await storage.list("chat:"); const loaded = [];
      for (const k of r.keys) { try { const rv = await storage.get(k); if (rv?.value) loaded.push(JSON.parse(rv.value)); } catch {} }
      loaded.sort((a,b)=>b.updatedAt-a.updatedAt); setChats(loaded);
      const [partsR, notesR, histR] = await Promise.allSettled([storage.get("parts_log"), storage.get("notes"), storage.get("service_history")]);
      setStats({ chats: loaded.length, parts: partsR.status==="fulfilled"&&partsR.value?.value?JSON.parse(partsR.value.value).length:0, notes: notesR.status==="fulfilled"&&notesR.value?.value?JSON.parse(notesR.value.value).length:0, history: histR.status==="fulfilled"&&histR.value?.value?JSON.parse(histR.value.value).length:0 });
    } catch(e) {}
  }
  async function saveProfile(p) { setProfile(p); await storage.set("profile", JSON.stringify(p)); }
  async function saveChat(chat) { await storage.set("chat:"+chat.id, JSON.stringify(chat)); }
  async function createChat() { const chat={id:genId(), title:"New Job", messages:[], updatedAt:Date.now()}; setChats(prev=>[chat,...prev]); setStats(s=>({...s, chats:s.chats+1})); setActiveChatId(chat.id); setChatView("chat"); setTab("chat"); await saveChat(chat); }
  async function deleteChat(id) { setDeletingId(id); await storage.delete("chat:"+id); setChats(prev=>prev.filter(c=>c.id!==id)); setStats(s=>({...s, chats:Math.max(0,s.chats-1)})); if(activeChatId===id){ setActiveChatId(null); setChatView("list"); } setDeletingId(null); }
  const activeChat = chats.find(c=>c.id===activeChatId);
  async function sendMessage(text) { if(!text||loading||!activeChatId) return; const newMsg={role:"user",content:text}; const msgs=[...(activeChat?.messages||[]), newMsg]; let title=activeChat?.title||"New Job"; if((activeChat?.messages||[]).length===0) title=text.length>40?text.slice(0,40)+"…":text; const updated={...activeChat, title, messages:msgs, updatedAt:Date.now()}; setChats(prev=>prev.map(c=>c.id===activeChatId?updated:c)); setLoading(true); await saveChat(updated); const sys = SYSTEM_PROMPT + (profile?`\nTechnician: ${profile.name}${profile.techId?` (${profile.techId})`:""}`:""); const reply = await callAgent(sys, text); const withReply = {...updated, messages:[...msgs, {role:"assistant", content:reply}], updatedAt:Date.now()}; setChats(prev=>prev.map(c=>c.id===activeChatId?withReply:c).sort((a,b)=>b.updatedAt-a.updatedAt)); await saveChat(withReply); setLoading(false); }
  function navTo(targetTab, subId=null) { setTab(targetTab); if(targetTab==="chat") setChatView("list"); if(targetTab==="agents") setAgentView(subId||"hub"); if(targetTab==="tools") setToolView(subId||"hub"); }
  if (!profile) return <OnboardingScreen onComplete={saveProfile} />;
  return (
    <div style={{ height:"100vh", background:BG, display:"flex", flexDirection:"column", fontFamily:"'Barlow',sans-serif", maxWidth:480, margin:"0 auto" }}>
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
        {tab==="home" && <DashboardScreen profile={profile} stats={stats} recentChats={chats.slice(0,3)} onStartJob={createChat} onNav={navTo} onOpenChat={id=>{ setActiveChatId(id); setChatView("chat"); setTab("chat"); }} />}
        {tab==="chat" && chatView==="list" && <ChatListScreen chats={chats} onOpen={id=>{ setActiveChatId(id); setChatView("chat"); }} onCreate={createChat} onDelete={deleteChat} deletingId={deletingId} />}
        {tab==="chat" && chatView==="chat" && <ChatScreen chat={activeChat} onBack={()=>setChatView("list")} onSend={sendMessage} loading={loading} />}
        {tab==="agents" && agentView==="hub" && <AgentsHubScreen onSelect={id=>setAgentView(id)} />}
        {agentView !== "hub" && tab==="agents" && (<div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}><button onClick={()=>setAgentView("hub")} style={{ background:BLACK, border:"none", borderBottom:`1px solid ${BORDER}`, padding:"11px 16px", cursor:"pointer", color:JLL_RED, fontSize:13, fontWeight:700, textAlign:"left", display:"flex", alignItems:"center", gap:6 }}>← All Agents</button>{agentView==="diag" && <FaultDiagnosisAgent workflowCtx={workflowCtx} onWorkflowComplete={ctx=>setWorkflowCtx(prev=>({...prev,...ctx}))} onChainTo={id=>setAgentView(id)} />}{agentView==="escalate" && <EscalationAgent />}{agentView==="predict" && <PredictiveMaintenanceAgent storage={storage} />}{agentView==="parts" && <PartsFinderAgent workflowCtx={workflowCtx} />}{agentView==="refcalc" && <RefrigerantCalcAgent />}{agentView==="commission" && <CommissioningAgent />}{agentView==="safety" && <SafetyBriefingAgent workflowCtx={workflowCtx} />}{agentView==="report" && <ServiceReportAgent storage={storage} profile={profile} workflowCtx={workflowCtx} />}</div>)}
        {tab==="docs" && <DocumentLibraryScreen storage={storage} />}
        {tab==="tools" && toolView==="hub" && <ToolsHubScreen onSelect={id=>setToolView(id)} />}
        {toolView !== "hub" && tab==="tools" && (<div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}><button onClick={()=>setToolView("hub")} style={{ background:BLACK, border:"none", borderBottom:`1px solid ${BORDER}`, padding:"11px 16px", cursor:"pointer", color:JLL_RED, fontSize:13, fontWeight:700, textAlign:"left", display:"flex", alignItems:"center", gap:6 }}>← All Tools</button>{toolView==="model" && <ModelLookupScreen storage={storage} />}{toolView==="pt" && <PTChartScreen />}{toolView==="notes" && <NotesScreen storage={storage} />}{toolView==="equip" && <EquipmentScreen storage={storage} />}{toolView==="parts" && <PartsLogScreen storage={storage} />}{toolView==="photos" && <PhotoScreen storage={storage} />}{toolView==="history" && <ServiceHistoryScreen storage={storage} />}</div>)}
      </div>
      <div style={{ background:BLACK, borderTop:`2px solid rgba(227,6,19,0.3)`, display:"flex", flexShrink:0 }}>
        {[
          { id:"home", icon:"🏠", label:"Home" },
          { id:"chat", icon:"💬", label:"Chat" },
          { id:"agents", icon:"🤖", label:"Agents" },
          { id:"docs", icon:"📚", label:"Docs" },
          { id:"tools", icon:"🛠️", label:"Tools" }
        ].map(t=>(
          <button key={t.id} onClick={()=>navTo(t.id)} style={{ flex:1, background:"transparent", border:"none", padding:"8px 2px 5px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:1, color:tab===t.id?JLL_RED:"rgba(255,255,255,0.4)" }}>
            <span style={{ fontSize:20 }}>{t.icon}</span>
            <span style={{ fontSize:9, fontWeight:700, letterSpacing:".03em", marginTop:1 }}>{t.label}</span>
            {tab===t.id && <div style={{ width:18, height:2, background:JLL_RED, borderRadius:1, marginTop:2 }} />}
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(MTSAssistant));
</script>
</body>
