<!DOCTYPE html>
<html lang="en">

    .red-btn { transition: all 0.2s ease; cursor: pointer; }
    .red-btn:hover { background: #c00010 !important; transform: translateY(-1px); }
    .red-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    @keyframes fadeUp { from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
    @keyframes bounce { 0%,80%,100%{ transform:translateY(0); opacity:0.5; } 40%{ transform:translateY(-6px); opacity:1; } }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #E30613; border-radius: 2px; }
    /* Industrial truck-inspired theme: diagonal grid + carbon texture */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        repeating-linear-gradient(45deg, rgba(227,6,19,0.03) 0px, rgba(227,6,19,0.03) 2px, transparent 2px, transparent 8px),
        repeating-linear-gradient(135deg, rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 1px, transparent 1px, transparent 6px);

function genId() { return "id_" + Date.now() + "_" + Math.random().toString(36).slice(2,6); }
function timeAgo(ts) {
  const d = Date.now()-ts, m = Math.floor(d/60000), h = Math.floor(d/3600000), days = Math.floor(d/86400000);
  if(m<1) return "Just now";
  if(m<60) return `${m}m ago`;

// ----- Shared Components ----------------------------------------------------
function Header({ title, subtitle, onBack, right }) {

}

}

    <div style={{ marginBottom:12 }}>

  );
}
function Textarea({ label, value, onChange, placeholder, rows=3 }) {

    <div style={{ marginBottom:12 }}>
      {label && <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", fontWeight:600, marginBottom:4 }}>{label}</div>}

}
function RedBtn({ children, onClick, disabled, style }) {

// ----- Agent helpers --------------------------------------------------------
async function callAgent(systemPrompt, userPrompt) {
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: systemPrompt }] },
        contents: [{ role: "user", parts: [{ text: userPrompt }] }],
        generationConfig: { maxOutputTokens: 2000 }
      })
    });
    const data = await res.json();
    if (data.error) return "⚠️ API Error: " + (data.error.message || JSON.stringify(data.error));
    return data.candidates?.[0]?.content?.parts?.map(p => p.text).join("") || "No response generated.";
  } catch (err) { return "⚠️ Connection error. Check network and try again."; }
}
function AgentCard({ icon, title, desc, color, onClick }) {
  return (
    <div className="card-hover" onClick={onClick} style={{ background:CARD, border:`1px solid rgba(227,6,19,0.2)`, borderRadius:14, padding:16, marginBottom:12, cursor:"pointer", transition:"all .2s", borderLeft:`4px solid ${color||JLL_RED}` }}>

      </div>
    </div>
  );
}
function AgentResult({ result, onReset, resetLabel="Run Again" }) {
  return (
    <div style={{ animation:"fadeUp .3s ease" }}>

  );
}
function AgentLoading({ label }) {

  );
}

// ----- AGENT 1: Fault Diagnosis (full implementation) -----
function FaultDiagnosisAgent({ workflowCtx, onWorkflowComplete, onChainTo }) {
  const [step, setStep] = useState(0);
  const [brand, setBrand] = useState("");
  const [model, setModel] = useState("");
  const [equipType, setEquipType] = useState("");
  const [symptom, setSymptom] = useState("");
  const [faultCode, setFaultCode] = useState("");
  const [refrigerant, setRefrigerant] = useState("");
  const [age, setAge] = useState("");
  const [result, setResult] = useState("");
  const EQUIP_TYPES = ["RTU","Chiller","Split System","VRF/VRV","Air Handler","FCU","Boiler","Heat Pump","Mini-Split","Cooling Tower"];
  async function runDiagnosis() {
    setStep(1);
    const prompt = `Run a complete HVAC fault diagnosis:\nBrand: ${brand||"Unknown"}\nModel: ${model||"Unknown"}\nEquipment Type: ${equipType||"Unknown"}\nFault Code: ${faultCode||"None"}\nSymptoms: ${symptom}\nRefrigerant: ${refrigerant||"Unknown"}\nUnit Age: ${age||"Unknown"}\n\nProvide: 1. TOP 3 LIKELY CAUSES (ranked %). 2. IMMEDIATE CHECKS. 3. STEP-BY-STEP DIAGNOSIS. 4. SAFETY NOTES. 5. WHEN TO ESCALATE.`;
    const sys = "You are an expert HVAC fault diagnosis agent for JLL MTS. Be structured and field-ready.";
    const r = await callAgent(sys, prompt);
    setResult(r); setStep(2);
    if (onWorkflowComplete) onWorkflowComplete({ diagBrand: brand, diagModel: model, diagEquipType: equipType, diagRefrigerant: refrigerant, diagSymptom: symptom });
  }
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <Header title="FAULT DIAGNOSIS" subtitle="AI DIAGNOSTIC AGENT" />
      <div style={{ flex:1, overflowY:"auto", padding:14 }}>
        {step===0 && (
          <div>
            <div style={{ background:"rgba(227,6,19,0.08)", border:`1px solid rgba(227,6,19,0.2)`, borderRadius:12, padding:12, marginBottom:16, fontSize:12, color:"rgba(255,255,255,0.6)" }}>🤖 This agent runs a structured diagnosis and ranks causes by probability.</div>
            <div style={{ marginBottom:12 }}><div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:4 }}>EQUIPMENT TYPE</div><select value={equipType} onChange={e=>setEquipType(e.target.value)} style={{ width:"100%", background:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px 12px", color:"#fff", fontSize:13 }}><option value="">Select type…</option>{EQUIP_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}><div><div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:4 }}>BRAND</div><select value={brand} onChange={e=>setBrand(e.target.value)} style={{ width:"100%", background:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px 12px", color:"#fff", fontSize:13 }}><option value="">Brand…</option>{BRANDS.map(b=><option key={b}>{b}</option>)}</select></div><Input label="MODEL #" value={model} onChange={setModel} placeholder="e.g. 48XC024" /></div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}><Input label="FAULT CODE" value={faultCode} onChange={setFaultCode} placeholder="e.g. E79"/><div><div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:4 }}>REFRIGERANT</div><select value={refrigerant} onChange={e=>setRefrigerant(e.target.value)} style={{ width:"100%", background:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px 12px", color:"#fff", fontSize:13 }}><option value="">Ref…</option>{REFRIGERANTS.map(r=><option key={r}>{r}</option>)}</select></div></div>
            <Input label="UNIT AGE (years)" value={age} onChange={setAge} placeholder="e.g. 7" type="number"/>
            <Textarea label="SYMPTOMS *" value={symptom} onChange={setSymptom} placeholder="Describe what the unit is doing..." rows={4}/>
            <RedBtn onClick={runDiagnosis} disabled={!symptom.trim()} style={{ width:"100%", padding:14, fontSize:14 }}>🔍 Run Diagnosis</RedBtn>
          </div>
        )}
        {step===1 && <AgentLoading label="RUNNING DIAGNOSIS…"/>}
        {step===2 && (
          <div>
            <AgentResult result={result} onReset={()=>{setStep(0);setResult("");}} resetLabel="New Diagnosis" />
            {onChainTo && (
              <div style={{ background:"rgba(227,6,19,0.07)", border:`1px solid rgba(227,6,19,0.25)`, borderRadius:12, padding:12, marginTop:10 }}>
                <div style={{ fontSize:11, color:JLL_RED, fontWeight:700, marginBottom:8 }}>⚡ CONTINUE WORKFLOW</div>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                  <button onClick={()=>onChainTo("safety")} style={{ background:JLL_RED, border:"none", borderRadius:8, padding:"8px 12px", cursor:"pointer", fontSize:11, fontWeight:700, color:"#fff" }}>🦺 Safety Briefing →</button>
                  <button onClick={()=>onChainTo("parts")} style={{ background:"#222", border:`1px solid ${BORDER}`, borderRadius:8, padding:"8px 12px", cursor:"pointer", fontSize:11, fontWeight:700, color:"#fff" }}>🔩 Find Parts →</button>
                  <button onClick={()=>onChainTo("report")} style={{ background:"#222", border:`1px solid ${BORDER}`, borderRadius:8, padding:"8px 12px", cursor:"pointer", fontSize:11, fontWeight:700, color:"#fff" }}>📄 Service Report →</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function DocumentLibraryScreen({ storage }) {
  const [docs, setDocs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("library");
  const [selectedDoc, setSelectedDoc] = useState(null);
  const [question, setQuestion] = useState("");
  const [answer, setAnswer] = useState("");
  const [asking, setAsking] = useState(false);
  const [search, setSearch] = useState("");
  const [modelSerial, setModelSerial] = useState("");
  const [lookupResult, setLookupResult] = useState(null);
  const [filterType, setFilterType] = useState("");
  const [filterBrand, setFilterBrand] = useState("");

  useEffect(()=>{ load(); },[]);
  async function load(){
    try{ const r=await storage.get("doc_library"); const saved=r?.value?JSON.parse(r.value):[]; setDocs([...DOCUMENT_DB, ...saved]); }catch(e){ setDocs(DOCUMENT_DB); } setLoading(false);
  }
  function handleLookup() {
    const input = modelSerial.toLowerCase();
    const matched = DOCUMENT_DB.filter(doc => 
      doc.keywords.some(kw => input.includes(kw)) || 
      (doc.brand && input.includes(doc.brand.toLowerCase()))
    );
    if (matched.length > 0) setLookupResult(matched);
    else setLookupResult(null);
  }
  async function askDoc(doc, q){ if(!q.trim()) return; setAsking(true); setAnswer(""); const sys="You are an HVAC technical documentation assistant. Answer from the document precisely."; const prompt=`Document: ${doc.name}\nContent: ${doc.content}\nQuestion: ${q}\nAnswer using the document.`; const r=await callAgent(sys,prompt); setAnswer(r); setAsking(false); }
  const filtered = docs.filter(d=>{
    const m=!search||[d.name,d.brand,d.type,...(d.keywords||[])].join(" ").toLowerCase().includes(search.toLowerCase());
    const t=!filterType||d.type===filterType;
    const b=!filterBrand||d.brand===filterBrand;
    return m&&t&&b;
  });
  const typeColors={"Service Manual":JLL_RED,"Fault Code Library":"#E67E22","Commissioning":"#16A085","JLL SOP":"#2980B9","Wiring Reference":"#8E44AD","Refrigerant Specs":"#27AE60","Safety Data Sheet":"#F39C12","Other":"#555"};
  
  if(view==="read"&&selectedDoc){
    return (
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
        <div style={{ background:BLACK, borderBottom:`3px solid ${JLL_RED}`, padding:"10px 14px", display:"flex", alignItems:"center", gap:10, flexShrink:0 }}><button onClick={()=>{setView("library");setAnswer("");setQuestion("");}} style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8, padding:"5px 10px", cursor:"pointer", color:"#fff", fontSize:15 }}>←</button><div style={{ flex:1, minWidth:0 }}><div style={{ fontSize:13, fontWeight:700, color:"#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{selectedDoc.name}</div><div style={{ fontSize:10, color:JLL_RED, fontWeight:600 }}>{selectedDoc.brand} · {selectedDoc.type}</div></div></div>
        <div style={{ flex:1, overflowY:"auto", padding:14 }}>
          <div style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:12, padding:14, marginBottom:14 }}><div style={{ fontSize:10, color:"rgba(255,255,255,0.3)", fontWeight:600, marginBottom:8 }}>DOCUMENT CONTENT</div><div style={{ fontSize:12, color:"rgba(255,255,255,0.7)", lineHeight:1.7, whiteSpace:"pre-wrap" }}>{selectedDoc.content}</div></div>
          <div style={{ background:CARD, border:`1px solid rgba(227,6,19,0.3)`, borderRadius:12, padding:14 }}><div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}><div style={{ width:32, height:32, background:JLL_RED, borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>🤖</div><div><div style={{ fontSize:13, fontWeight:700, color:"#fff" }}>Ask AI About This Document</div><div style={{ fontSize:10, color:"rgba(255,255,255,0.4)" }}>Ask any question — the AI answers from this document</div></div></div><div style={{ display:"flex", gap:8, marginBottom:12 }}><input value={question} onChange={e=>setQuestion(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();askDoc(selectedDoc,question);}}} placeholder="e.g. What are the fault codes?" style={{ flex:1, background:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px 12px", color:"#fff", fontSize:13, outline:"none" }}/><button onClick={()=>askDoc(selectedDoc,question)} disabled={!question.trim()||asking} style={{ background:JLL_RED, border:"none", borderRadius:10, padding:"10px 16px", cursor:"pointer", color:"#fff", fontWeight:700, fontSize:13, flexShrink:0, opacity:(!question.trim()||asking)?0.4:1 }}>{asking?"…":"Ask"}</button></div><div style={{ marginBottom:12 }}><div style={{ fontSize:10, color:"rgba(255,255,255,0.3)", marginBottom:6, fontWeight:600 }}>QUICK QUESTIONS</div><div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>{["What are the fault codes?","What is the subcooling target?","What are the electrical specs?","What PPE is required?"].map(q=>(<button key={q} onClick={()=>{setQuestion(q);askDoc(selectedDoc,q);}} style={{ background:"#222", border:`1px solid ${BORDER}`, borderRadius:20, padding:"5px 10px", cursor:"pointer", fontSize:10, color:"rgba(255,255,255,0.7)" }}>{q}</button>))}</div></div>{asking&&(<div style={{ display:"flex", gap:5, alignItems:"center", padding:"12px 0" }}>{[0,1,2].map(i=><div key={i} style={{ width:7, height:7, borderRadius:"50%", background:JLL_RED, animation:"bounce 1.2s ease-in-out infinite", animationDelay:`${i*.2}s` }}/>)}<span style={{ fontSize:11, color:"rgba(255,255,255,0.4)", marginLeft:6 }}>Reading document…</span></div>)}{answer&&(<div style={{ background:"rgba(227,6,19,0.06)", border:`1px solid rgba(227,6,19,0.2)`, borderRadius:10, padding:12, marginTop:8, fontSize:12, color:"#fff", lineHeight:1.7, whiteSpace:"pre-wrap" }}>{answer}</div>)}</div>
        </div>
      </div>
    );
  }
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <Header title="DOCUMENT LIBRARY" subtitle="MANUALS & DOCUMENTATION" />
      <div style={{ flex:1, overflowY:"auto", padding:14 }}>
        {/* Model/Serial Lookup Panel */}
        <div style={{ background:JLL_RED, borderRadius:12, padding:14, marginBottom:16, boxShadow:"0 4px 12px rgba(227,6,19,0.2)" }}>
          <div style={{ fontSize:13, fontWeight:700, color:"#fff", marginBottom:6, display:"flex", alignItems:"center", gap:6 }}>🔍 Model / Serial Lookup</div>
          <div style={{ fontSize:11, color:"rgba(255,255,255,0.7)", marginBottom:10 }}>Enter a model or serial number to find matching manuals, wiring diagrams, and fault code references.</div>
          <div style={{ display:"flex", gap:8 }}>
            <input value={modelSerial} onChange={e=>setModelSerial(e.target.value)} placeholder="e.g. 48XC024, Trane YCD, Daikin VRV" style={{ flex:1, background:"#fff", border:"none", borderRadius:10, padding:"10px 12px", color:"#000", fontSize:13, outline:"none" }} />
            <button onClick={handleLookup} style={{ background:BLACK, border:"none", borderRadius:10, padding:"10px 16px", cursor:"pointer", color:"#fff", fontWeight:700, fontSize:13 }}>Search</button>
          </div>
          {lookupResult && (
            <div style={{ marginTop:12, background:"rgba(0,0,0,0.2)", borderRadius:10, padding:10 }}>
              <div style={{ fontSize:11, fontWeight:700, color:"#fff", marginBottom:6 }}>✅ Found {lookupResult.length} document(s):</div>
              {lookupResult.map((doc,i)=>(
                <button key={i} onClick={()=>{setSelectedDoc(doc);setView("read");setAnswer("");setQuestion("");}} style={{ display:"block", width:"100%", textAlign:"left", background:"rgba(255,255,255,0.1)", border:"none", borderRadius:8, padding:"8px 10px", marginBottom:6, cursor:"pointer", fontSize:12, color:"#fff" }}>{doc.name} ({doc.brand})</button>
              ))}
            </div>
          )}
          {modelSerial && !lookupResult && <div style={{ marginTop:10, fontSize:11, color:"rgba(255,255,255,0.6)" }}>No exact match found. Try a shorter or more specific model number.</div>}
        </div>
        {/* Search & filters */}
        <div style={{ marginBottom:12 }}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Search manuals, fault codes, SOPs…" style={{ width:"100%", background:CARD, border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px 12px", color:"#fff", fontSize:13, outline:"none", marginBottom:8 }}/><div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}><select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{ background:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"8px 10px", color:filterType?"#fff":"rgba(255,255,255,0.35)", fontSize:12, outline:"none" }}><option value="">All types</option>{[...new Set(docs.map(d=>d.type))].map(t=><option key={t}>{t}</option>)}</select><select value={filterBrand} onChange={e=>setFilterBrand(e.target.value)} style={{ background:"#222", border:`1px solid ${BORDER}`, borderRadius:10, padding:"8px 10px", color:filterBrand?"#fff":"rgba(255,255,255,0.35)", fontSize:12, outline:"none" }}><option value="">All brands</option>{[...new Set(docs.map(d=>d.brand))].map(b=><option key={b}>{b}</option>)}</select></div></div>
        <div style={{ display:"flex", gap:8, marginBottom:14 }}>{[{label:`${filtered.length} Documents`,icon:"📚"},{label:`${[...new Set(docs.map(d=>d.brand))].length} Brands`,icon:"🏭"},{label:`${[...new Set(docs.map(d=>d.type))].length} Types`,icon:"📂"}].map(s=>(<div key={s.label} style={{ flex:1, background:CARD, border:`1px solid rgba(227,6,19,0.12)`, borderRadius:8, padding:"7px 8px", textAlign:"center" }}><div style={{ fontSize:16 }}>{s.icon}</div><div style={{ fontSize:9, color:"rgba(255,255,255,0.4)", fontWeight:600, marginTop:2 }}>{s.label}</div></div>))}</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr", gap:10 }}>
          {filtered.map(doc=>(<div key={doc.id} style={{ background:CARD, border:`1px solid rgba(227,6,19,0.12)`, borderRadius:12, padding:12 }}><div style={{ display:"flex", alignItems:"flex-start", gap:10 }}><div style={{ width:40, height:40, borderRadius:9, background:typeColors[doc.type]||"#555", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>{{"Service Manual":"📖","Fault Code Library":"⚠️","Commissioning":"🚀","JLL SOP":"🏢","Wiring Reference":"⚡","Refrigerant Specs":"❄️","Safety Data Sheet":"🦺","Other":"📄"}[doc.type]||"📄"}</div><div style={{ flex:1, minWidth:0 }}><div style={{ fontSize:13, fontWeight:700, color:"#fff", marginBottom:3 }}>{doc.name}</div><div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap", marginBottom:6 }}><span style={{ fontSize:10, background:`rgba(227,6,19,0.15)`, color:JLL_RED, borderRadius:5, padding:"2px 7px", fontWeight:700 }}>{doc.type}</span><span style={{ fontSize:10, color:"rgba(255,255,255,0.4)", fontWeight:600 }}>{doc.brand}</span></div><div style={{ display:"flex", gap:8 }}><button onClick={()=>{setSelectedDoc(doc);setView("read");setAnswer("");setQuestion("");}} style={{ flex:1, background:JLL_RED, border:"none", borderRadius:8, padding:"8px", cursor:"pointer", fontSize:11, fontWeight:700, color:"#fff" }}>📖 Open & Ask AI</button></div></div></div></div>))}
        </div>
      </div>
    </div>
  );
}
