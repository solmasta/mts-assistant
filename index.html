<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>MTS Assistant</title>
                <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
                    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
                        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
                            <style>
                                    body { margin: 0; background: #f0f0f0; font-family: Arial; }
                                            .grid { 
                                                            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                                                                        background-image: linear-gradient(to right, #ddd 1px, transparent 1px), linear-gradient(to bottom, #ddd 1px, transparent 1px);
                                                                                    background-size: 20px 20px; z-index: -1;
                                            }
                                                    .banner { 
                                                                    display: flex; justify-content: center; align-items: center; 
                                                                                height: 100vh; color: red; font-size: 30px; font-weight: bold; 
                                                    }
                                                        </style>
                                                        </head>
                                                        <body>
                                                            <div class="grid"></div>
                                                                <div id="root"></div>
                                                                    <script type="text/babel">
                                                                            function App() {
                                                                                            return (
                                                                                                                <div className="banner">
                                                                                                                                    MTS ASSISTANT IS LIVE (CDN VERSION)
                                                                                                                                                    </div>
                                                                                            );
                                                                            }
                                                                                    const root = ReactDOM.createRoot(document.getElementById('root'));
                                                                                            root.render(<App />);
                                                                                                </script>
                                                                                                </body>
                                                                                                </html>
