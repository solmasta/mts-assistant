.bar-fill{height:100%;background:#E30613;animation:load 2.5s ease forwards}
@keyframes load{from{width:0}to{width:100%}}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-8px);opacity:1}}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#E30613;border-radius:4px}
/* Desktop: show the app as a centered phone-width panel on a wider backdrop, unless installed standalone */
@media (min-width:700px){
  body:not(.standalone){
    background:radial-gradient(circle at 50% 0%,#1a1a1a,#050505 70%);
  }
  body:not(.standalone) #root{
    display:flex;align-items:center;justify-content:center;height:100vh;
  }
  body:not(.standalone) .app-shell{
    height:92vh!important;max-height:900px;border-radius:28px!important;
    box-shadow:0 30px 90px rgba(0,0,0,.6),0 0 0 1px rgba(227,6,19,.15);
    overflow:hidden;
  }
}
</style>
</head>

<script>
  // Detect standalone/installed mode (desktop PWA or "Add to Home Screen") to drop the phone-frame chrome
  if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
    document.body.classList.add('standalone');
  }
</script>

<script type="text/babel">

const {useState,useEffect,useRef}=React;
const RED="#E30613",BG="#0a0a0a",CARD="#161616",DARK="#111",BORDER="rgba(227,6,19,0.2)";
const PROXY="https://mts-proxy-omega.vercel.app/api/proxy";

// ── STORAGE ──────────────────────────────────────────────────────────────
const S={
  get:async k=>{const v=localStorage.getItem('m__'+k);if(v===null)throw 0;return{value:v};},
  set:async(k,v)=>{localStorage.setItem('m__'+k,v);return{value:v};},
  del:async k=>{localStorage.removeItem('m__'+k);},
  list:async p=>{const out=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('m__'+(p||'')))out.push(k.slice(3));}return out;}
};

// ── AI CALL ──────────────────────────────────────────────────────────────
async function ai(system,prompt,images){
  try{
    const parts=[{text:prompt}];
    if(images&&images.length){
      for(const img of images){
        parts.push({inlineData:{mimeType:"image/jpeg",data:img}});
      }
    }
    const r=await fetch(PROXY,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        systemInstruction:{parts:[{text:system}]},
        contents:[{role:"user",parts}],
        generationConfig:{maxOutputTokens:2000}
      })
    });
    const d=await r.json();
    if(d.error)return"⚠️ "+(d.error.message||JSON.stringify(d.error));
    return d.candidates?.[0]?.content?.parts?.map(p=>p.text).join("")||"No response.";
  }catch(e){return"⚠️ "+e.message;}
}

// ── IMAGE RESIZE (automatic, non-optional) ────────────────────────────────
// Every image is downscaled + recompressed before it ever reaches the AI.
// Longest edge capped at 1024px, JPEG quality 0.7 — cuts tokens/cost hugely
// while staying more than sharp enough for fault codes, labels, wiring, gauges.
function resizeImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=1024;
        let{width:w,height:h}=img;
        if(w>MAX||h>MAX){
          if(w>h){h=Math.round(h*MAX/w);w=MAX;}
          else{w=Math.round(w*MAX/h);h=MAX;}
        }
        const canvas=document.createElement("canvas");
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        const dataUrl=canvas.toDataURL("image/jpeg",0.7);
        resolve({
          base64:dataUrl.split(",")[1],
          preview:dataUrl,
          width:w,height:h
        });
      };
      img.onerror=reject;
      img.src=e.target.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

// ── HELPERS ──────────────────────────────────────────────────────────────
const gid=()=>"id"+Date.now()+Math.random().toString(36).slice(2,5);
const ago=t=>{const m=Math.floor((Date.now()-t)/60000);return m<1?"now":m<60?m+"m":Math.floor(m/60)+"h";};
const BRANDS=["Carrier","Trane","York","Lennox","Daikin","Mitsubishi","LG","Goodman","Rheem","Ruud","Bryant","Bosch","American Standard","Amana"];
const REFS=["R-410A","R-22","R-32","R-454B","R-407C","R-134a"];

// ── UI PRIMITIVES ────────────────────────────────────────────────────────
function Btn({c,onClick,disabled,red,style={}}){
  return <button onClick={onClick} disabled={disabled} style={{
    background:red?"linear-gradient(135deg,#E30613,#b00010)":CARD,
    border:red?"none":`1px solid ${BORDER}`,
    borderRadius:12,padding:"11px 18px",color:"#fff",fontWeight:700,
    fontSize:14,cursor:"pointer",opacity:disabled?.4:1,
    boxShadow:red?"0 4px 16px rgba(227,6,19,.3)":"none",...style
  }}>{c}</button>;
}

function Inp({label,val,set,ph,type="text",rows}){
  const s={width:"100%",background:"#1a1a1a",border:`1px solid ${BORDER}`,
    borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:14,outline:"none",fontFamily:"inherit"};
  return <div style={{marginBottom:12}}>
    {label&&<div style={{fontSize:11,color:"rgba(255,255,255,.5)",fontWeight:700,marginBottom:4,letterSpacing:".08em"}}>{label}</div>}
    {rows
      ?<textarea value={val} onChange={e=>set(e.target.value)} placeholder={ph} rows={rows} style={{...s,resize:"vertical"}}/>
      :<input type={type} value={val} onChange={e=>set(e.target.value)} placeholder={ph} style={s}/>
    }
  </div>;

function AgentScreen({title,sub,intro,form,onRun,canRun,result,onReset,resetLabel,chainBtns}){
  const [step,setStep]=useState(0);
  const [res,setRes]=useState("");
  async function run(){
    setStep(1);
    const r=await onRun();
    setRes(r);
    setStep(2);
  }
  return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <Hdr title={title} sub={step===1?"WORKING…":step===2?"COMPLETE":sub}/>
    <div style={{flex:1,overflowY:"auto",padding:14}}>
      {step===0&&<>
        {intro&&<Card style={{background:"rgba(227,6,19,.06)",marginBottom:14}} c={<div style={{fontSize:12,color:"rgba(255,255,255,.6)",lineHeight:1.5}}>{intro}</div>}/>}
        {form}
        <Btn red c="▶ Run Agent" onClick={run} disabled={!canRun} style={{width:"100%",padding:13,marginTop:4}}/>
      </>}
      {step===1&&<Spin label="ANALYSING…"/>}
      {step===2&&<>
        <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:14,
          whiteSpace:"pre-wrap",fontSize:13,color:"#ddd",lineHeight:1.7,marginBottom:12}}>{res}</div>
        {chainBtns&&<div style={{background:"rgba(227,6,19,.07)",border:`1px solid rgba(227,6,19,.25)`,borderRadius:12,padding:12,marginBottom:12}}>
          <div style={{fontSize:11,color:RED,fontWeight:700,marginBottom:8}}>⚡ CONTINUE WORKFLOW</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{chainBtns}</div>
        </div>}
        <Btn red c={resetLabel||"Run Again"} onClick={()=>{setStep(0);setRes("");if(onReset)onReset();}} style={{width:"100%"}}/>
      </>}
    </div>
  </div>;
}

function DiagAgent({ctx,setCtx,onChain}){
  const [brand,setBrand]=useState(ctx?.diagBrand||"");

  const [equip,setEquip]=useState(ctx?.diagEquip||"");
  const [fault,setFault]=useState("");
  const [ref,setRef]=useState(ctx?.diagRef||"");
  const [age,setAge]=useState("");
  const [symp,setSymp]=useState(ctx?.diagSymp||"");
  return <AgentScreen
    title="FAULT DIAGNOSIS" sub="AI DIAGNOSTIC AGENT"
    intro="🤖 Describe the fault — the AI ranks causes by probability and gives a full diagnostic procedure."
    canRun={!!symp.trim()}

      const r=await ai(
        "You are an expert HVAC fault diagnosis agent for JLL MTS. Give structured ranked diagnosis with probability percentages. Flag safety items with ⚠️. Be concise and field-ready.",

  const tog=h=>setHaz(p=>p.includes(h)?p.filter(x=>x!==h):[...p,h]);
  return <AgentScreen
    title="SAFETY BRIEFING" sub="PRE-JOB SAFETY AGENT"

        <Sel label="EQUIPMENT" val={equip} set={setEquip} opts={["RTU","Chiller","Split System","VRF/VRV","Air Handler","Heat Pump","FCU","Boiler"]}/>
        <Sel label="LOCATION" val={loc} set={setLoc} opts={LOCS}/>
      </div>

function ChatConvo({chat,onBack,onSend,busy}){
  const [text,setText]=useState("");
  const [pending,setPending]=useState([]); // [{base64,preview,width,height,name,isDoc}]
  const [resizing,setResizing]=useState(false);
  const endRef=useRef(null);
  const fileRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[chat?.messages,busy]);

  async function handleFiles(e){
    const files=Array.from(e.target.files||[]);
    if(!files.length)return;
    setResizing(true);
    const items=[];
    for(const f of files){
      if(f.type.startsWith("image/")){
        try{
          const r=await resizeImage(f);
          items.push({...r,name:f.name,isDoc:false});
        }catch{}
      }else{
        // Non-image document: read as text if possible, else just attach name as note
        try{
          const text=await f.text();
          items.push({name:f.name,isDoc:true,text:text.slice(0,6000)});
        }catch{
          items.push({name:f.name,isDoc:true,text:""});
        }
      }
    }
    setPending(p=>[...p,...items]);
    setResizing(false);
    e.target.value="";
  }

  function removePending(i){setPending(p=>p.filter((_,idx)=>idx!==i));}

  const send=()=>{
    if((text.trim()||pending.length)&&!busy){
      onSend(text.trim(),pending);
      setText("");setPending([]);
    }
  };
  const Q=[{i:"🔧",t:"I have an HVAC fault, help me diagnose it."},{i:"⚠️",t:"What PPE do I need for this job?"},{i:"🌡️",t:"Help me check the refrigerant charge."},{i:"📄",t:"Help me write a service report."}];
  return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <div style={{background:DARK,borderBottom:`3px solid ${RED}`,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
      <button onClick={onBack} style={{background:"rgba(255,255,255,.08)",border:"none",borderRadius:8,padding:"6px 12px",color:"#fff",fontSize:18,cursor:"pointer"}}>←</button>
      <div style={{fontSize:14,fontWeight:700,color:"#fff",flex:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{chat?.title||"New Job"}</div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:14}}>
      {(!chat?.messages||chat.messages.length===0)&&<div style={{marginBottom:16}}>
        <div style={{fontSize:12,color:"rgba(255,255,255,.3)",textAlign:"center",marginBottom:12}}>Quick start</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {Q.map(q=><button key={q.t} onClick={()=>onSend(q.t,[])} style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:"10px",cursor:"pointer",textAlign:"left",fontSize:11,color:"rgba(255,255,255,.7)",lineHeight:1.4}}>
            <span style={{fontSize:16,display:"block",marginBottom:4}}>{q.i}</span>{q.t}
          </button>)}
        </div>
      </div>}
      {chat?.messages?.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:10}}>
        {m.role==="assistant"&&<div style={{width:32,height:32,background:RED,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,marginRight:8}}>🔧</div>}
        <div style={{maxWidth:"80%",display:"flex",flexDirection:"column",gap:6,alignItems:m.role==="user"?"flex-end":"flex-start"}}>
          {m.images&&m.images.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            {m.images.map((src,ii)=><img key={ii} src={src} style={{width:90,height:90,objectFit:"cover",borderRadius:10,border:`1px solid ${BORDER}`}}/>)}
          </div>}
          {m.docs&&m.docs.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            {m.docs.map((d,ii)=><div key={ii} style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:8,padding:"6px 10px",fontSize:11,color:"rgba(255,255,255,.6)",display:"flex",alignItems:"center",gap:6}}>📄 {d}</div>)}
          </div>}
          {m.content&&<div style={{background:m.role==="user"?RED:CARD,borderRadius:m.role==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px",padding:"10px 14px",fontSize:13,color:"#fff",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{m.content}</div>}
        </div>
      </div>)}
      {busy&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0"}}>
        <div style={{width:32,height:32,background:RED,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🔧</div>
        <div style={{display:"flex",gap:5}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:RED,animation:"bounce 1.2s infinite",animationDelay:i*.2+"s"}}/>)}</div>
      </div>}
      <div ref={endRef}/>
    </div>
    <div style={{background:DARK,borderTop:`1px solid ${BORDER}`,padding:"10px 12px",flexShrink:0}}>
      {resizing&&<div style={{fontSize:11,color:"rgba(255,255,255,.4)",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
        <div style={{width:6,height:6,borderRadius:"50%",background:RED,animation:"bounce 1s infinite"}}/> Optimising image…
      </div>}
      {pending.length>0&&<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
        {pending.map((p,i)=><div key={i} style={{position:"relative"}}>
          {p.isDoc
            ?<div style={{width:60,height:60,background:CARD,border:`1px solid ${BORDER}`,borderRadius:8,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontSize:9,color:"rgba(255,255,255,.6)",padding:4,textAlign:"center",overflow:"hidden"}}>
                📄<div style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",width:"100%",marginTop:2}}>{p.name}</div>
              </div>
            :<img src={p.preview} style={{width:60,height:60,objectFit:"cover",borderRadius:8,border:`1px solid ${BORDER}`}}/>
          }
          <button onClick={()=>removePending(i)} style={{position:"absolute",top:-6,right:-6,width:18,height:18,borderRadius:"50%",background:RED,border:"none",color:"#fff",fontSize:11,cursor:"pointer",lineHeight:1}}>×</button>
        </div>)}
      </div>}
      <div style={{display:"flex",gap:8}}>
        <input ref={fileRef} type="file" accept="image/*,.pdf,.txt,.csv,.doc,.docx" multiple onChange={handleFiles} style={{display:"none"}}/>
        <button onClick={()=>fileRef.current?.click()} style={{background:"#1a1a1a",border:`1px solid ${BORDER}`,borderRadius:10,padding:"0 14px",cursor:"pointer",color:"rgba(255,255,255,.6)",fontSize:18}}>📎</button>
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder="Ask anything about HVAC…"
          style={{flex:1,background:"#1a1a1a",border:`1px solid ${BORDER}`,borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:14,outline:"none",fontFamily:"inherit"}}/>
        <button onClick={send} disabled={(!text.trim()&&!pending.length)||busy} style={{background:RED,border:"none",borderRadius:10,padding:"0 16px",cursor:"pointer",color:"#fff",fontSize:18,opacity:((!text.trim()&&!pending.length)||busy)?.4:1}}>▶</button>
      </div>
    </div>
  </div>;
}

const DOCS=[

   content:"Trane YCD/YCH Packaged Rooftop, 3-12.5 tons. Fault codes: 1=High pressure cutout (check condenser airflow obstruction, refrigerant overcharge, condenser coil fouling). 2=Low pressure cutout (check suction pressure, TXV superheat setting, filter drier, low refrigerant charge). 4=Compressor over-temperature (check discharge temp sensor wiring, compressor oil level, run capacitor). 6=High discharge temperature (check condenser airflow, refrigerant charge, TXV operation, non-condensables in system). 10=Loss of charge / low pressure switch open more than 3 times per hour (check for leaks using electronic detector, recharge per nameplate after repair, verify with subcooling/superheat method)."},

  {id:"d3",name:"York ZF/ZR Chiller Fault Codes",brand:"York",type:"Fault Code Library",tags:["chiller","fault codes","screw compressor"],
   content:"York YZ/YK centrifugal and YCAL/YLAA screw chillers. Common alarms: A140=High discharge pressure (check condenser water flow, tower fan operation, fouled condenser tubes). A141=Low suction pressure/evaporator freeze protection (check chilled water flow, low refrigerant charge, expansion valve). A160=Motor high temperature (check load, cooling flow to motor, VFD if equipped). A200=Oil pressure fault (check oil level, oil filter, oil heater operation during off-cycle). Standard chilled water delta-T target: 10-12°F. Condenser water delta-T target: 10°F. Always verify flow switches are made before troubleshooting pressure faults."},

  {id:"d4",name:"Daikin VRV IV Commissioning Guide",brand:"Daikin",type:"Commissioning",tags:["VRF","VRV","startup","commissioning"],
   content:"Daikin VRV IV commissioning procedure: Power outdoor unit minimum 12 hours before startup to activate crankcase heaters and prevent liquid refrigerant migration damage. Perform test run via BRC1H52 wired remote or service checker tool. Normal operating pressures: suction 100-180 psig, discharge 350-450 psig (varies by ambient and load). Required commissioning documentation: refrigerant additional charge calculation based on total piping length, operating parameters recorded at 30/60/90 minute intervals, indoor unit addressing verification, all branch selector box operation confirmed. Piping limits: max total piping length 1000ft equivalent, max height difference 90m outdoor above indoor or 40m indoor above outdoor. Additional refrigerant charge formula: liquid line length beyond base charge amount × charge factor per refrigerant/pipe size per Daikin engineering data."},

  {id:"d5",name:"Daikin VRV Diagnostic & Error Codes",brand:"Daikin",type:"Fault Code Library",tags:["VRF","VRV","fault codes"],
   content:"Daikin VRV common error codes: E3=High pressure protection activated (check outdoor coil cleanliness, refrigerant overcharge, blocked airflow). E4=Low pressure protection (check refrigerant undercharge, indoor unit filter blockage, closed shutoff valve). E5=Compressor motor overload (check compressor winding resistance, inverter fault, high discharge temp). U4/U5=Transmission error between indoor/outdoor (check F1-F2 communication wiring polarity and continuity, check for wiring near high-voltage sources causing interference). U2=Power supply insufficient/voltage drop (check main power supply voltage, wire gauge sizing to outdoor unit distance). P4=Discharge pipe temperature abnormal (check refrigerant charge, EEV operation). Central Remote Controller Group errors typically indicate addressing conflicts — verify each indoor unit has unique address before troubleshooting individual unit faults."},

  {id:"d6",name:"Mitsubishi City Multi Error Code Library",brand:"Mitsubishi",type:"Fault Code Library",tags:["VRF","fault codes"],
   content:"Mitsubishi City Multi PUHY/PURY series: 1102=Discharge temperature abnormally high (check refrigerant charge, EEV operation, compressor condition). 1302=High pressure sensor system error (check sensor wiring, replace sensor if reading is fixed/stuck). 1500=Refrigerant overcharge detected (verify against nameplate + piping charge calculation, recover excess). 4102=Communication error between outdoor units on same refrigerant system (check shielded cable, check for damage or moisture ingress at connections). 5101=Serial communication error indoor to outdoor (check M-NET wiring polarity, address settings, terminating resistor if end unit). 6844=Address duplication in group (renumber conflicting indoor unit addresses via remote controller service mode)."},

  {id:"d7",name:"LG Multi V 5 VRF Error Codes",brand:"LG",type:"Fault Code Library",tags:["VRF","fault codes"],
   content:"LG Multi V 5: CH05 series errors. 21=DC link voltage peak error (check compressor insulation resistance, inverter board). 22=CT sensor error on compressor current (check CT sensor connection, wiring). 41=Discharge pipe (D-pipe) temperature too high (check refrigerant charge level, EEV position, condenser fan operation). 42=Discharge pipe sensor open/short (replace sensor). 45=High pressure sensor error (check sensor connector, replace if faulty). 53=Communication error indoor-outdoor (check F1/F2 2-core cable, check for reversed polarity, verify address DIP switches). Standard commissioning check: verify liquid/gas line sizing matches LG engineering software output before charging."},

  {id:"d8",name:"R-410A Refrigerant Safety & Handling SOP",brand:"General",type:"JLL SOP",tags:["R-410A","safety","EPA 608","PPE"],
   content:"R-410A safe handling procedure: Required PPE — safety glasses or goggles (ANSI Z87.1), cryogenic-rated gloves, long sleeves, closed-toe footwear. EPA Section 608 certification (Universal or Type II minimum) required by law before working on equipment containing this refrigerant. Always recover refrigerant to appropriate recovery cylinder before opening any system component — venting to atmosphere is illegal under EPA regulations. Never apply heat to refrigerant cylinders. Store cylinders upright and secured to prevent tipping. R-410A operates at higher pressures than R-22 (roughly 60% higher) — always verify gauge set and hoses are rated for R-410A service (500 psig minimum working pressure). Leak detection: electronic halogen leak detector preferred over soap bubbles for small leaks. Maximum allowable annual leak rate before repair is required: 15% of total charge for comfort cooling appliances containing 50+ lbs, 20% for industrial process refrigeration."},

  {id:"d9",name:"R-32 Refrigerant Safety Considerations",brand:"General",type:"JLL SOP",tags:["R-32","safety","A2L","mildly flammable"],
   content:"R-32 is classified A2L (mildly flammable, lower toxicity) under ASHRAE 34. Additional precautions beyond standard refrigerant handling: no open flame or spark-producing tools within work area during recovery/charging, ensure adequate ventilation especially in confined spaces or mechanical rooms, use only R-32 rated recovery machines and cylinders (do not mix with R-410A equipment), leak detection equipment must be rated for flammable refrigerant detection. Charge limits per room size apply per manufacturer specifications and local code — do not exceed without proper ventilation calculations. Brazing/soldering requires purge gas (nitrogen) flowing through lines during the entire process, same as other refrigerants, but extra care around ignition sources is mandatory given A2L classification."},

  {id:"d10",name:"Low Voltage Control Circuit Reference",brand:"General",type:"Wiring Reference",tags:["controls","24V","thermostat","troubleshooting"],
   content:"Standard low voltage control circuit (24VAC): R=24V hot from transformer secondary, C=common/neutral return, Y=call for cooling (energizes compressor contactor), Y2=second stage cooling, W=call for heat, W2=second stage heat/aux heat, G=indoor blower fan, O=reversing valve energized for cooling mode (heat pump), B=reversing valve energized for heating mode (heat pump), E=emergency heat. Troubleshooting sequence: 1) Check transformer secondary voltage 24-28VAC between R and C at the transformer itself. 2) Check any inline low-voltage fuse (typically 3A) on the control board. 3) Verify 24V is present at R-C terminals at the thermostat subbase. 4) Check for shorts to ground or between conductors — a common failure is a pinched wire against the cabinet causing a short that blows the transformer fuse repeatedly. 5) Verify correct signal presence: R-G energized = fan should run, R-Y energized = compressor contactor should pull in, R-W energized = heat should activate. Common field faults: a shorted Y wire causes immediate compressor contactor lockout and can trip breaker or blow fuse; an open C wire causes intermittent thermostat operation or loss of programming; corroded connections at the outdoor unit low-voltage terminal block are a frequent cause of nuisance no-cool calls."},

  {id:"d11",name:"Rooftop Unit Insulation & Weatherproofing SOP",brand:"General",type:"JLL SOP",tags:["insulation","weatherproofing","maintenance","rooftop"],
   content:"Rooftop unit insulation inspection and repair procedure: Inspect all refrigerant line insulation (typically closed-cell elastomeric foam, 3/4 inch wall minimum for suction lines) for UV degradation, cracking, or water intrusion — replace any insulation showing cracking or loss of adhesion at seams. All exterior insulation must be covered with UV-resistant jacketing or mastic coating; bare foam insulation degrades rapidly in direct sunlight (typically within 1-2 years) and must always be protected. Cabinet panel gaskets: inspect door and access panel gaskets annually, replace if compressed, torn, or no longer sealing — poor gasket seal allows conditioned air bypass and moisture intrusion leading to internal corrosion. Curb-to-unit gasket: verify continuous seal around full perimeter of roof curb, re-caulk any gaps with appropriate roofing-grade sealant compatible with the roof membrane. Condensate drain pan insulation: verify drain pan insulation is intact to prevent secondary condensation and dripping. Duct insulation at unit connections: verify external duct wrap (typically R-6 minimum per code) is intact and vapor barrier is not compromised, as compromised vapor barriers lead to condensation and mold within duct insulation."},

  {id:"d12",name:"Chilled Water Pipe Insulation Standards",brand:"General",type:"JLL SOP",tags:["insulation","chilled water","condensation"],
   content:"Chilled water piping insulation requirements: Standard insulation is closed-cell elastomeric foam or fiberglass with vapor barrier jacket, thickness per ASHRAE 90.1 based on pipe diameter (typically 1-1.5 inch wall for pipes under 4 inch diameter carrying fluid below 60°F). Vapor barrier integrity is critical — any break in the vapor barrier on cold piping leads to condensation forming within the insulation, which reduces R-value and can cause corrosion under insulation (CUI) on steel piping over time. Inspection points: all pipe hangers and supports (a common failure point where insulation is compressed or missing, causing a thermal bridge and condensation point), valve bodies and flanges (often under-insulated by original installers), pipe penetrations through walls/floors. Repair procedure: cut back damaged insulation to sound material, replace with matching thickness insulation, seal all seams and joints with vapor barrier mastic or tape rated for the application, ensure continuous vapor seal at pipe hanger locations using vapor barrier saddles or blocks rather than allowing hangers to contact bare pipe directly."},

  {id:"d13",name:"Quarterly PM Checklist – Packaged RTU",brand:"General",type:"Maintenance Procedure",tags:["PM","maintenance","RTU","checklist"],
   content:"Quarterly preventive maintenance checklist for packaged rooftop units: 1) Replace or clean air filters — verify correct size and MERV rating per specification. 2) Inspect and clean condenser coil — remove debris, check fin condition, comb bent fins if needed. 3) Inspect evaporator coil for cleanliness and biological growth, clean if necessary with coil cleaner appropriate for coil material. 4) Check refrigerant charge via superheat/subcooling method, compare to manufacturer target. 5) Inspect and tighten all electrical connections — a loose connection is a leading cause of premature component failure. 6) Check belt tension and condition on belt-drive units, replace if cracked or glazed. 7) Lubricate motor bearings per manufacturer schedule (many modern motors are sealed/permanently lubricated — verify before applying grease). 8) Check condensate drain and pan for clogs, algae growth, proper slope; flush drain line with condensate pan tablets or dilute bleach solution. 9) Verify economizer damper operation and actuator response across full range. 10) Test all safety controls: high/low pressure switches, freeze stat, high limit switch. 11) Check compressor amp draw against nameplate RLA at steady-state operation. 12) Inspect insulation on refrigerant lines and cabinet panels per insulation SOP. 13) Verify BAS/controls communication if unit is networked — confirm setpoints match sequence of operations."},

  {id:"d14",name:"Annual PM Checklist – Air-Cooled Chiller",brand:"General",type:"Maintenance Procedure",tags:["PM","maintenance","chiller","checklist"],
   content:"Annual preventive maintenance for air-cooled chillers: 1) Clean condenser coils thoroughly — pressure wash from inside out where accessible, use coil cleaner for heavy fouling. 2) Perform oil analysis on compressor oil sample, check for moisture content and acid level. 3) Check and calibrate all temperature and pressure sensors against a certified reference instrument. 4) Inspect and test all safety controls: high pressure cutout, low pressure/freeze protection, oil pressure differential switch, motor overload protection. 5) Megger test compressor motor windings, compare to baseline/manufacturer minimum acceptable resistance. 6) Inspect and tighten all electrical connections in control panel and power wiring, thermal-scan under load if equipment available. 7) Check refrigerant charge and log with subcooling calculation at design load conditions if possible. 8) Inspect and lubricate condenser fan motor bearings per schedule. 9) Verify VFD operation if equipped — check for fault history in drive memory, clean cooling fans/heat sinks on drive. 10) Water treatment check for water-cooled variants — verify glycol concentration if applicable using refractometer. 11) Document all readings: entering/leaving chilled water temps, entering/leaving condenser temps (or ambient for air-cooled), suction/discharge pressures, compressor amps, and compare year-over-year for trending degradation."},

  {id:"d15",name:"Belt-Drive Motor & Bearing Maintenance",brand:"General",type:"Maintenance Procedure",tags:["motors","bearings","maintenance"],
   content:"Belt-drive fan motor and bearing maintenance procedure: Belt tension check — proper deflection is typically 1/64 inch of deflection per inch of span length when moderate thumb pressure is applied at the belt's midpoint; over-tensioned belts cause premature bearing failure, under-tensioned belts slip and cause reduced airflow and belt glazing. Belt alignment — use a straightedge or laser alignment tool across both pulley faces, misalignment causes uneven belt wear and vibration. Pillow block bearing lubrication — most bearings require grease at manufacturer-specified intervals (commonly every 2000-4000 operating hours for continuous duty applications); use only the grease type specified (lithium-based greases should not be mixed with other types); over-greasing is a common error that causes bearing overheating — purge old grease but do not force excessive new grease into a sealed bearing. Motor insulation resistance testing — megger test annually, minimum acceptable resistance is typically 1 megohm per kV of rated voltage plus 1 megohm, though always refer to manufacturer specification. Vibration analysis — elevated vibration readings often indicate bearing wear, misalignment, or imbalance before audible or visible symptoms appear; establish a baseline reading when equipment is new or known-good for future comparison."},

  {id:"d16",name:"BAS Integration Overview – BACnet Systems",brand:"General",type:"BAS Integration",tags:["BAS","BACnet","controls integration"],
   content:"BACnet is the dominant open protocol for commercial building automation integration. Key concepts for HVAC technicians: BACnet objects represent points in the system (Analog Input=sensor readings like temperature, Analog Output=commands like valve position, Binary Input=status like a fan proof switch, Binary Output=commands like a fan start/stop relay, Multi-state Value=mode selections). Each device on the network has a unique Device Instance number — duplicate device instances cause communication failures and must be corrected before any point mapping will function correctly. Network types: BACnet/IP runs over standard Ethernet, BACnet MS/TP runs over RS-485 serial and is common for field-level controllers connecting to a supervisory BACnet/IP network via a router or gateway. When diagnosing a 'point not updating' complaint from BAS operators: 1) Verify the physical sensor or actuator is functioning correctly first (this is the technician's job) before assuming a network/software issue. 2) Check that the controller has power and is not showing a fault LED. 3) Verify MS/TP wiring — proper polarity (+ and -), correct termination resistors (120 ohm) at only the two physical ends of the trunk, and daisy-chain topology (not a star/home-run topology, which MS/TP does not support). 4) Check for address/baud rate conflicts on the MS/TP trunk. A unit operating correctly in local/standalone mode but not reporting to BAS points to a network or controller communication issue rather than an HVAC mechanical fault."},

  {id:"d17",name:"BAS Integration – Diagnosing Sensor Discrepancies",brand:"General",type:"BAS Integration",tags:["BAS","diagnostics","sensors","controls"],
   content:"When a BAS-reported value doesn't match field-measured conditions, follow this diagnostic sequence: 1) Physically verify the actual condition first using a calibrated field instrument (thermometer, manometer, etc.) at the sensor location — never assume the BAS reading is correct or incorrect without a physical check. 2) Locate the actual sensor and inspect for physical issues: sensor out of position (e.g., a duct temperature sensor not properly inserted into the airstream), sensor exposed to a false reading source (e.g., a return air sensor picking up light fixture heat, an outdoor air sensor in direct sun without a sun shield). 3) Check sensor wiring for damage, corrosion at connections, or incorrect wiring (many sensors are 2-wire resistive types like 10K thermistors — a partial short or high resistance connection skews the reading predictably). 4) If BAS platform allows, check the raw/unscaled input value at the controller versus the calibrated/displayed value — a calibration offset may have been applied incorrectly by a previous technician or programmer. 5) For actuator/valve position discrepancies: verify the actuator is mechanically coupled correctly to the damper or valve (a slipped coupling is common and causes the BAS to show a commanded position that doesn't match actual physical position) — always verify by watching the physical device move through its full range while commanding it from the BAS or a local override. Document any offset corrections made and notify the controls contractor/BAS administrator of any programming-level changes needed, as field technicians typically should not alter BAS point configurations without proper authorization."},

  {id:"d18",name:"VAV Box Troubleshooting with BAS",brand:"General",type:"BAS Integration",tags:["VAV","BAS","airflow","controls"],
   content:"Variable Air Volume (VAV) box diagnostic procedure using BAS trend data: Common complaint is 'zone too hot' or 'zone too cold' — before mechanical inspection, pull BAS trend data for: zone temperature versus setpoint over the complaint period, VAV box airflow (CFM) versus its calculated minimum/maximum setpoints, damper position command versus zone demand, discharge air temperature if the box has reheat. Diagnostic logic: if airflow is stuck at minimum despite a cooling call and damper command shows 100% open, suspect a mechanical damper linkage failure or actuator failure — verify by physical inspection and manual override test. If airflow reading itself appears erratic or implausible (e.g., showing negative or wildly fluctuating CFM), suspect the airflow sensor (typically a differential pressure sensor across an averaging pitot array) — check for a disconnected or pinched sensor tubing, which is a very common field failure. If the zone temperature sensor reading on the BAS doesn't match a handheld reading at the thermostat location, check for a sensor calibration issue or wiring problem as described in sensor discrepancy procedures. Reheat coil issues: if discharge air temperature isn't rising despite a heating call and valve command at 100%, check actuator coupling to the valve stem, check for a stuck or scaled valve (common in hot water reheat systems with poor water treatment), and verify hot water is actually available at the coil (isolation valve inadvertently closed is a common and easily overlooked cause)."},

  {id:"d19",name:"Cooling Tower Maintenance & Water Treatment",brand:"General",type:"Maintenance Procedure",tags:["cooling tower","water treatment","maintenance"],
   content:"Cooling tower maintenance procedure: Inspect fill media quarterly for scale buildup, algae/biological growth, or physical damage — fouled fill significantly reduces heat transfer efficiency and increases approach temperature. Water treatment monitoring: check conductivity/cycles of concentration against target range (typically 3-6 cycles depending on makeup water quality and treatment program), verify biocide feed system is functioning per treatment schedule (critical for Legionella risk mitigation), check pH is within target range per water treatment vendor specification (typically 7.0-9.0 for most systems). Basin cleaning: drain and clean sump basin at minimum annually, more frequently if sediment accumulation is significant, inspect for any signs of biological growth on basin walls. Fan and drive maintenance: inspect belt condition and tension (or gearbox oil level on gear-drive units), check fan blade pitch and condition, verify vibration switches are functional (critical safety device that shuts down fan on excessive vibration, preventing catastrophic failure). Drift eliminators: inspect for damage or degradation, as damaged eliminators allow excessive water droplet carryover which wastes water and can create slip hazards and Legionella aerosol risk in surrounding areas. Legionella risk management: this is a serious life-safety concern — any facility with a cooling tower should have a written water management plan per ASHRAE 188, and technicians should be familiar with their facility's specific plan and reporting requirements for any observed deficiencies."},

  {id:"d20",name:"Boiler Combustion & Safety Inspection",brand:"General",type:"Maintenance Procedure",tags:["boiler","combustion","safety","maintenance"],
   content:"Commercial boiler annual safety and combustion inspection: Combustion analysis — measure and record O2/CO2 percentage, CO (carbon monoxide) in ppm, stack temperature, and calculated efficiency using a calibrated combustion analyzer; excessive CO readings indicate incomplete combustion and require immediate investigation (burner adjustment, gas pressure, or draft issue) as this is a life-safety concern. Gas pressure verification — check manifold pressure against manufacturer specification using a manometer at the test port, both static (no-fire) and dynamic (firing) pressures. Safety control testing — every safety control must be tested annually at minimum: high limit temperature/pressure cutout, low water cutoff (LWCO) — test by draining down while operating to confirm the burner shuts down before the water level drops below the safe operating line, flame safeguard/flame supervision system — verify flame failure response time is within specification (typically 4 seconds or less for the burner to shut down after flame loss), pressure relief valve — verify set pressure and test operation per code requirement (many jurisdictions require annual testing, some require replacement at set intervals). Refractory and heat exchanger inspection — visually inspect for cracking, erosion, or soot buildup which indicates a combustion problem. Flue and venting inspection — check for proper draft, no blockages, no signs of condensation damage or corrosion in venting system, verify combustion air supply is adequate and unobstructed. All findings must be documented, and any safety control failure requires the boiler to be taken out of service until repaired — never bypass a safety control to keep a boiler running."},

  {id:"d21",name:"Common Commercial Compressor Types & Applications",brand:"General",type:"Reference",tags:["compressors","equipment reference"],
   content:"Common commercial compressor types and typical applications: Scroll compressors — used widely in commercial RTUs and split systems from 3-25 tons, known for reliability, fewer moving parts than reciprocating, good efficiency, tolerant of liquid refrigerant slugging better than reciprocating types but still should be avoided. Reciprocating compressors — older technology still found in many chillers and larger tonnage applications, multiple cylinders allow capacity staging via cylinder unloading, more service-intensive with more wear components (valves, rings, bearings). Screw compressors — used in larger chillers and VRF outdoor units, rotary screw design allows smooth capacity modulation via slide valve or variable speed drive, generally more efficient at part-load than fixed-speed reciprocating or scroll. Centrifugal compressors — used in large chiller applications (typically 200+ tons), impeller-based design, requires surge protection controls, often uses non-CFC refrigerants like R-134a or R-1233zd. Inverter/variable-speed compressors — increasingly common across all types in modern equipment (especially VRF and residential/light commercial), allows precise capacity matching to load which improves efficiency and comfort, requires understanding of variable frequency drive diagnostics in addition to traditional mechanical refrigeration troubleshooting."},

  {id:"d22",name:"Goodman/Amana Package Unit Fault Codes",brand:"Goodman",type:"Fault Code Library",tags:["RTU","fault codes","packaged"],
   content:"Goodman/Amana GPG/GPC series package units: LED flash codes on control board (count flashes between pauses): 2 flashes=Pressure switch fault (check high/low pressure switch wiring and operation, check refrigerant charge). 3 flashes=Limit switch open — indicates high temperature limit tripped on gas heat models (check for restricted airflow, dirty filter, blower issue). 4 flashes=Ignition lockout on gas models (check gas valve, ignitor, flame sensor cleanliness — a dirty flame sensor is the most common cause of ignition lockout). 5 flashes=Reversed line voltage polarity or grounding issue (check line voltage wiring polarity at disconnect). 7 flashes=Low flame sense signal (clean flame sensor with fine sandpaper or steel wool, check for proper ground). Typical operating pressures at AHRI conditions (95°F outdoor, 80°F/67°F indoor): suction 68-75 psig, discharge 225-275 psig for R-410A equipment, varies by exact model and outdoor temperature."},

  {id:"d23",name:"Bosch/Bosch Thermotechnology Heat Pump Reference",brand:"Bosch",type:"Service Manual",tags:["heat pump","fault codes"],
   content:"Bosch commercial heat pump systems (BOVA/Climate5000 commercial series): Common fault indications via LED or display code: F0=General system fault, check controller connections. F1=High pressure fault (check condenser airflow, refrigerant overcharge). F2=Low pressure fault (check refrigerant charge, filter/strainer restriction, expansion device). F3=Compressor overload/thermal protection tripped (allow cooldown period, check for locked rotor condition, check start components — capacitor, contactor). Communication faults typically show as a blinking status LED pattern — consult specific model documentation for exact pattern meaning as it varies by product line. Defrost cycle troubleshooting: verify defrost sensor is reading accurately (compare to actual coil temperature with a clamp-on thermocouple), verify reversing valve fully shifts during defrost initiation (listen/feel for the characteristic whoosh and temperature change at the valve body), check defrost termination sensor and timer/demand-defrost logic per control board type."},

  {id:"d24",name:"Air Filtration Standards & MERV Rating Guide",brand:"General",type:"Reference",tags:["filters","IAQ","maintenance"],
   content:"MERV (Minimum Efficiency Reporting Value) rating reference for commercial HVAC filter selection: MERV 8 — typical minimum for standard commercial comfort applications, captures larger particles like dust, pollen, dust mite debris; common in standard office RTU applications. MERV 11 — improved filtration capturing smaller particles, often specified for improved IAQ in office environments, still compatible with most standard equipment static pressure budgets. MERV 13 — commonly specified per ASHRAE guidance for improved indoor air quality including reduction of some bacteria and virus-carrying particles; higher pressure drop requires verification that the air handling equipment's fan can accommodate the increased static pressure without airflow reduction below design requirements — this is a critical check often missed when upgrading filter MERV rating in existing equipment. MERV 14-16 — approaches HEPA-adjacent performance, typically requires equipment specifically designed for the higher static pressure drop, common in healthcare and specialized applications. Filter change frequency should be based on actual pressure drop measurement (using a manometer across the filter bank) rather than a fixed calendar schedule alone, as loading rate varies significantly by building use, outdoor air quality, and season."},

  {id:"d25",name:"Economizer & Outdoor Air Damper Troubleshooting",brand:"General",type:"Maintenance Procedure",tags:["economizer","outdoor air","controls","energy"],
   content:"Economizer troubleshooting procedure: Verify actuator operation first — command the damper through its full range (0-100%) either locally at the unit or via BAS override, and physically observe the damper blades move smoothly through the full range without binding. A common failure is a slipped or broken actuator coupling — the BAS/controller shows a commanded position but the damper doesn't actually move, or moves only partially. Enthalpy/temperature sensor check — for differential enthalpy economizers, verify both outdoor and return air sensors are reading accurately by comparing to a calibrated handheld instrument; a faulty outdoor air sensor is a common cause of an economizer that never brings in outdoor air even during favorable conditions, or conversely runs excessive outdoor air during unfavorable (very hot/humid) conditions, driving up cooling energy use and potential humidity/IAQ issues. Minimum position verification — confirm the minimum outdoor air damper position matches the design ventilation requirement (per ASHRAE 62.1 calculation for the space) — a damper stuck fully closed provides zero ventilation air, a serious IAQ and code compliance issue that should be flagged immediately. Linkage inspection — check all damper blade linkages for looseness or disconnection, as even a functioning actuator cannot properly modulate damper position if the mechanical linkage to the blades has failed."},

];

function Docs(){
  const [view,setView]=useState("list");
  const [doc,setDoc]=useState(null);
  const [q,setQ]=useState("");const [ans,setAns]=useState("");const [busy,setBusy]=useState(false);
  const [search,setSearch]=useState("");
  const filtered=DOCS.filter(d=>!search||[d.name,d.brand,d.type,...d.tags].join(" ").toLowerCase().includes(search.toLowerCase()));
  async function askDoc(){
    if(!q.trim())return;
    setBusy(true);setAns("");
    const r=await ai("You are an HVAC technical documentation expert. Answer precisely from the document provided.",
      `Document: "${doc.name}"\nContent: ${doc.content}\n\nQuestion: ${q}`);
    setAns(r);setBusy(false);
  }
  if(view==="read"&&doc)return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <div style={{background:DARK,borderBottom:`3px solid ${RED}`,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
      <button onClick={()=>{setView("list");setAns("");setQ("");}} style={{background:"rgba(255,255,255,.08)",border:"none",borderRadius:8,padding:"6px 12px",color:"#fff",fontSize:18,cursor:"pointer"}}>←</button>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,fontWeight:700,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{doc.name}</div>
        <div style={{fontSize:10,color:RED,fontWeight:600}}>{doc.brand} · {doc.type}</div>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:14}}>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
        {doc.tags.map(t=><span key={t} style={{background:"rgba(227,6,19,.12)",border:`1px solid rgba(227,6,19,.25)`,borderRadius:20,padding:"3px 10px",fontSize:10,color:RED,fontWeight:600}}>{t}</span>)}
      </div>
      <Card style={{marginBottom:14}} c={<>
        <div style={{fontSize:10,color:"rgba(255,255,255,.3)",fontWeight:700,marginBottom:8}}>CONTENT</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,.75)",lineHeight:1.7}}>{doc.content}</div>
      </>}/>
      <Card style={{border:`1px solid rgba(227,6,19,.3)`}} c={<>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <div style={{width:32,height:32,background:RED,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🤖</div>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>Ask AI About This Document</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,.4)"}}>AI answers from this document specifically</div>
          </div>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,.3)",marginBottom:6,fontWeight:600}}>QUICK QUESTIONS</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {["What are the fault codes?","What PPE is required?","Startup steps?","Electrical specs?"].map(qk=><button key={qk} onClick={()=>{setQ(qk);}} style={{background:"#1a1a1a",border:`1px solid ${BORDER}`,borderRadius:20,padding:"5px 10px",cursor:"pointer",fontSize:10,color:"rgba(255,255,255,.7)"}}>{qk}</button>)}
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")askDoc();}}
            placeholder="Ask a question…"
            style={{flex:1,background:"#1a1a1a",border:`1px solid ${BORDER}`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,outline:"none"}}/>
          <button onClick={askDoc} disabled={!q.trim()||busy} style={{background:RED,border:"none",borderRadius:10,padding:"0 16px",cursor:"pointer",color:"#fff",fontWeight:700,fontSize:13,opacity:(!q.trim()||busy)?.4:1}}>{busy?"…":"Ask"}</button>
        </div>
        {busy&&<Spin label="Reading…"/>}
        {ans&&<div style={{background:"rgba(227,6,19,.06)",border:`1px solid rgba(227,6,19,.2)`,borderRadius:10,padding:12,marginTop:10,fontSize:13,color:"#ddd",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{ans}</div>}
      </>}/>
    </div>
  </div>;
  return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <Hdr title="DOCUMENT LIBRARY" sub="MANUALS · FAULT CODES · SOPs"/>
    <div style={{flex:1,overflowY:"auto",padding:14}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search…"
        style={{width:"100%",background:"#1a1a1a",border:`1px solid ${BORDER}`,borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:13,outline:"none",marginBottom:12,fontFamily:"inherit"}}/>
      {filtered.map(d=><button key={d.id} onClick={()=>{setDoc(d);setView("read");}} style={{
        width:"100%",background:CARD,border:`1px solid rgba(227,6,19,.12)`,borderRadius:12,
        padding:12,marginBottom:8,cursor:"pointer",textAlign:"left"}}>
        <div style={{fontSize:13,fontWeight:700,color:"#fff",marginBottom:5}}>{d.name}</div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{background:RED,borderRadius:5,padding:"2px 8px",fontSize:10,color:"#fff",fontWeight:700}}>{d.type}</span>
          <span style={{fontSize:11,color:"rgba(255,255,255,.4)",fontWeight:600}}>{d.brand}</span>
          {d.tags.slice(0,3).map(t=><span key={t} style={{fontSize:9,background:"rgba(255,255,255,.06)",color:"rgba(255,255,255,.4)",borderRadius:10,padding:"2px 7px"}}>{t}</span>)}
        </div>
      </button>)}
    </div>
  </div>;
}

// ── PT CHART ─────────────────────────────────────────────────────────────
const PT={
  "R-410A":[[40,83],[50,102],[60,123],[70,147],[80,174],[90,205],[100,238],[110,275],[120,315]],
  "R-22":[[20,37],[30,47],[40,59],[50,72],[60,87],[70,103],[80,121],[90,141],[100,163]],
  "R-32":[[40,90],[50,111],[60,134],[70,160],[80,189],[90,221],[100,256],[110,294],[120,335]],
  "R-454B":[[40,83],[50,102],[60,124],[70,148],[80,175],[90,205],[100,238],[110,274],[120,314]],
  "R-407C":[[40,72],[50,89],[60,108],[70,129],[80,152],[90,178],[100,207],[110,238],[120,272]],
  "R-134a":[[20,26],[30,35],[40,46],[50,59],[60,73],[70,90],[80,110],[90,132],[100,157]],
};
function PTChart(){
  const [ref,setRef]=useState("R-410A");
  const [temp,setTemp]=useState("");const [press,setPress]=useState("");
  const [result,setResult]=useState(null);
  function calc(){
    const d=PT[ref];
    if(temp){
      const t=parseFloat(temp);
      for(let i=0;i<d.length-1;i++){
        if(t>=d[i][0]&&t<=d[i+1][0]){
          const r=d[i][1]+(d[i+1][1]-d[i][1])*(t-d[i][0])/(d[i+1][0]-d[i][0]);
          setResult({type:"Temp→Press",input:t+"°F",output:r.toFixed(1)+" psig"});return;
        }
      }
    }
    if(press){
      const p=parseFloat(press);
      for(let i=0;i<d.length-1;i++){
        if(p>=d[i][1]&&p<=d[i+1][1]){
          const r=d[i][0]+(d[i+1][0]-d[i][0])*(p-d[i][1])/(d[i+1][1]-d[i][1]);
          setResult({type:"Press→Temp",input:p+" psig",output:r.toFixed(1)+"°F"});return;
        }
      }
    }
    setResult({type:"Error",output:"Out of range"});
  }
  return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <Hdr title="PT CHART" sub="PRESSURE-TEMPERATURE"/>
    <div style={{flex:1,overflowY:"auto",padding:14}}>
      <Sel label="REFRIGERANT" val={ref} set={r=>{setRef(r);setResult(null);}} opts={Object.keys(PT)}/>
      <Card style={{marginBottom:14}} c={<>
        <div style={{fontSize:11,color:RED,fontWeight:700,marginBottom:12}}>ENTER ONE VALUE</div>
        <Inp label="TEMPERATURE (°F)" val={temp} set={v=>{setTemp(v);setPress("");}} ph="e.g. 45" type="number"/>
        <div style={{textAlign:"center",color:"rgba(255,255,255,.3)",fontSize:12,margin:"4px 0 12px"}}>— or —</div>
        <Inp label="PRESSURE (psig)" val={press} set={v=>{setPress(v);setTemp("");}} ph="e.g. 130" type="number"/>
        <Btn red c="Calculate" onClick={calc} disabled={!temp&&!press} style={{width:"100%",marginTop:4}}/>
      </>}/>
      {result&&<Card style={{background:result.type==="Error"?"rgba(227,6,19,.12)":"rgba(39,174,96,.12)",border:`1px solid ${result.type==="Error"?"rgba(227,6,19,.4)":"rgba(39,174,96,.4)"}`}} c={<>
        <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginBottom:4}}>{ref} · {result.type}</div>
        {result.input&&<div style={{fontSize:13,color:"rgba(255,255,255,.7)",marginBottom:4}}>Input: <strong style={{color:"#fff"}}>{result.input}</strong></div>}
        <div style={{fontSize:22,fontWeight:900,color:result.type==="Error"?RED:"#27AE60"}}>{result.output}</div>
      </>}/>}
    </div>
  </div>;
}

function Notes(){
  const [notes,setNotes]=useState([]);
  const [text,setText]=useState("");const [title,setTitle]=useState("");
  useEffect(()=>{S.get("notes").then(r=>setNotes(JSON.parse(r.value))).catch(()=>{});},[]);
  async function add(){
    if(!text.trim())return;
    const n=[{id:gid(),title:title||"Note",body:text,ts:Date.now()},...notes];
    setNotes(n);setText("");setTitle("");
    await S.set("notes",JSON.stringify(n));
  }
  async function del(id){
    const n=notes.filter(x=>x.id!==id);setNotes(n);
    await S.set("notes",JSON.stringify(n));
  }
  return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <Hdr title="JOB NOTES" sub="FIELD NOTES"/>
    <div style={{flex:1,overflowY:"auto",padding:14}}>
      <Card style={{marginBottom:14}} c={<>
        <Inp label="TITLE" val={title} set={setTitle} ph="Optional"/>
        <Inp label="NOTE" val={text} set={setText} ph="Write your note…" rows={3}/>
        <Btn red c="+ Add Note" onClick={add} disabled={!text.trim()} style={{width:"100%"}}/>
      </>}/>
      {notes.length===0&&<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,.3)"}}>No notes yet</div>}
      {notes.map(n=><Card key={n.id} c={<>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{n.title}</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>{ago(n.ts)} ago</div>
            <button onClick={()=>del(n.id)} style={{background:"none",border:"none",color:"rgba(255,255,255,.25)",cursor:"pointer",fontSize:16}}>×</button>
          </div>
        </div>
        <div style={{fontSize:12,color:"rgba(255,255,255,.65)",lineHeight:1.6}}>{n.body}</div>
      </>}/>)}
    </div>
  </div>;
}

// ── MODELS ───────────────────────────────────────────────────────────────
function Models(){
  const [brand,setBrand]=useState("");const [model,setModel]=useState("");
  const [serial,setSerial]=useState("");const [loc,setLoc]=useState("");
  const [saved,setSaved]=useState([]);
  useEffect(()=>{S.get("models").then(r=>setSaved(JSON.parse(r.value))).catch(()=>{});},[]);
  async function save(){
    if(!model.trim())return;
    const s=[{id:gid(),brand,model,serial,loc,ts:Date.now()},...saved];
    setSaved(s);setBrand("");setModel("");setSerial("");setLoc("");
    await S.set("models",JSON.stringify(s));
  }
  async function del(id){
    const s=saved.filter(x=>x.id!==id);setSaved(s);
    await S.set("models",JSON.stringify(s));
  }
  return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <Hdr title="MODEL LOOKUP" sub="EQUIPMENT REGISTER"/>
    <div style={{flex:1,overflowY:"auto",padding:14}}>
      <Card style={{marginBottom:14}} c={<>
        <Sel label="BRAND" val={brand} set={setBrand} opts={BRANDS}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Inp label="MODEL #" val={model} set={setModel} ph="e.g. 48XC024"/>
          <Inp label="SERIAL #" val={serial} set={setSerial} ph="Optional"/>
        </div>
        <Inp label="LOCATION" val={loc} set={setLoc} ph="e.g. Rooftop"/>
        <Btn red c="+ Save Equipment" onClick={save} disabled={!model.trim()} style={{width:"100%"}}/>
      </>}/>
      {saved.length===0&&<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,.3)"}}>No equipment yet</div>}
      {saved.map(e=><Card key={e.id} c={<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{e.brand} {e.model}</div>
          {e.serial&&<div style={{fontSize:11,color:"rgba(255,255,255,.4)",marginTop:2}}>S/N: {e.serial}</div>}
          {e.loc&&<div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>{e.loc}</div>}
        </div>
        <button onClick={()=>del(e.id)} style={{background:"none",border:"none",color:"rgba(255,255,255,.25)",cursor:"pointer",fontSize:16}}>×</button>
      </div>}/>)}
    </div>
  </div>;
}

// ── COMMUNICATIONS ───────────────────────────────────────────────────────
function Comms({profile}){
  const [step,setStep]=useState(0);
  const [type,setType]=useState("");
  const [channel,setChannel]=useState("Email");
  const [recipient,setRecipient]=useState("");
  const [notes,setNotes]=useState("");
  const [tone,setTone]=useState("Professional");
  const [result,setResult]=useState("");
  const [copied,setCopied]=useState(false);

  const TYPES=[
    {id:"status",l:"Status Update",d:"Let them know where the job stands"},
    {id:"delay",l:"Delay Notice",d:"Explain a delay and new timeline"},
    {id:"complete",l:"Job Complete",d:"Confirm work finished, outcome"},
    {id:"followup",l:"Follow-up Needed",d:"Flag something needs further action"},
    {id:"parts",l:"Parts / Approval Request",d:"Request approval for parts or cost"},
    {id:"schedule",l:"Scheduling",d:"Propose or confirm a visit time"},
    {id:"escalate",l:"Escalation",d:"Raise an issue that needs attention"},
    {id:"custom",l:"Custom",d:"Write freely from your notes"},
  ];

  async function generate(){
    setStep(1);
    const sys="You are a professional communications assistant for JLL MTS field engineers. Turn rough field notes into clear, professional client-ready communication. Match the requested channel format exactly: emails need a subject line and proper greeting/sign-off; texts must be short, plain, no subject line, no heavy formatting.";
    const typeLabel=TYPES.find(t=>t.id===type)?.l||"General Update";
    const prompt=`Write a ${channel.toLowerCase()} for a JLL MTS field engineer.\nPurpose: ${typeLabel}\nTone: ${tone}\nRecipient: ${recipient||"Client / Facilities contact"}\nTechnician: ${profile?.name||"Field Technician"}\n\nRough notes to base it on:\n${notes}\n\n${channel==="Email"?"Format as: Subject line, then the email body with greeting and sign-off.":"Format as a short text message — no subject line, 2-4 sentences max, plain and clear."}`;
    const r=await ai(sys,prompt);
    setResult(r);
    setStep(2);
  }

  function copy(){
    navigator.clipboard?.writeText(result);
    setCopied(true);
    setTimeout(()=>setCopied(false),2000);
  }

  if(step===1)return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <Hdr title="COMMUNICATIONS" sub="WRITING…"/>
    <Spin label="Drafting message…"/>
  </div>;

  if(step===2)return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <Hdr title="COMMUNICATIONS" sub="READY TO SEND"/>
    <div style={{flex:1,overflowY:"auto",padding:14}}>
      <div style={{fontSize:11,color:"rgba(255,255,255,.4)",fontWeight:700,marginBottom:8,letterSpacing:".06em"}}>{channel.toUpperCase()} · {TYPES.find(t=>t.id===type)?.l}</div>
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:16,
        whiteSpace:"pre-wrap",fontSize:13,color:"#ddd",lineHeight:1.7,marginBottom:14}}>{result}</div>
      <div style={{display:"flex",gap:8}}>
        <Btn red c={copied?"✅ Copied!":"📋 Copy"} onClick={copy} style={{flex:1}}/>
        <Btn c="✏️ Edit Notes" onClick={()=>setStep(0)} style={{flex:1}}/>
      </div>
      <Btn c="+ New Message" onClick={()=>{setStep(0);setResult("");setNotes("");setType("");}} style={{width:"100%",marginTop:8}}/>
    </div>
  </div>;

  return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <Hdr title="COMMUNICATIONS" sub="CLIENT-READY MESSAGES"/>
    <div style={{flex:1,overflowY:"auto",padding:14}}>
      <Card style={{background:"rgba(227,6,19,.06)",marginBottom:14}} c={<div style={{fontSize:12,color:"rgba(255,255,255,.6)",lineHeight:1.5}}>✉️ Jot rough notes — get a polished, professional email or text ready to send.</div>}/>

      <div style={{fontSize:11,color:"rgba(255,255,255,.5)",fontWeight:700,marginBottom:8,letterSpacing:".08em"}}>MESSAGE TYPE *</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        {TYPES.map(t=><button key={t.id} onClick={()=>setType(t.id)} style={{
          background:type===t.id?RED:CARD,border:`1px solid ${type===t.id?RED:BORDER}`,borderRadius:10,
          padding:"10px",cursor:"pointer",textAlign:"left"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#fff",marginBottom:2}}>{t.l}</div>
          <div style={{fontSize:10,color:"rgba(255,255,255,.5)",lineHeight:1.3}}>{t.d}</div>
        </button>)}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel label="CHANNEL" val={channel} set={setChannel} opts={["Email","Text Message"]}/>
        <Sel label="TONE" val={tone} set={setTone} opts={["Professional","Friendly","Urgent","Apologetic","Firm"]}/>
      </div>
      <Inp label="RECIPIENT" val={recipient} set={setRecipient} ph="e.g. Property Manager, John at ABC Corp"/>
      <Inp label="YOUR NOTES *" val={notes} set={setNotes} ph="Jot down what happened, in your own words — the AI will polish it…" rows={5}/>

      <Btn red c="✉️ Generate Message" onClick={generate} disabled={!type||!notes.trim()} style={{width:"100%",padding:13}}/>
    </div>
  </div>;
}

// ── MAIN APP ─────────────────────────────────────────────────────────────
function App(){
  const [profile,setProfile]=useState(null);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("home");
  const [chatView,setChatView]=useState("list");
  const [agentView,setAgentView]=useState("hub");
  const [toolView,setToolView]=useState("hub");
  const [chats,setChats]=useState([]);
  const [activeId,setActiveId]=useState(null);
  const [busy,setBusy]=useState(false);
  const [wCtx,setWCtx]=useState({});

  useEffect(()=>{init();},[]);
  async function init(){
    try{const p=await S.get("profile");if(p?.value)setProfile(JSON.parse(p.value));}catch{}
    try{const keys=await S.list("chat:");const loaded=[];
      for(const k of keys){try{const r=await S.get(k);if(r?.value)loaded.push(JSON.parse(r.value));}catch{}}
      loaded.sort((a,b)=>b.updatedAt-a.updatedAt);setChats(loaded);
    }catch{}
    setLoading(false);
    setTimeout(()=>{const s=document.getElementById("splash");if(s){s.style.opacity="0";setTimeout(()=>s.remove(),500);}},2200);
  }

  async function doOnboard(p){setProfile(p);await S.set("profile",JSON.stringify(p));}

  async function newChat(){
    const c={id:gid(),title:"New Job",messages:[],updatedAt:Date.now()};
    setChats(prev=>[c,...prev]);
    setActiveId(c.id);setChatView("chat");setTab("chat");
    await S.set("chat:"+c.id,JSON.stringify(c));
  }
  async function delChat(id){
    const u=chats.filter(c=>c.id!==id);setChats(u);
    if(activeId===id){setActiveId(null);setChatView("list");}
    await S.del("chat:"+id);
  }
  const activeChat=chats.find(c=>c.id===activeId);
  async function sendMsg(text,attachments){
    attachments=attachments||[];
    if((!text&&!attachments.length)||busy||!activeId)return;
    const imgs=attachments.filter(a=>!a.isDoc).map(a=>a.preview);
    const imgB64=attachments.filter(a=>!a.isDoc).map(a=>a.base64);
    const docNames=attachments.filter(a=>a.isDoc).map(a=>a.name);
    const docTexts=attachments.filter(a=>a.isDoc&&a.text).map(a=>`\n\n[Attached file: ${a.name}]\n${a.text}`).join("");
    const msg={role:"user",content:text,images:imgs.length?imgs:undefined,docs:docNames.length?docNames:undefined};
    const msgs=[...(activeChat?.messages||[]),msg];
    const title=(activeChat?.messages||[]).length===0?((text||attachments[0]?.name||"Image").length>40?(text||"Image").slice(0,40)+"…":(text||attachments[0]?.name||"New Job")):activeChat.title;
    const updated={...activeChat,title,messages:msgs,updatedAt:Date.now()};
    setChats(prev=>prev.map(c=>c.id===activeId?updated:c));
    setBusy(true);
    await S.set("chat:"+activeId,JSON.stringify(updated));
    const sys="You are MTS Assistant, an expert AI for JLL MTS mobile HVAC engineers. Help diagnose faults, install parts, provide safety guidance. Be concise and use numbered steps. Flag safety items with ⚠️. If an image is provided, examine it carefully — it may show a nameplate, fault code display, wiring, gauges, or physical damage."+(profile?"\nTechnician: "+profile.name+(profile.region?", "+profile.region:""):"");
    const prompt=(text||"Please analyse the attached image(s).")+docTexts;
    const reply=await ai(sys,prompt,imgB64);
    const withReply={...updated,messages:[...msgs,{role:"assistant",content:reply}],updatedAt:Date.now()};
    setChats(prev=>prev.map(c=>c.id===activeId?withReply:c).sort((a,b)=>b.updatedAt-a.updatedAt));
    await S.set("chat:"+activeId,JSON.stringify(withReply));
    setBusy(false);
  }

  function nav(t,sub){
    setTab(t);
    if(t==="chat")setChatView("list");
    if(t==="agents")setAgentView(sub||"hub");
    if(t==="tools")setToolView(sub||"hub");
  }

  if(loading)return null;
  if(!profile)return <Onboarding onDone={doOnboard}/>;

  const TABS=[{id:"home",i:"🏠",l:"Home"},{id:"chat",i:"💬",l:"Chat"},{id:"agents",i:"🤖",l:"Agents"},{id:"docs",i:"📚",l:"Docs"},{id:"tools",i:"🛠️",l:"Tools"}];

  return <div className="app-shell" style={{height:"100dvh",background:BG,display:"flex",flexDirection:"column",maxWidth:480,width:"100%",margin:"0 auto",WebkitOverflowScrolling:"touch"}}>
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {tab==="home"&&<Dashboard profile={profile} jobs={chats.length} onNewJob={newChat} onNav={nav}/>}
      {tab==="chat"&&chatView==="list"&&<ChatList chats={chats} onOpen={id=>{setActiveId(id);setChatView("chat");}} onCreate={newChat} onDel={delChat}/>}
      {tab==="chat"&&chatView==="chat"&&<ChatConvo chat={activeChat} onBack={()=>setChatView("list")} onSend={sendMsg} busy={busy}/>}
      {tab==="agents"&&agentView==="hub"&&<AgentsHub onSel={v=>setAgentView(v)}/>}
      {tab==="agents"&&agentView!=="hub"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <button onClick={()=>setAgentView("hub")} style={{background:DARK,border:"none",borderBottom:`1px solid ${BORDER}`,padding:"10px 16px",color:RED,fontWeight:700,fontSize:13,cursor:"pointer",width:"100%",textAlign:"left",flexShrink:0}}>← All Agents</button>
        {agentView==="diag"&&<DiagAgent ctx={wCtx} setCtx={c=>setWCtx(p=>({...p,...c}))} onChain={id=>setAgentView(id)}/>}
        {agentView==="predict"&&<PredAgent/>}
        {agentView==="parts"&&<PartsAgent ctx={wCtx}/>}
        {agentView==="refcalc"&&<RefAgent/>}
        {agentView==="safety"&&<SafetyAgent ctx={wCtx}/>}
        {agentView==="report"&&<ReportAgent ctx={wCtx} profile={profile}/>}
      </div>}
      {tab==="docs"&&<Docs/>}
      {tab==="tools"&&toolView==="hub"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <Hdr title="TOOLS" sub="FIELD TOOLS"/>
        <div style={{flex:1,padding:14,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,alignContent:"start"}}>
          {[{id:"pt",i:"🌡️",l:"PT Chart",d:"Pressure-temp calculator"},{id:"model",i:"🔍",l:"Model Lookup",d:"Equipment register"},{id:"notes",i:"📝",l:"Job Notes",d:"Field notes"},{id:"comms",i:"✉️",l:"Communications",d:"Client-ready emails & texts"}]
            .map(t=><button key={t.id} onClick={()=>setToolView(t.id)} style={{
              background:CARD,border:`1px solid ${BORDER}`,borderRadius:14,padding:16,
              cursor:"pointer",textAlign:"left",display:"flex",flexDirection:"column",gap:6}}>
              <span style={{fontSize:28}}>{t.i}</span>
              <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{t.l}</span>
              <span style={{fontSize:11,color:"rgba(255,255,255,.4)",lineHeight:1.4}}>{t.d}</span>
            </button>)}
        </div>
      </div>}
      {tab==="tools"&&toolView!=="hub"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <button onClick={()=>setToolView("hub")} style={{background:DARK,border:"none",borderBottom:`1px solid ${BORDER}`,padding:"10px 16px",color:RED,fontWeight:700,fontSize:13,cursor:"pointer",width:"100%",textAlign:"left",flexShrink:0}}>← All Tools</button>
        {toolView==="pt"&&<PTChart/>}
        {toolView==="model"&&<Models/>}
        {toolView==="notes"&&<Notes/>}
        {toolView==="comms"&&<Comms profile={profile}/>}
      </div>}
    </div>
    <div style={{background:"#000",borderTop:`2px solid rgba(227,6,19,.3)`,display:"flex",flexShrink:0,boxShadow:"0 -4px 20px rgba(0,0,0,.5)",paddingBottom:"env(safe-area-inset-bottom)"}}>
      {TABS.map(t=><button key={t.id} onClick={()=>nav(t.id)} style={{
        flex:1,background:"transparent",border:"none",padding:"8px 2px 6px",cursor:"pointer",
        display:"flex",flexDirection:"column",alignItems:"center",gap:1,
        color:tab===t.id?RED:"rgba(255,255,255,.4)"}}>
        <span style={{fontSize:20}}>{t.i}</span>
        <span style={{fontSize:9,fontWeight:700,letterSpacing:".03em"}}>{t.l}</span>
        {tab===t.id&&<div style={{width:18,height:2,background:RED,borderRadius:1,marginTop:1}}/>}
      </button>)}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
</html>
